body:
  text: 近思録卷十宋朱子吕祖謙同編葉采集解政事凡六十四條此卷論臨政處事葢明乎治道而通乎治法則施於有政矣凡居官任職事上撫下待同列選賢才處世之道具焉伊川先生上疏曰夫鐘怒而擊之則武悲而擊之則哀誠意之感而入也告於人亦如是古人所以齋戒而告君也心誠則氣専氣専則聲應不誠而能感乎臣前後兩得進講未嘗敢不宿齋預戒潛思存誠覬感動於上心若使營營於職事紛紛其思慮待至上前然後善其辭說徒以頰舌感人不亦淺乎文集下同曰或問伊川未進講以前還有間㫁否朱子尋常未嘗不誠臨見君時又加意爾如孔子沐浴而告哀公是也伊川答人示奏稿書云觀公之意専以畏亂為主頤欲公以愛民為先力言百姓飢且死丐朝廷哀憐因懼将為寇亂可也不惟告君之體當如是事勢亦宜爾徒言民飢将亂為可慮而不言民飢将死為可傷則人主徒有憂懼忿疾之心而無哀矜惻怛之意矣告君之體必詞順而理直可也公方求財以活人祈之以仁愛則當輕財而重民懼之以利害則将恃財以自保哀矜之心生則能輕財以救民之死憂懼之心作反将吝財以防民之變古之時得丘民則得天下後世以兵制民以財聚衆聚財者能守保民者為迂惟當以誠意感動覬其有不忍之心而已四井為甸四甸為丘得乎一丘之民則可以得天下說見孟子後世以兵制民謂民有所不足畏以財聚衆謂財有所不可闕於是以聚財為守國之道以愛民為迂緩之事苟徒懼之以禍亂則無惻隠愛民之心愈増其聚財自守之慮矣明道為邑及民之事多衆人所謂法所拘者然為之未嘗大戾於法衆亦不甚駭謂之得伸其志則不可求小補則過今之為政者逺矣人雖異之不至指為狂也至謂之狂則大駭矣法令有未便於民者衆人為之未免拘礙惟先生道徳之盛從容裁處故不大戾當時之法而有補於民人雖異之而不至於駭者亦其存心寛平而區處有方也盡誠為之不容而後去又何嫌乎此又可以見先生忠厚懇惻之心豈若悻悻然小丈夫之為哉明道先生曰一命之士苟存心於愛物於人必有所濟苟存愛物之心必有及物之效伊川先生曰君子觀天水違行之象知人情有爭訟之道故凡所作事必謀其始絶訟端於事之始則訟無由生矣謀始之義廣矣若慎交結明契劵之類是也易傳下同訟卦象傳坎下乾上為訟天西運水東流故曰違行交結朋逰親戚也契劵文書要約也此皆生訟之端慮其始必謹必明師之九二為師之主恃専則失為下之道不専則無成功之理故得中為吉恃専則失為下之道如衛青不敢専誅而具歸天子使自裁之是也不専則不能成功所謂将在外君令有所不受是也二居中故有得中之象凡師之道威和並至則吉也成而不和則人心懼而離和而少威則人心玩而弛九二剛中故有威和相濟之象世儒有論魯祀周公以天子禮樂以為周公能為人臣不能為之功則可用人臣不得用之禮樂是不知人臣之道也夫居周公之位則為周公之事由其位而能為者皆所當為也周公乃盡其職爾師卦九二傳成王幼周公攝政周公沒成王思其勲徳錫魯以天子之禮樂使祀周公焉孔子曰成王之賜伯禽之受皆非也或者謂周公能為人臣不能為之功故可用人臣不得用之禮樂夫聖人之於事君也有盡其道而已非有加於職分之外也若職分之外是乃過為矣大有之九三曰公用亨於天子小人弗克伊川易傳曰三當大有之時居諸侯之位有其富盛必用亨通於天子謂以其有為天子之有也乃人臣之常義也當大有之時公侯擅所有之富故戒之以用亨通於天子如朝覲供貢之儀凡所以奉上之道皆不敢自有其有乃為盡人臣之義也若小人處之則専其富有以為私不知公以奉上之道故曰小人弗克也人心所從多所親愛者也常人之情愛之則見其是惡之則見其非故妻孥之言雖失而多從所憎之言雖善為惡也苟以親愛而隨之則是私情所與豈合正理故隨之初九出門而交則有功也人心之從違多蔽於好惡之私而失其是非之正卦主於隨苟惟親暱之隨則違正理矣故必出門而交則無所繫累而所從者有功也隨九五之象曰孚於嘉吉位正中也伊川易傳曰隨以得中為善隨之所防者過也葢心所恱隨則不知其過矣震下兊上為隨震動也兊恱也以恱而動易過於隨而不自知故必得中為善坎之六四曰樽酒簋貳用缶納約自牖終无咎伊川易傳曰此言人臣以忠信善道結於君心必自其所明處乃能入也一樽之酒二簋之食復以瓦缶為器質之至也所謂忠信善道也牖者室中所以通明也葢忠信者納約之本雖懐樸素之誠苟不因其明而納焉則亦不能入矣人心有所蔽有所通通者明處也當就其明處而告之求信則易也故云納約自牖能如是則雖艱險之時終得无咎也人心各有所蔽各有所通攻其蔽則未免扞格因其明而導之則易於聴信且如君心蔽於荒樂唯其蔽也故爾雖力詆其荒樂之非如其不省何必於所不蔽之事推而及之則能悟其心矣自古能諫其君者未有不因其所明者也故訐直強勁者率多取忤而温厚明辨者其說多行訐者發人之隂惡也計直則無委曲強勁則乏和順故矯拂之過每至牴牾溫厚者其氣和明辨者其理著故感悟之易每多聴從納約自牖惟温厚明辨者能之非惟告於君者如此為教者亦然夫教必就人之所長所長者心之所明也從其心之所明而入然後推及其餘孟子所謂成徳達財是也成徳者因其有徳而成就之達財者因其有才而遂達之皆謂就其所長開導之也恒之初六曰浚恆貞凶象曰浚恆之凶始求深也伊川易傳曰初六居下而四為正應四以剛居高又為二三所隔應初之志異乎常矣而初乃求望之深是知常而不知變也初與四為位應九與六為爻應此理之常也然為九二九三所隔則已改其常矣初六當常之時知常而不知變求之過深是以至於凶悔也世之責望故素而至悔咎者皆浚恆者也素舊也遯之九三曰係遯有疾厲畜臣妾吉伊川易傳曰係戀之私恩懐小人女子之道也故以畜養臣妾則吉九三下乘六二有係戀之心則失宜遯之時矣故有災危然君子用是道以畜其臣妾則可以固結其欲遯之心是以吉也然君子之待小人亦不如是也御下之道苟所當去亦不可以係戀而姑息也睽之象曰君子以同而異伊川易傳曰聖賢之處世在人理之常莫不大同於世俗所同者則有時而獨異聖賢之所為惟順乎理而已豈顧夫世俗之同異哉故循乎天理之常者聖賢安得不與人同出於流俗之變者聖賢安得不與人異不能大同者亂常拂理之人也不能獨異者隨俗習非之人也要在同而能異耳同而能異則不拂於人理之常而亦不徇乎習俗之化惟理之從耳然其所以為異者乃所以成其大同也是亦一事而已睽之初九當睽之時雖同徳者相與然小人乖異者至衆若棄絶之不幾盡天下以仇君子乎如此則失含𢎞之義致凶咎之道也又安能化不善而使之合乎故必見惡人則无咎也初與四位相應而爻皆陽為同徳相與不至睽孤然當睽之時乖異者衆故必恢含𢎞之義而無棄絶之意則不善者可化乖異者可合乃元咎也古之聖王所以能化奸凶為善良革仇敵為臣民者由弗絶也弗絶之則開其自新之路而啟其從善之機也睽之九二當睽之時君心未合賢臣在下竭力盡誠期使之信合而已二五相應然時方睽違上下乖戾故二必外竭其力内盡其誠期使疑者信睽者合耳至誠以感動之盡力以扶持之明義理以致其知杜蔽惑以誠其意如是宛轉以求其合也内竭其誠以感動君心外盡其力以扶持國政此盡其在我者也推明義理使君之知無不至杜塞蔽惑使君之意無不誠此啟其君者也如是宛轉求之睽者庶其可合所謂遇主於巷也巷者委曲之途也遇非枉道逢迎也巷非邪僻由徑也故象曰遇主於巷未失道也上言遇主於巷亦正理之當然苟遇不以直而至於枉道逢迎巷不以正而至於邪僻由徑苟求其合而䧟於邪枉則又非遇主於巷之道也損之九二曰弗損益之伊川易傳曰不自損其剛貞則能益其上乃益之也若失其剛貞而用柔說適足以損之而已剛正不撓乃能有益於君葢柔邪之人阿意順㫖惟務容恱善而遇柔恱善亦不進惡而遇柔恱必長其惡矣故國有險佞之臣士有善柔之友皆有損無益世之愚者有雖無邪心而惟知竭力順上為忠者葢不知弗損益之之義也九二剛中非有邪心者但當損下益上之時惟知損己以奉上而不知臣道之少貶未有能致益其君者故有弗損益之之戒益之初九曰利用為大作元吉无咎象曰元吉无咎下不厚事也伊川易傳曰在下者本不當處厚事厚事重大之事也以為在上所任所以當大事必能濟大事而致元吉乃為无咎能致元吉則在上者任之為知人己當之為勝任不然則上下皆有咎也大作即厚事之謂也卦當損上益下初居最下受上之益是當大任者必尭濟其事而大善上下乃可无咎革而無甚益猶可悔也況反害乎古人所以重改作也革卦彖傳事之變更則於大體不能無傷苟非有大益無後患君子不輕於改作漸之九三曰利禦寇伊川易傳曰君子之與小人比也自守以正豈惟君子自完其己而已乎亦使小人得不陷於非義是以順道相保禦止其惡也九三上下皆隂是君子與小人同列相比也君子以守正而不失其身小人亦以近正而不敢為惡以順道而相保禦是能止其惡也旅之初六曰旅瑣瑣斯其所取災伊川易傳曰志卑之人既處旅困鄙猥瑣細無所不至乃其所以致悔辱取災咎也初居旅之下故為志卑之人此教人處旅困之道當略細故存大體斯免悔咎也在旅而過剛自高致困災之道也旅卦九三象傳過剛則暴戾而乏和順自高則矯亢而人不親附處旅如是必致困災兊之上六曰引兊象曰未光也伊川易傳曰說既極矣又引而長之雖說之之心不已而事理已過實無所說事之盛則有光輝既極而強引之長其無意味甚矣豈有光也兌之上六恱之極也恱極而復引之事既過而強為恱何輝光之有中孚之象曰君子以議獄緩死伊川易傳曰君子之於議獄盡其忠而已於決死極於惻而已天下之事無所不盡其忠而議獄緩死最其大者也議獄而無不盡之心致其審也決死而存不忍之心致其愛也君子雖無往不盡其中心之誠而於議獄緩死則尤其所謹重者也事有時而當過所以從宜然豈可甚過也如過恭過哀過儉大過則不可所以小過為順乎宜也能順乎宜所以大吉小過卦彖傳禮過乎恭喪過乎哀用過乎儉皆小過之以順乎事之宜若過之甚則恭為足恭哀為毁瘠儉為鄙恡又失其宜矣防小人之道正己為先小過卦九三傳待小人之道先當正己己一於正則彼雖姦詐将無間之可乘矣其他防患之道皆當以正己為先周公至公不私進退以道無利欲之蔽周公之心在於天下國家而不在其身是以至公無私而進退合道葢無一毫利欲之蔽其處己也夔夔然存恭畏之心其存誠也蕩蕩然無顧慮之意所以雖在危疑之地而不失其聖也夔夔戒謹卑順之貌存誠者自信之篤也蕩蕩明白坦平之義聖人雖當危疑之地既不忿戾而改常亦不疑懼而失守是為不失其聖也詩曰公孫碩膚赤舄几几經說下同詩狼跋篇碩大也膚美也遜避讓也謂有大美而謙遜不居也赤舄赤服之舄也几几進退安重貌葢其恭順安舒之意如此採察求訪使臣之大務採察民隠求訪賢才二事使職之大者也明道先生與吴師禮談介甫之學錯處謂師禮曰為我盡達諸介甫我亦未敢自以為是如有說願往復此天下公理無彼我果能明辨不有益於介甫則必有益於我遺書下同先生忠誠懇至詞氣和平如此豈若悻悻好勝自是者之為哉天祺在司竹常愛用一卒長及将代自見其人盜筍皮遂治之無少貸罪己正待之復如初略不介意其徳量如此徳量大則不為喜怒所遷明道因論口將言而囁嚅云若合開口時要他頭也須開口本註云如荆軻於樊於期須是聴其言也厲囁嚅欲言而不敢發之貌厲剛決之意理明義直内無不足則出於口者自然剛決不可回撓安有囁嚅之態朱子曰合開口者亦曰理之所當言樊於期事非理所得言特取其事之難言而猶言之耳須是就事上學蠱振民育徳然有所知後方能如此何必讀書然後為學振民育徳修己治人之事也然必知之至而後行之至無非學也豈但讀書而謂之學哉子路亦嘗有是言而夫子斥之何也葢為學之道固不専於讀書必以讀書為窮理之本子羔既未及為學而遽使之以仕為學則非持失知行之序而且廢窮理之大端臨事錯繆安能各當其則哉程子之教固以讀書窮理為先務然不就事而學則捨簡策之外凡應事接物之際不知所以用力其學之間㫁多矣二者之言各有在也先生見一學者忙迫問其故曰欲了幾處人事曰某非不欲周旋人事者曷常似賢急迫事雖多為之必有序事雖急應之必有節未聞可以急遽苟且而處之者安定之門人往往知稽古愛民矣則於為政也何有胡安定教學者以通經術治時務明體適用故其門人皆知以稽古愛民為事稽古則為政之法愛民則為政之本門人有曰吾與人居視其有過而不告則於心有所不安告之而人不受則奈何明道曰與之處而不告其過非忠也要使誠意之交通在於未言之前則言出而人信矣誠意素孚則信在言前又曰責善之道要使誠有餘而言不足則於人有益而在我者無自辱矣誠意多於言語則在彼有感悟之益在我無煩瀆之辱職事不可以巧免職所當為而巧圗規避是自私用智之人也居是邦不非其大夫此理最好朱子曰下訕上則無忠敬之心克勤小物最難不忽於小謹之至也欲當大任須是篤實篤實則力量深厚而謀慮審固斯可以任大事凡為人言者理勝則事明氣忿則招怫理勝而氣平則人易曉而聴亦順或者理雖明而挾忿氣以勝之則反致扞格矣居今之時不安今之法令非義也若論為治不為則己如復為之須於今之法度内處得其當方為合義若須更改而後為則何義之有中庸曰非天子不議禮不制度不考文居下位而守上之法令義也由今之法而處得其宜斯為善矣若率意改作則已失為下之義今之監司多不與州縣一體監司専欲伺察州縣州縣専欲掩蔽不若推誠心與之共治有所不逮可教者教之可督者督之至於不聴擇其甚者去一二使足以警衆可也伊川先生曰人惡多事吾甚憫之世事雖多盡是人事人事不教人做更責誰做人事雖多皆人所當為者苟有厭事之意則應之必不盡其理矣感慨殺身者易從容就義者難一時感慨至於殺身而不顧此匹夫匹婦猶或能之若夫從容就義死得其所自非義精仁熟者莫之能也中庸曰白刃可蹈中庸不可能是也張南軒曰君子不避難亦不入於難惟當夫理而已於所不當避而避固私也於所不當預而預乃勇於就難是亦私而已如曾子子思之避寇或不避三仁之或死或不死皆從容乎義之所當然而已人或勸先生以加禮近貴先生曰何不見責以盡禮而責之以加禮禮盡則已豈有加也此與孟子不與右師言同意或問簿佐令者也簿所欲為令或不從奈何曰當以誠意動之今令與簿不和只是爭私意令是邑之長若能以事父兄之道事之過則歸己善則惟恐不歸於令積此誠意豈有不動得人過則歸之己善則歸之令非曰姑為此以恱人葢事長之道當如是也問人於議論多欲直己無含容之氣是氣不平否曰固是氣不平亦是量狹量狹故常欲己勝而無含容之氣人量隨識長亦有人識高而量不長者是識實未至也見識陋則人己得失之間皆為之動是即量之狹也故識之長則量亦長大凡别事人都強得惟識量不可強惟識與量則隨人天資學力所至而不可強也今人有斗筲之量有釜斛之量有鍾鼎之量十升為斗筲竹器容斗二升釡容六斗四升十斗為斛十斛為鍾有江河之量江河之量亦大矣然有涯有涯亦有時而滿惟天地之量則無滿故聖人者天地之量也聖人之量道也常人之有量者天資也聖人之心純乎道道本無外故其量亦無涯天資者氣禀也氣禀則有涯常人而能學以通乎道極其至則亦聖人之無涯也天資有量須有限大抵六尺之軀力量只如此雖欲不滿不可得也如鄧艾位三公年七十處得甚好及因下蜀有功便動了謝安聞謝𤣥破苻堅對客圍棋報至不喜及歸折屐齒強終不得也事見魏晉史更如人大醉後益恭謹者只益恭謹便是動了雖與放肆者不同其為酒所動一也又如貴公子位益高益卑謙只卑謙便是動了雖與驕傲者不同其為位所動一也居之如常而不為異者量足以勝之也一有意於其間雖驕肆謙恭之不同要皆為彼所動也然惟知道者量自然宏大不勉強而成今人有所見卑下者無他亦是識量不足也知道者雖窮居陋巷而不加損雖祿之以天下而不加益舉世譽之而不加勸舉世非之而不加慍何者道固不為之而有増損也人纔有意於為公便是私心公者天理之自然有意為之則計較安排即是私意昔有人典選其子弟係磨勘皆不為理此乃是私意選舉朝廷之選舉也進退之權實非己之所得而有子弟該磨勘而不為理葢避私嫌而不知如此是以選舉為己之私恩乃是私意也於此可以識大公之道矣人多言古時用直不避嫌得後世用此不得自是無人豈是無時本注云因言少師典舉明道薦才事苟能以至公之心行至公之道何嫌之避何時而不可行君實嘗問先生云欲除一人給事中誰可為者先生曰初若泛論人材却可今既如此頤雖有其人何可言君實曰出於公口入於光耳又何害先生終不言泛論人材則無不可若擇人任職乃宰相之事非在下位者所可與矣此制義之方也先生云韓持國服義最不可得一日頤與持國范夷叟泛舟於潁昌西湖須臾客將去有一官員上書謁見大資頤將為有甚急切公事乃是求知己頤云大資居位却不求人乃使人倒來求己是甚道理韓維字持國范純禮字夷叟在上位者當勤於求賢豈當待人反求知求知者失己使之求知者失士夷叟云只為正叔太執求薦章常事也頤云不然只為曾有不求者不與來求者與之遂致人如此持國便服先生因言今日供職只第一件便做他底不得吏人押申轉運司状頤不曾簽國子監自係臺省臺省係朝廷官外司有事合行申状豈有臺省倒申外司之理只為從前人只計較利害不計較事體直得恁地春秋書法王人雖微序於諸侯之上尊王也須看聖人欲正名處見得道名不正時便至禮樂不興是自然住不得說見論語名分不正則施之於事者顛倒而無序乖戾而不和禮樂何以興此自然必至之勢學者不可不通世務天下事譬如一家非我為則彼為非甲為則乙為君子存心正大如此其所以講明世道者葢亦非分外之事也人無逺慮必有近憂思慮當在事外外書下同蘓氏曰慮不在千里之外則患在几席之下此以地之逺近言也一說先事而圗之則事至而無患此以時之逺近言也然其理則一也聖人之責人也常緩便見只欲事正無顯人過惡之意伊川先生云今之守令惟制民之産一事不得為其他在法度中甚有可為者患人不為耳制民之産謂井田貢助之法明道先生作縣凡坐處皆書視民如傷四字嘗曰顥常愧此四字伊川先生每見人論前輩之短則曰汝輩且取他長處揚人之短本為薄徳況前輩乎劉安禮云王荆公執政議法改令言者攻之甚力明道先生嘗被㫖赴中堂議事荆公方怒言者厲色待之先生徐曰天下之事非一家私議願公平氣以聴荆公為之媿屈附録下同劉立之字安禮程子門人也熙寧初王荆公安石參知政事創制新法中外皆言其不便荆公獨憤然不顧明道先生權監察御史裏行被㫖赴中堂議事從容一言之間荆公乃為之媿屈葢有以破其私己之見而消其忿厲之氣也劉安禮問臨民明道曰使民各得輸其情民情皆得以上聞則自無不得其所之患然非平易聰達者能之乎問御吏曰正己以格物居上既正則下有所感而正矣非徒事乎刑罰之嚴也横渠先生曰凡人為上則易為下則難然不能為下亦未能使下不盡其情偽也大抵使人常在其前已嘗為之則能使人文集樂於使人而憚於事人此人常情也然知事人之道然後知使人之道已未嘗事人則使人之際必不能盡其情坎維心亨故行有尚外雖積險苟處之心亨不疑則雖難必濟而往有功也坎為重險故曰積險二五以剛居中故外雖有積險其中心自亨通而無所疑懼也心亨而無疑則可以出險矣今水臨萬仞之山要下即下無復凝滯之在前惟知有義理而已則復何回避所以心通易說下同水此以坎象而言人於義理苟能信之篤行之決如之就下則沛然而莫禦何往而不心亨哉人所以不能行己者於其所難者則惰其異俗者雖易而羞縮惟心𢎞則不顧人之非笑所趨義理耳視天下莫能移其道志不立氣不充故有怠惰與羞縮惟心𢎞則立志逺大義理勝則氣充然為之人亦未必怪正以在己者義理不勝惰與羞縮之病消則有長不消則病常在意思齷齪無由作事滕文公行三年之喪始也父兄百官皆不欲文公以義理所當為發哀戚之誠心人亦莫不恱服所患在我義理不勝則不能自強故有惰與羞縮之患在古氣節之士冒死以有為於義未必中然非有志槩者莫能況吾於義理已明何為不為志氣感慨雖未必中於義而死且不顧況吾義理既明尚何怠惰羞縮之為舉重明輕所以激昂兼懦之士姤初六羸豕孚蹢躅豕方羸時力未能動然至誠在於蹢躅得伸則伸矣羸弱也蹢躅跳躍也豕性隂躁雖當羸弱之時其誠心未嘗不在於動也得肆則肆矣猶小人雖困志在求逞君子所當察也如李徳裕處置閹宦徒知其帖息威伏而忽於志不忘逞照察少不至則失其幾也唐武宗時徳裕為相君臣契合莫能間之宦寺之徒帖息畏伏誠若無能為者而不知其志在求逞也繼嗣重事卒定於宦者之手而徳裕逐矣葢幾微之間所當深察人教小童亦可取益絆已不出入一益也取益謂有益於己絆牽繫也授人數數已亦了此文義二益也數數猶頻數也了曉徹也對之必正衣冠尊瞻視三益也常以因己而壊人之才為憂則不敢墮四益也語録此段當在十一卷之末近思録卷十
