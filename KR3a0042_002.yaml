body:
  text: 近思録卷二宋朱子吕祖謙同編葉采集解爲學凡一百一十一條此卷總論為學之要盖尊徳性矣必道問學明乎道體知所指歸斯可究為學之大凡矣濂溪先生曰聖希天賢希聖士希賢朱子曰希望也字本作晞伊尹顔淵大賢也伊尹恥其君不為堯舜一夫不得其所若撻於市顔淵不遷怒不貳過三月不違仁朱子曰説見書及論語皆賢人之事也志伊尹之所志學顔子之所學朱子曰此言士希賢也過則聖及則賢不及則亦不失於令名通書下同朱子曰三者随其用力之淺深以為所至之近逺不失令名以其有為善之實也胡氏曰周子患人以發䇿決科榮身肥家希世取寵為事也故曰志伊尹之所志患人以廣聞見工文辭矜智能慕空寂為事也故曰學顔子之所學人能志此志而學此學則知斯道之大而其用無窮矣聖人之道入乎耳存乎心藴之為徳行行之為事業彼以文辭而已者陋矣朱子曰欲人真知道徳之重而不溺於文辭之陋也或問聖人之門其徒三千獨稱顔子為好學夫詩書六藝三千子非不習而通也然則顔子所獨好者何學也哀公問弟子孰為好學孔子對曰有顔回者好學不幸短命死矣今也則亡六藝禮樂射御書數史記曰弟子盖三千焉身通六藝者七十二人伊川先生曰學以至聖人之道也聖人可學而至歟曰然聖人生知學者學而知之及其知之則一也聖人安行學者勉而行之及其成功則一也學之道如何曰天地儲精得五行之秀者為人人物萬殊莫非二氣五行之所為也然人則得其精且秀者是以能通於道而為聖為賢其本也真而靜其未發也五性具焉曰仁義禮智信真者無極之真也靜者人生而靜天之性也曰真而靜者謂其天理渾全寂然不動而所具之性其目有是五者旣曰本又曰未發蓋本者指其禀受之初未發者指其未與物接之前也形既生矣外物觸其形而動其中矣其中動而七情出焉曰喜怒哀樂愛惡欲此言形生之後應事接物之時也物感於外情動於中其目有是七者然喜近於樂怒近於惡愛近於欲其所以分者盖喜在心樂發散在外怒則有所激其氣憤惡則有所憎其意深愛則近於公欲則近於私愛施於人而欲本乎巳也情既熾而益蕩其性鑿矣是故覺者約其情使合於中正其心養其性愚者則不知制之縱其情而至於邪僻梏其性而亡之性動則為情然情炎於中末流益蕩則反戕賊其性矣惟夫明覺之士以禮制情使不失乎中故能正其心而不流於邪僻養其性而不至於梏亡愚者反是梏猶桎梏謂拘攣而暴殄之言人之所以貴於學也然學之道必先明諸心知所徃然後力行以求至所謂自明而誠也往一作養朱子曰明諸心知所往窮理之事力行求至踐履之事也或曰知所養應上文養其性涵養之功與知行並進誠之之道在乎信道篤信道篤則行之果行之果則守之固仁義忠信不離乎心造次必於是顛沛必於是出處語黙必於是乆而弗失則居之安動容周旋中禮而邪僻之心無自生矣此因上文言所以誠之之道也信道篤則不惑行之果則不止守之固則不變朱子曰造次急遽苟且之時顛沛傾覆流離之際也以上兩節論為學之道詳盡其大綱有三焉明諸心知所徃者智之事也力行以求至者仁之事也信道篤以下勇之事也然勇之中亦備此三者故信之篤者知之勇也行之果者仁之勇也守之固者勇之勇也仁義忠信不離乎心者信之篤也造次顛沛出處語黙必於是者行之果也乆而弗失守之固也動容周旋中禮邪僻之心不生則幾於化矣故顔子所事則曰非禮勿視非禮勿聴非禮勿言非禮勿動禮者天理之節文非禮者私欲之害乎天理者也勿者禁止之辭凡視聴言動克去巳私則日用之間莫非天理之流行矣此孔子教顔子為仁之目而顔子之所請事者也仲尼稱之則曰得一善則拳拳服膺而弗失之矣又曰不遷怒不貳過有不善未嘗不知知之未嘗復行也此其好之篤學之之道也中庸子曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣拳拳奉持之貌服猶佩也膺胷也凡得一善言善行則奉持佩服於心胷不敢忘也又語曰不遷怒不貳過怒所當怒各止其所不遷也才過即改巳改不再不貳也又易繫辭傳曰有不善未嘗不知知之未嘗復行也有不善而必知之是察巳之明也知之而不復行是克巳之誠也皆孔子所以稱顔子好學之道也然聖人則不思而得不勉而中顔子則必思而後得必勉而後中其與聖人相去一息所未至者守之也非化之也以其好學之心假之以年則不日而化矣聖人生知故不思而得安行故不勉而中顔子猶必擇善而固執之然其博文約禮工力俱到其未至於聖人者特一息之間耳使非短命而死則不淹時日所守者化而與聖人一矣後人不逹以謂聖本生知非學可至而為學之道遂失不求諸巳而求諸外以博聞强記巧文麗辭為工榮華其言鮮有至於道者則今之學與顔子所好異矣文集後世聖學無傳不知反身修徳徒以記問詞章為學去道愈逺矣横渠先生問於明道先生曰定性未能不動猶累於外物何如明道先生曰所謂定者動亦定靜亦定無將迎無内外此章就猶累於外物一句反覆辨明盖萬物不同而無理外之物萬理不同而無性外之理凡天下之物理酬酢萬端皆吾性之所具也所謂定性者非一定而不應也發而中節動亦定也敬而無失靜亦定也將送也事之往也無將事之來也無迎動靜一定何有乎將迎寂然不動者存於内也感而遂通者應於外也體用一貫何間乎内外苟以外物為外牽巳而從之是以巳性為有内外也且以性為隨物於外則當其在外時何者為在内是有意於絶外誘而不知性之無内外也既以内外為二本則又烏可遽語定哉承上文而言苟以外物為外凡應物者必牽巳而從之是以性為有内外如是則方其逐物在外之時在内已無此性矣其可乎盖有意於絶外物之誘而不知性本無内外之分也既分内外為兩端則人在天地間不能不與物接是無時而能定也夫天地之常以其心普萬物而無心聖人之常以其情順萬事而無情故君子之學莫若廓然而大公物來而順應常常理也天地之心運用主宰者是也然而普遍萬物實未嘗有心焉聖人之情應酬發動者是也然而隨順萬事亦未嘗容情焉故君子之學廓然大公何嫌於外物物來順應何往而不定哉此二句又此書之綱領也易曰貞吉悔亡憧憧往來朋從爾思苟規規於外誘之除將見滅於東而生於西也非惟日之不足顧其端無窮不可得而除也咸卦九四象辭憧憧往來不絶貎各以朋類從其所思盖人之一心應感無窮苟惡外物之誘而欲除滅之將見滅於彼而生於此非惟日見其用力之不足而亦有不可得而除滅者矣人之情各有所蔽故不能適道大率患在於自私而用智自私則不能以有為為應迹用智則不能以明覺為自然今以惡外物之心而求照無物之地是反鑑而索照也人心各有所蔽大㮣在自私與用智之兩端盖不能廓然而大公故自私不能物來而順應故用智自私者則樂於無為而不知以有為為應迹之當然用智者則作意於有為而不知以明覺為循理之自然今惡外物之累已是自私之心也而求照無物之地是亦用智之過也猶反鑑以索照寧可得哉盖自私與用智雖若二病而實展轉相因也或問自私用智之語恐即是佛氏之自私朱子曰常人之私意與佛氏之自私皆一私也但明道説得闊非専指佛之自私也愚謂横渠欲去外物之累便已近於釋氏故程子推其病源自然與釋氏相似然其自私類於釋而用智則又類於老要之二氏用意皆欲不累於外物而已易曰艮其背不獲其身行其庭不見其人孟氏亦曰所惡於智者為其鑿也朱子曰不獲其身不見其人此説廓然而大公所惡於智為其鑿也此説物來而順應與其非外而是内不若内外之兩忘也兩忘則澄然無事矣無事則定定則明明則尚何應物之為累哉自私用智之患其根在於分内外為二以在外者為非在内者為是然在外者終不容以寂滅故常為外物所撓惟能知性無内外而兩忘之則動靜莫非自然澄然無事矣所謂廓然大公者也無事則心無所累故能明明則物來順應尚何外物之累哉盖内外兩忘則非自私能定而明則非用智朱子曰内外兩忘非忘也一循乎理不是内而非外也聖人之喜以物之當喜聖人之怒以物之當怒是聖人之喜怒不係於心而係於物也是則聖人豈不應於物哉烏得以從外者為非而更求在内者為是也今以自私用智之喜怒而視聖人喜怒之正為何如哉聖人未嘗無喜怒是未嘗自私也然其喜怒皆係彼而不係此是未嘗用智也以自私用智之喜怒其視聖人之喜怒一循乎天理之正者豈不大相戻哉夫人之情易發而難制者惟怒為甚第能於怒時遽忘其怒而觀理之是非亦可見外誘之不足惡而於道亦思過半矣朱子曰忘怒則公觀理則順伊川先生答朱長文書曰聖賢之言不得已也盖有是言則是理明無是言則天下之理有闕焉如彼耒耜陶冶之器一不制則生人之道有不足矣聖賢之言雖欲巳得乎然其包涵盡天下之理亦甚約也耒之首為耜耜之柄為耒範土曰陶鑄金曰冶聖賢之言本非得巳也盖將發明天理以覺斯民猶民生日用之具不可缺也然其言寡而理無不該亦非以多言為貴也後之人始執卷則以文章為先平生所為動多於聖人然有之無所補無之靡所闕乃無用之贅言也不止贅而巳既不得其要則離真失正反害於道必矣後人徒志於為文而不足以明理則非徒無益而已盖不得其本未免流於邪偽反害於道矣來書所謂欲使後人見其不忘乎善此乃世人之私心也夫子疾沒世而名不稱焉者疾没身無善可稱云爾非謂疾無名也名者可以厲中人君子所存非所汲汲君子學以為巳苟求人知則是私心而已内積忠信所以進徳也擇言篤志所以居業也乾九三文言傳朱子曰内積忠信是實心擇言篤志是實事又曰忠信者如惡惡臭如好好色表裏無一毫之不實擇言謂脩辭篤志謂立誠立誠即上文忠信又曰内有忠信方能脩辭徳以心言業者徳之事徳要日新又新故曰進業要存而不失故曰居進如日知其所亡居如月無忘其所能進徳脩業只是一事知至至之致知也求知所至而後至之知之在先故可與幾所謂始條理者知之事也至謂至善之地也求知至善之地而後至其所知所重者在知故曰可與幾盖幾者動之微事之先見者也致知以正其始則能得乎事之幾微矣智者知之至明也知終終之力行也既知所終則力進而終之守之在後故可與存義所謂終條理者聖之事也此學之始終也易傳下同終即至善之盡處也既知所終則力行而終之所重在行故曰可與存義盖義者當然之則存者守而勿失也力行以成其終斯能立乎事之則義矣聖者行之至盡也始終條理之説詳見孟子君子主敬以直其内守義以方其外敬立而内直義形而外方義形於外非在外也坤六二丈言傳敬主於中則動靜之間心存戒謹自然端直而無邪曲之念義見於外則應酬之際事當其則自然方正而無回撓之私然義之用逹於外耳義非在外也敬義既立其徳盛矣不期大而大矣徳不孤也内直外方敬義交養其徳自然盛大故曰不孤也無所用而不周無所施而不利孰為疑乎徳至於大則其所行無一而不備無往而不順故曰不疑其所行也動以天為无妄動以人欲則妄矣无妄之義大矣哉震下乾上為无妄震動也乾天也故曰動以天妄邪偽也動而純乎天理則無邪偽矣雖無邪心苟不合正理則妄也乃邪心也既已无妄不宜有往往則妄也故无妄之彖曰其匪正有眚不利有攸徃心雖非出於邪妄而見理不明所為或乖於正理是即妄也即邪心也故无妄而有匪正之眚又事至於无妄則得所止矣不宜有往往乃過也過則妄也故曰不利有攸徃人之藴蓄由學而大在多聞前古聖賢之言與行考跡以觀其用察言以求其心識而得之以蓄成其徳大畜卦象傳考聖賢之行可以觀其用察聖賢之言可以求其心有見於此則蓄徳日大盖非徒多聞之為貴咸之象曰君子以虚受人伊川易傳曰中無私主則無感不通以量而容之擇合而受之非聖人有感必通之道也咸者感也故咸卦皆以感為義惟虚中而無所私主則物來能應有感必通也若夫有量則必有限有合則必有不合此非聖人感通之道也其九四曰貞吉悔亡憧憧往來朋從爾思傳曰感者人之動也故咸皆就人身取象四當心位而不言咸其心感乃心也感之道無所不通有所私係則害於感通所謂悔也聖人感天下之心如寒暑雨𤾉無不通無不應者亦貞而已矣貞者虚中無我之謂也咸卦取象人身初為拇二為腓三為股五為脢上為輔頰舌四當心位而不言心者感者必以心也有感則有通然使在此者有所私係則為感之道狹矣心所不通是悔也聖人之感天下如寒暑雨𤾉周遍公溥無所私係故無不通應所謂貞吉而悔亡也或謂貞者正也未有解為虚中無我者愚聞之師曰諸卦之貞各随卦義以為正乾以健為貞坤以順為貞故曰利牝馬之貞虚中無我者咸之貞也然此與象以虚受人異者盖象取山澤通氣之義謂虚中以受人之感爻取四為感之主謂虚中以感人也惟虚則能應人之感惟虚則能感人之應其理則一也若往來憧憧然用其私心以感物則思之所及者有能感而動所不及者不能感也以有係之私心既主於一隅一事豈能廓然無所不通乎憧憧徃來者私心也若無私心則湛然泰然何至憧憧也惟其私心有係故其所思者有及與不及而其所感者有通與不通所謂朋從爾思者盖思惟及其朋類亦惟朋類乃從其思耳君子之遇艱阻必自省於身有失而致之乎有所未善則改之無歉於心則加勉乃自修其徳也蹇卦象傳此教人以處艱阻之道自省其身而有不善則當速改不可以怠而廢苟無愧焉則益當自勉不可以阻而廢君子反躬之學雖遇艱阻亦莫非進徳之地非明則動無所之非動則明無所用豐卦初九傳知行相需不可偏廢非知之明則動將安之如目盲之人動則不知所之也非行之力則明亦無所用如足痿之人雖有見焉亦不能行矣習重習也時復思繹浹洽於中則説也說見論語繹往來紬繹也學者於所學之事時時思繹不驟不輟義理乆則浹洽其中自然悦豫也以善及人而信從者衆故可樂也善有諸巳足以及人信從者衆同歸於善豈不可樂也盖與人為善之意如此雖樂於及人不見是而無悶乃所謂君子經説下同君子者成徳之名也雖樂於以善及人然人或未信則亦安其在我而已奚慍焉盖自信之篤而無待於外所以為成徳也古之學者為巳欲得之於巳也今之學者為人欲見知於人也説見論語為己者如食之求飽衣之求溫溫飽在巳非為人也為人者但求在外之美觀非關在我之實用故學而為巳則所得者皆實得學而為人剛雖或為善亦非誠心况乎志存務外自為欺誑善日消而惡日長矣朱子曰為學且須分内外義利便是生死路頭伊川先生謂方道輔曰聖人之道坦如大路學者病不得其門耳得其門無逺之不可到也求入其門不由於經乎今之治經者亦衆矣然而買櫝還珠之蔽人人皆是經所以載道也誦其言辭解其訓詁而不及道乃無用之糟粕耳説見韓子方元宷字道輔經所以載道猶櫝所以藏珠治經而遺乎道猶買櫝而還其珠覬足下由經以求道勉之又勉異日見卓爾有立於前然後不知手之舞足之蹈不加勉而不能自止矣手帖道非有形狀之可見盖其志道之切行道之篤視聴言動造次顛沛不違乎道用力既乆所見益為親切如有卓然而立於前者則中心喜樂自然欲罷不能矣明道先生曰修辭立其誠不可不子細理㑹言能修省言辭便是要立誠若只是修飾言辭為心只是為偽也修省言辭者中有其誠省治之將以立實徳也修飾言辭者中無其誠虚飾之將以為誇美也省飾之間乃天理人欲之分朱子曰横渠以立言傳後為修辭明道所謂修辭但是非理勿言若修其言辭正為立巳之誠意乃是體當自家敬以直内義以方外之實事敬義説見前誠意者合敬義之實而為言也體當俗語猶所謂體驗勘當也盖修其言辭者所以擬議其敬義之實事而非徒事於虚辭也道之浩浩何處下手惟立誠纔有可居之處有可居之處則可以修業也浩浩流行盛大貎下手謂用力處道之廣大於何用功惟立巳之誠意始有可據守之地此誠既立則其業之所就日以廣大終日乾乾大小大事却只是忠信所以進徳為實下手處修辭立其誠為實修業處遺書下同説並見易文言君子終日乾乾是體天行健之事可謂大矣然其實則惟忠信積於内而無一念之不實者為用功之地修辭立於外而無一言之不實者為見功之地盖表裏一於誠至誠故乾乾而不息伊川先生曰志道懇切固是誠意若迫切不中理則反為不誠盖實理中自有緩急不容如是之迫觀天地之化乃可知有志於道懇惻切至固誠意也然迫切之過而至於欲速助長則反害乎實理如春生夏長秋成冬實固不容一息之間斷亦不能一日而遽就也孟子才髙學之無可依據學者當學顔子入聖人為近有用力處孟子天資超邁故難學顔子天資純粹而功夫縝宻進徳有序故學者有用力處又曰學者要學得不錯須是學顔子本註云為有凖的明道先生曰且省外事但明乎善惟進誠心其文章雖不中不逺矣所守不約泛濫無功朱子曰知至則意誠善才明誠心便進文章是威儀制度之類此段恐是呂與叔自關中來初見程子時説話盖横渠學者多用心於禮文制度之事而不近裏故以此告之學者識得仁體實有諸巳只要義理栽培如求經義皆栽培之意仁者天地之生理人心之全徳也其體具於心固人之所本有然必内反諸巳察之精養之厚有以見夫仁之全體實為巳有則吾心所存無非天理而後博求義理以封殖之則生理日以充長而仁不可勝用矣昔受學於周茂叔毎令尋顔子仲尼樂處所樂何事朱子曰按程子之言引而不發盖欲學者深思而自得之今亦不敢妄為之説學者但當從事於博文約禮之誨以至於欲罷不能而竭其才則庶乎其可以得之矣所見所期不可不逺且大然行之亦須量力有漸志大心勞力小任重恐終敗事朱子曰學者之志固不可不以逺大自期然苟悦其髙而忽於近慕於大而略於細則無漸次經由之實而徒有懸想跂望之勞亦終不能以自逹矣張南軒曰學者當以聖人為準的然貪髙慕逺躐等以進非徒無益而又害之也朋友講習更莫如相觀而善工夫多朋友相處非獨講辨之功薰陶漸染得於觀感自然進益須是大其心使開闊譬如為九層之臺須大做脚始得心不開闊則規模狹陋而安於小成持守固滯而惰於進善明道先生曰自舜發於畎畝之中至孫叔敖舉於海若要熟也須從這裏過説見孟子履難處困則歴變多而慮患深察理宻而制事審朱子曰曾親歴過方認得許多險阻去處參也竟以魯得之按程子又曰曾子之學誠篤而已聖門學者聰明才辯不為不多而卒傳其道乃質魯之人耳故學以誠實為貴也尹氏曰曾子之才魯故其學也確所以能深造乎道也明道先生以記誦博識為玩物喪志本注云時以經語録作一冊鄭轂云嘗見顯道先生云某從洛中學時録古人善行别作一冊明道先生見之曰是玩物喪志盖言心中不冝容絲髪事胡安國曰謝先生初以記聞為學自負該博對明道舉史書成篇不遺一字明道先生曰賢却記得許多可謂玩物喪志謝聞此語汗流浹背而發赤及看明道讀史又却逐行看過不蹉一字謝甚不服後來省悟却將此事做話頭接引博學之士謝良佐字顕道上蔡人程子門人也人心虚明所以具衆理而應萬事有所繫滯則本志未免昏塞所貴乎讀書將以存心而明理也苟徒務記誦為博則書也者亦外物而已故曰玩物喪志朱子曰上蔡記誦明道看史此正為巳為人之分禮樂只在進反之間便得性情之正以上並明道語樂記曰禮主其減樂主其盈禮減而進以進為文樂盈而反以反為文朱子曰減是退讓撙節收歛的意思是禮之體本如此然非人之所欲故須進歩向前著力去做故以進為文盈是舒暢發越快滿底意思是樂之體本如此然易至於流蕩却湏收拾向裏故以反為文又曰禮減而不進則銷樂盈而不返則放故禮有報而樂有反父子君臣天下之定理無所逃於天地之間安得天分不有私心則行一不義殺一無辜有所不為有分毫私便不是王者事父子君臣人倫之大端天下之定理立於天地之間者必有所不容廢者也惟能全其天理而無私心者則處之各當其分而行一不義之事殺一不辜之人雖可以得天下亦不為也盖堯舜受禪無虧父子之恩湯武征伐無愧君臣之義皆無私心故也論性不論氣不備論氣不論性不明二之則不是此段疑當在首卷論性之善而不推其氣稟之不同何以有上智下愚之不移故曰不備論氣稟之異而不原其性之皆善則是不逹其本也故曰不明然性者氣之理氣者性之質元不相離判而二之則亦非矣朱子曰論性不論氣孟子言性善是也論氣不論性荀子言性惡揚子言善惡混是也愚謂孟子推原性之本善雖未及乎氣質固不害其為性也至於荀揚但知氣質之或異而不知性之本同則是不識性也豈不害道要之必若程子横渠之言始為明備論學便要明理論治便須識體論學而不明理則徒事乎詞章記誦之末未為知學也論治而不識其體則徒講乎制度文為之末未為知治也曾㸃漆雕開已見大意故聖人與之曾㸃言志以為莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸盖有見於是道之大流行充滿而於日用之間從容自得有與物各適其所之意子使漆雕開仕對曰吾斯之未能信開於是理必有見焉顧於應酬之際未能自信其悉中乎是理此其所見之大而不安於小成所守之篤而必期於自信二者雖其行之未成要皆有見於聖人之大意朱子曰㸃更規模大開更縝宻蔡節齋曰㸃之意欲上開之意方進而未巳根本湏是先培壅然後可立趨向也趨向既正所造淺深則由勉與不勉也涵養心徳根本深厚然後立趨向而不差又勉而不已乃能深造朱子曰收其放心然後自能尋向上去亦此意也敬義夾持直上逹天徳自此朱子曰敬主乎中義方乎外二者相夾持要放下霎時也不得只得直上去故便逹天徳又曰表裏夾持更無東走西作直上者不為物欲所累則可上逹天徳矣懈意一生便是自棄自暴不學便老而衰學問則義理為主故閲理乆而益以精明不學則血氣為主故閲時乆而益以衰謝人之學不進只是不勇志氣之勇學者為氣所勝習所奪只可責志立志之不大不剛則義理不足以勝其氣質之固蔽學力不足以移其習俗之纒繞故曰只可責志内重則可以勝外之輕得深則可以見誘之小道義重則外物輕造理深則嗜欲微董仲舒謂正其義不謀其利明其道不計其功仲舒詳見十四卷義者當然之理利者義之和也然君子惟欲正其義而已未嘗豫其其利有謀利之心則是有所為而為之非正其義也道者自然之路功者行道之效也然君子惟欲明其道而已未嘗計度其功有計功之心則是有私意介乎其間非明其道矣孫思邈曰膽欲大而心欲小智欲圓而行欲方可以為法矣思邈隋唐間人膽大則敢於有為心小則宻於察理智圓則通而不滯行方則正而不流朱子曰膽不大則卑陋心不小則狂妄圓而不方則譎詐方而不圓則執而不通大抵學不言而自得者乃自得也有安排布置者皆非自得也學而有得則暗者忽而明疑者忽而信欣然有契於心盖有所不能形容者安排布置即是著意强為非真自得也視聴思慮動作皆天也人但於其中要識得真與妄爾視聴思慮言動皆天理自然而不容巳者然順理則為真從欲則為妄明道先生曰學只要鞭辟近裏著巳而巳故切問而近思則仁在其中矣鞭辟近裏著巳者切巳之謂也切問近思而不泛逺則心徳存矣言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其參於前也在輿則見其倚於衡也夫然後行只此是學言必忠信而無一辭之欺誕行必篤敬而無一事之慢弛則以是而行於逺方異類猶可以誠實感通苟不信不敬則雖近而州里之間其可得而行乎然非可以暫焉而强為之也要必真積力乆随其所寓常若有見乎忠信篤敬之道而不可須㬰離者如此一於誠實自然信順無往而不可以上皆切巳之學切問近思者致知之事言忠信行篤敬者力行之事説並見論語質美者明得盡查滓便渾化却與天地同體其次惟莊敬持養及其至則一也朱子曰查滓是私意人欲之消未盡者人與天地本同體只縁查滓未去所以有間隔若無查滓便與天地同體質美者明得盡是見得透徹如顔子克巳復禮天理人欲截然兩段更無查滓其次既未到此則須莊敬持養以消去其查滓如仲弓出門如見大賔使民如承大祭常如此持養到乆亦自明徹矣忠信所以進徳脩辭立其誠所以居業者乾道也敬以直内義以方外者坤道也乾主健主動故進徳脩業皆進為不息之道坤主順主靜故敬直義方皆收歛裁節之道凡人才學便須知著力處既學便須知得力處始學而不知用力之地則何以為入道之端既學而不知得力之地則何以為造道之實學者隨其淺深必各有所自得不然是未嘗實用力於學也有人治園圃役知力甚勞先生曰蠱之象君子以振民育徳君子之事唯有此二者餘無他焉二者為巳為人之道也振民謂興起而作成之育徳謂涵養巳徳成巳成人皆吾道之當然外此則無益之事非君子所務矣博學而篤志切問而近思何以言仁在其中矣學者要思得之了此便是徹上徹下之道朱子曰四者皆學問思辨之事耳未及乎力行而為仁也然從事於此則心不外馳而所存自熟故曰仁在其中矣愚謂學問思辨學者所以求仁也然博學而篤志切問而近思皆懇切篤厚之意即此一念便是惻隱之心流行發見之地不待更求而仁之全體可識矣故曰徹上徹下之道𢎞而不毅則難立毅而不𢎞則無以居之本註云西銘言𢎞之道説見論語𢎞寛大毅剛强也𢎞而不毅則寛大有餘而規矩不足故不能自立毅而不𢎞則剛强有餘而狹陋自足故無以居之伊川先生曰古之學者優柔厭飫有先後次序今之學者却只做一塲話説務髙而已古之學者有序隨時隨事各盡其力優柔而不迫厭飫而有餘故其用功也實而自得也深後之學者躐等務髙徒資口耳之末而巳常愛杜元凱語若江海之浸膏澤之潤渙然冰釋怡然理順然後為得也杜預字元凱作春秋左氏經傳序中語也江海之浸則漸漬而深博膏澤之潤則優柔而豐腴此皆言涵養有漸而周徧融液也至於所見者明徹而無滓則渙然而冰釋所存者安裕而莫逆則怡然而理順學至於是其深造而自得也可知矣今之學者往往以游夏為小不足學然游夏一言一事却總是實後之學者好髙如人游心千里之外然自身却只在此言偃字子游卜商字子夏二子在孔門固非顔曽比然其所言所事皆明辨而力行之無非實也今之學者徒好髙而無實得則亦何所至哉脩養之所以引年國祚之所以祈天永命常人之至於聖賢皆工夫到這裏則有此應人生天壽有命而修養之士保煉精氣乃可以引年而獨壽國祚之修短有數而聖賢之君力行仁義乃可以祈天永命常人之質其視夫生知安行者亦逺矣然學而不已則可與聖賢為一凡是三者皆非一旦之功苟簡超越幸而得之者盖其工夫至到有此應效耳所以明學聖人者當真積力乆而得之也忠恕所以公平造徳則自忠恕其致則公平發乎真心之謂忠推以及人之謂恕忠恕則視人猶巳故大公而至平致極至也學者進徳則自忠恕其極至則公平仁之道要之只消道一公字公只是仁之理不可將公便喚作仁公而以仁體之故為仁仁者以天地萬物為一其理公而巳然言其理至公而無私必體之以人則其寛平溥博之中自然有惻怛慈愛之意斯所謂仁也體猶幹骨也朱子曰公則無情仁則有愛公字屬理愛字屬人克巳復禮不容一毫之私豈非公乎親親仁民而無一物之不愛豈非仁乎只為公則物我兼照故仁所以能恕所以能愛恕則仁之施愛則仁之用也恕者推於此愛者及於彼仁譬泉之源也恕則泉之流出愛則泉之潤澤公則疏通而無壅塞之謂也惟其疏通而無壅塞故能流而澤物今之為學者如登山麓方其迤邐莫不濶歩及到峻處便止須是要剛決果敢以進朱子曰為學須要剛毅果決悠悠不濟事且如發憤忘食樂以忘憂是什麽精神什麽骨力人謂要力行亦只是淺近語人既能知見一切事皆所當為不必待著意纔著意便是有個私心這一㸃意氣能得幾時子真知事之當然則不待著意自不容巳著意為之已是私心所謂私者非安乎天理之自然而出乎人力之使然也徒以其意氣之使然則亦必不能乆故君子莫急於致知知之必好之好之必求之求之必得之古人此箇學是終身事果能顛沛造次必於是豈有不得道理學是終身事則不求速成不容半塗而廢勉焉孳孳死而後巳可也顛沛造次必於是則無一事而非學無一時而不勉苟能如是其有得於斯道可必矣所以誘進學者之不容自巳也古之學者一今之學者三異端不與焉一曰文章之學二曰訓詁之學三曰儒者之學欲趨道舍儒者之學不可釋教言為訓釋古言為詁爾雅有釋訓釋詁是也儒者之學所以求道文章之學皆其末流問作文害道否曰害也凡為文不専意則不工若専意則志局於此又安能與天地同其大也書曰玩物喪志為文亦玩物也人所以參天地而並立者惟此心為之主耳苟志有所局又安能與天地參哉故玩習外物則正志喪失専意為文亦玩物也呂與叔有詩云學如元凱方成癖文似相如始類俳獨立孔門無一事只輸顔氏得心齋古之學者惟務養情性其他則不學今為文者専務章句悦人耳目既務悦人非俳優而何呂大臨字與叔張程門人也杜元凱嘗自謂有左氏癖所著訓解凡十餘萬言司馬相如作子虚上林等賦徒衒文辭務以悦人故曰類俳俳優倡戯也齋齋肅純一之意也心齋說見莊子曰古者學為文否曰人見六經便以為聖人亦作文不知聖人亦攄發胷中所藴自成文耳所謂有徳者必有言也聖人道全徳盛非有意於為文而文自不可及耳曰游夏稱文學何也曰游夏亦何嘗秉筆學為詞章也游夏盖習於詩書禮樂之文者舊説子游作檀弓子夏作樂記之類凡此皆道體之流行人事之儀則固未嘗秉筆學為如此之文而亦非若後世無用之空言也且如觀乎天文以察時變觀乎人文以化成天下此豈詞章之文也説見賁卦天文謂日月星辰之文人文謂人倫禮樂之文莫説道將第一等讓與别人且做第二等才如此説便是自棄雖與不能居仁由義者差等不同其自小一也言學便以道為志言人便以聖為志性無不善人所同得苟安於小成皆自棄也問必有事焉當用敬否曰敬是涵養一事必有事焉須用集義只知用敬不知集義却是都無事也孟子言養氣曰必有事焉又曰是集義所生者人之所為皆合於義自反無愧此浩然之氣所以生也敬者存心而已若不集義安得謂之必有事焉又問義莫是中理否曰中理在事義在心義者吾心之裁制中理者合乎事理之宜也故有在事在心之别問敬義何别曰敬只是持巳之道義便知有是有非順理而行是為義也若只守一箇敬不知集義却是都無事也張南軒曰居敬集義工夫並進相須而相成也若北要得敬不知集義則所謂敬者亦塊然無所為而已烏得心體之周流哉又曰集義只是事事求箇是而已朱子曰敬義工夫不可偏廢彼専務集義而不知主敬者固有虚驕急迫之病而所謂義者或非其義然専言主敬而不知就日用間念慮起處分别其公私義利之所在而决取舍之幾焉則亦未免於昏憒雜擾而所謂敬者亦非其敬矣且如欲為孝不成只守著一箇孝字須是知所以為孝之道所以侍奉當如何溫凊當如何然後能盡孝道也言此以明集義之道必有事焉者也學者湏是務實不要近名方是有意近名則是偽也大本已失更學何事為名與為利清濁雖不同然其利心則一也志於求名則非務實有為而為即是私心回也其心三月不違仁只是無纖毫私意有少私意便是不仁仁者天理之公心徳之全也有一毫私意介乎其間則害乎仁之全體矣仁者先難後獲有為而作皆先獲也古人惟知為仁而已今人皆先獲也説見論語後猶未有義而後其君之後先難者存心之篤而不容一念之或間克已之力而不容一事之非禮後獲者順乎天理而未嘗謀其私發乎誠心而未嘗計其效此仁者之事也或曰智者利仁是亦先獲也曰所謂利仁者以其察之明而後行之決盖擇善而固執之者也未若仁者安行乎天理之自然而巳又豈區區計功謀效者之為哉萌計謀之私則已非仁矣尚何利仁之有有求為聖人之志然後可與共學學而善思然後可與適道思而有所得則可與立立而化之則可與權説見論語學者所以學為聖人也有志希聖然後可與共學學原於思善於致思然後能通乎道思而有實得然後可與立而物欲異端不能奪之既立矣又能通變而不滯斯可與權蓋權者隨時制宜惟變所適又非執一者所能與也古之學者為巳其終至於成物今之學者為物其終至於喪巳為巳者盡吾性之當然非有預於人也其終至於成物者盖道本無外人巳一致能盡巳之性則能盡物之性然其成物也亦無非盡巳之事也苟徒務外則將陷於邪偽反害其性矣君子之學必日新日新者日進也不日新者必日退未有不進而不退者惟聖人之道無所進退以其所造者極也君子之學當日進而不已一或自止則智日昏而行日虧矣惟聖人理造乎極行底乎成則無所進退或曰聖人純亦不巳固未嘗不自新也曰論其心固無時而自巳一念之或巳則是間斷也何以為聖人論其進退之地則至於神聖而極不容有所加損也明道先生曰性靜者可以為學外書下同智以靜而明行以靜為主𢎞而不毅則無規矩毅而不𢎞則隘陋説見前知性善以忠信為本此先立其大者學莫大於知性真知性之本善則知之大者忠信以為質然後禮義有所措以忠信為本則行之大者伊川先生曰人安重則學堅固躁擾輕浮則所知者易忘所守者易隳博學之審問之慎思之明辨之篤行之五者廢其一非學也説見中庸學不博則無以備事物之理既博矣則不能無疑疑則不容不問問或疎略而不審則無以決疑而取正問審矣又必反之心思以騐其實思之而不謹則或泛濫而不切或穿鑿而過深則亦不足以揆所聞之當否思之謹矣至於應酬事物之際而辨其是非疑似之間者必極其明而不容有毫釐之差焉然知之明行之不力則其所以知者猶或奪於物欲之私而陷於自欺之域矣故以力行終之此五者雖有次第實相須而進不容缺其一焉張思叔請問其論或太髙伊川不答良乆曰累髙必自下張繹字思叔程子門人也學必有其序不容躐等積累而髙必自下始也明道先生曰人之為學忌先立標凖若循循不巳自有所至矣標幟凖的盖期望之地也為學而先立標凖則必有好髙躐等之患故莫若循序而進孳孳不已自有所至朱子曰此如必有事焉而勿正之謂觀顔子喟然之歎不於髙堅瞻忽處用功却就博文約禮上進歩則可見矣尹彦明見伊川後半年方得大學西銘看尹焞字彦明程子門人也始學之士未知嚮方教之以大學使其知入道之門進學之序也然學莫大於求仁繼之以西銘所以使其知仁之體而無私巳之蔽也然有待於半年之後者盖欲其厚積誠意蠲除氣習以為學問根本也有人説無心伊川曰無心便不是只當云無私心苟欲無心則必一切絶滅思慮槁木死灰而後可豈理也哉故聖賢未嘗無心特是心之所存所用者無非本天理之公而絶乎人欲之私耳謝顯道見伊川一本作伯淳伊川曰近日事如何對曰天下何思何慮伊川曰是則是有此理賢却發得太早在至誠之道不思而得初何容心然未能義精仁熟而遽欲坐忘絶念此告子之不動心而反為心害者也伊川直是㑹鍛煉得人説了又道恰好著工夫也鍛煉冶工之冶金言其善於成冶人也心無紛擾乃進學之地故又曰恰好著工夫朱子曰人所患者不能見得大體謝氏合下便見得只是下學之功都欠故道恰好著工夫謝顯道云昔伯淳教誨只管著他言語伯淳曰與賢説話却似扶醉漢救得一邉倒了一邉只怕人執著一邉朱子曰上蔡因有發於明道玩物喪志之一言故其所論毎毎過髙如浴沂御風何思何慮之類皆是墮於一偏横渠先生曰精義入神事豫吾内求利吾外也利用安身素利吾外致養吾内也説見易繫辭研精義理妙以入神知之功也然事素定於内則施於外者無不順順於致用以安其身行之功也然所用既順於外則養於内者益以厚此明内外之交養而知行之相資也窮神知化乃養盛自至非思勉之能强故崇徳而外君子未或致知也正䝉下同神者妙萬物而無方化者著萬物而有迹窮神知化盖窮理盡性以至於命是則知行交養徳盛所致非思之所能得勉之所能至者故君子惟盡力於精義以致其用利用以崇其徳自崇徳之外則有所不能致其力者故曰過此以往未之或知也形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉天命流行賦予萬物本無非善所謂天地之性也氣聚成形性為氣質所拘則有純駁偏正之異所謂氣質之性也然人能以善道自反則天地之性復全矣故氣質之性君子不以為性盖不徇乎氣質之偏必欲復其本然之善孟子謂性無有不善是也朱子曰天地之性専指理而言氣質之性則以理雜氣而言又曰性譬之水本皆清也以淨器盛之則清以汙器盛之則濁澄治之則本然之清未嘗不在徳不勝氣性命於氣徳勝其氣性命於徳義理與氣質相為消長徳不勝氣則氣為之主而性命拘於雜揉之質徳勝其氣則徳為之主而性命全乎本然之善窮理盡性則性天徳命天理氣之不可變者獨死生修天而巳窮萬物之理而盡一巳之性此學問之極功也學至於是則查滓渾化義理昭融所性者即天之徳所命者即天之理尚何氣禀之為累哉獨死生壽天則禀氣有定數而不可移耳黄勉齋曰窮理盡性則不但德勝其氣而已且將性命於天矣徳以所得者而言理以本然者而言故性曰天徳命曰天理一而已矣莫非天也陽明勝則徳性用隂濁勝則物欲行領惡而全好者其必由學乎領惡而全好見戴記鄭氏曰領猶理治也好善也人之氣質不齊要皆禀於天也陽明而隂暗陽清而隂濁禀陽之多者明而不暗故徳性用禀隂之多者濁而不清故物欲行若夫領物欲之惡而不得行全徳性之好而盡其用者其必由於學乎所謂雖愚必明雖柔必强者也大其心則能體天下之物物有未體則心為有外世人之心止於見聞之狹聖人盡性不以見聞梏其心其視天下無一物非我萬物一體性本無外苟拘於耳目之偏狹則私意蔽固藩籬爾汝安能體物而不遺惟聖人能盡此性故心大而無外其視物與巳本無間然也朱子曰體猶體認之體將自身入事物之中究見其理又曰只是有私意便内外扞格只見得自身上事凡物皆不得與已相關便是有外之心孟子謂盡心則知性知天以此天大無外故有外之心不足以合天心人能全心徳之大則知性知天矣無一物而非天故天大無外人之心苟猶有外則與天心不相似仲尼絶四自始學至成徳竭兩端之教也意有思也必有待也固不化也我有方也四者有一焉則與天地為不相似矣意必固我盖私意見於應事接物之間自始至終有此四者横渠先生解絶毋皆為禁止之意故以此為聖人設教之道謂自始學以至於成徳其所以克治融釋者不外乎此所謂竭兩端之教也意者萌心之始故曰有思必者期望於終故曰有待固者滯於已徃故曰不化我者成於巳私故曰有方朱子曰起於意遂於必留於固而成於我意必常在事前固我常在事後或問四者相為終始而曰有一焉何也曰人之為事亦有其初未必出於私意而後來固執而不化者若曰絶私意則三者皆無則曰絶一斯可矣何用更言絶四以此知四者又各是一病上逹反天理下逹徇人欲者歟説見論語反天理則所趨日以髙逺徇人欲則所趨日以沉溺知崇天也形而上也通晝夜而知其知崇矣知及之而不以禮性之非巳有也故知禮成性而道義出如天地位而易行説見繫辭人能通晝夜隂陽之變智則崇矣所以效天也又能守品節事物之禮性斯成焉所以法地也智禮相資而成其性道義之所從出猶天地宂位而易之理行乎兩間也或問知禮成性之説朱子曰如習與性成之意又曰性者我所得於天底道義是衆人共由底困之進人也為徳辨為感速孟子謂人有徳慧術智者常存乎疢疾以此繫辭傳曰困徳之辨也辨明也人處患難之時則操心危懼而無驕侈之蔽故其見理也明置身窮厄而有反本之思故其從善也敏徳慧謂徳之慧術智謂術之智疢疾災患也言有教動有法晝有為宵有得息有養瞬有存非先王之法言不敢言言有教也非先王之徳行不敢行動有法也終日乾乾晝有為也夜氣所養宵有得也氣之出入為息一息而必有所養也目之開闔為瞬一瞬而必有所存也此言君子無徃無時而非學也横渠先生作訂頑曰乾稱父坤稱母予兹藐焉乃混然中處朱子曰天陽也以至健而位乎上父道也地隂也以至順而位乎下母道也人禀氣於天賦形於地以藐然之身混合無間而位乎中子道也然不曰天地而曰乾坤者天地其形體也乾坤其性情也乾者健而無息之謂萬物之所資以始者也坤者順而有常之謂萬物之所資以生者也是乃天地之所以為天地而父毋乎萬物者故指而言之愚按禮記仁人之事親也如事天事天如事親此謂孝子成身即西銘之原也故天地之塞吾其體天地之帥吾其性朱子曰乾陽坤隂此天地之氣塞乎兩間而人物之所資以為體者也故曰天地之塞吾其體乾健坤順此天地之志為氣之帥而人物之所得以為性者也故曰天地之帥吾其性深察乎此則父乾母坤混然中處之實可見矣民吾同胞物吾與也朱子曰人物並生於天地之間其所資以為體者皆天地之塞其所得以為性者皆天地之帥然體有偏正之殊故其於性也不無明暗之異惟人也得其形氣之正是以其心最靈而有以通乎性命之全體於並生之中又為同類而最貴焉故曰同胞則其視之也皆如己之兄弟矣物則得夫形氣之偏而不能通乎性命之全故與我不同類而不若人之貴然原其體性之所自是亦本之天地而未嘗不同也故曰吾與則其視之也亦如己之儕軰矣惟同胞也故以天下為一家中國為一人如下文所云惟吾與也故凡有形於天地之間者若動若植有情無情莫不有以若其性遂其生焉此儒者之道所以必至於参天地贊化育然後為功用之全而非有所强於外也大君者吾父母宗子其大臣宗子之家相也尊髙年所以長其長慈孤弱所以幼其幼聖其合徳賢其秀也凡天下疲癃殘疾惸獨鰥寡皆吾兄弟之顛連而無告者也朱子曰乾父坤母而人生其中則凡天下之人皆天地之子矣然繼承天地統理人物則大君而已故為父母之宗子輔佐大君綱紀衆事則大臣而已故為宗子之家相天下之老一也故凡尊天下之髙年者乃所以長吾之長天下之幼一也故凡慈天下之孤弱者乃所以幼吾之幼聖人與天地合其徳是兄弟之合徳乎父母者也賢者才徳過於常人是兄弟之秀出乎等夷者也是皆以天地之子言之則凡天下之疲癃殘疾惸獨鰥寡非吾兄弟無告者而何哉于時保之子之翼也樂且不憂純乎孝者也朱子曰畏天而自保者猶其敬親之至也樂天而不憂者猶其愛親之純也又曰若論天地萬物與我同體之意固極宏大然所論事天功夫則自于時保之以下方極親切違曰悖徳害仁曰賊濟惡者不才其踐形惟肖者也朱子曰不循天理而循人欲者不愛其親而愛他人也故謂之悖徳戕滅天理自絶本根者賊殺其親大逆無道也故誦之賊長惡不悛不可教訓者世濟其凶増其惡名也故謂之不才若夫盡人之性而有以充人之形則與天地相似而不違矣故謂之肖知化則善述其事窮神則善繼其志朱子曰孝子善繼人之志善述人之事者也聖人知變化之道則所行者無非天地之事矣通神明之徳則所存者無非天地之心矣此二者皆樂天踐形之事也又曰化底是氣有迹可見故為事神底是理無形可窺故為志不愧屋漏為無忝存心養性為匪懈朱子曰孝經引詩曰無忝爾所生故事天者仰不愧俯不怍則不忝乎天地矣又曰夙夜匪懈故事天者存其心養其性則不懈乎事天矣此二者畏天之事而君子所以求踐乎形者也惡㫖酒崇伯子之顧養育英材潁封人之錫類朱子曰好飲酒而不顧父母之養者不孝也故遏人欲如禹之惡㫖酒則所以願天之養者至矣性者萬物之一源非有我之得私也故育英材如潁考叔之及莊公則所以永錫爾類者廣矣不弛勞而底豫舜其功也無所逃而待烹申生其恭也朱子曰舜盡事親之道而瞽叟底豫其功大矣故事天者盡事天之道而天心豫焉則亦天之舜也申生無所逃而待烹其恭至矣故事天者夭夀不貳而修身以俟之則亦天之申生也體其受而歸全者參乎勇於從而順令者伯竒也朱子曰父母全而生之子全而歸之若曽子之啓手啓足則體其所受乎親者而歸其全也况天之所以與我者無一善之不備亦全而生之也故事天者能體其所受於天者而全歸之則亦天之曽子矣子於父母東西南北唯令之從若伯竒之履霜中野則勇於從而順令也况天之所以命我者吉凶禍福非有人欲之私故事天者能勇於從而順受其正則亦天之伯竒矣富貴福澤將厚吾之生也貧賤憂戚庸玉汝於成也朱子曰富貴福澤所以大奉於我而使吾之為善也輕貧賤憂戚所以拂亂於我而使吾之為志也篤天地之於人父母之於子其設心豈有異哉故君子之事天也以周公之富而不至於驕以顔子之貧而不改其樂其事親也愛之則喜而弗忘惡之則懼而無怨其心亦一而已矣存吾順事沒吾寧也朱子曰孝子之身存則其事親也不違其志而已沒則安而無所愧於親也仁人之身存則其事天也不逆其理而已沒則安而無所愧於天也盖所謂朝聞夕死吾得正而斃焉者故張子之銘以是終焉明道先生曰訂頑之言極醇無雜秦漢以來學者所未到又曰訂頑一篇意極完備乃仁之體也仁者本以天地萬物為一體學者其體此意令有諸巳其地位已髙到此地位自别有見處不可窮髙極逺恐於道無補也體認此意實為我有所謂真知而實踐之至此則又有見於大本一原之妙矣又曰訂頑立心便逹得天徳普萬物而無私天徳也又曰游酢得西銘讀之即渙然不逆於心曰此中庸之理也能求於言語之外者也游酢字定夫程子門人也中庸惟本乎天命之性中者性之體和者性之用致中和至於天地位萬物育實則原於天命之本然西銘以人物之生同禀是氣以為體同具是理以為性雖有差等實無二本也今一視同仁者亦所以盡一巳之性而全天命之本然耳此即中庸之理也楊中立問曰西銘言體而不及用恐其流遂至於兼愛何如伊川先生曰横渠立言誠有過者乃在正䝉西銘之書推理以存義擴前聖所未發與孟子性善養氣之論同功豈墨氏之比哉西銘明理一而分殊墨氏則二本而無分本註云老幼及人理一也愛無差等本二也楊時字中立程子門人也西銘以天地為父母萬物為同體是理一也然而貴賤親疎上下各有品節之宜是分殊也若墨氏惑於兼愛則汎然並施而無差等施之父母者猶施之路人是親疎並立而為二本也或問理一分殊如同胞吾與大君家相長㓜碊疾皆自有等差是分殊處否朱子曰此是一直看下更須横截看天氣而地質與父母固是一理然吾之父母與天地自是有箇親疎同胞裏而便有理一分殊吾與裏面亦便有理一分殊龜山正是疑同胞吾與為近於墨氏不知同胞吾與各自有理一分殊在其中矣分殊之蔽私勝而失仁無分之罪兼愛而無義徒知分之殊而不知理之一則其蔽也為己之私勝而失其公愛之理徒知理之一而不知分之殊則其過也兼愛之情勝而失其施愛之宜分立而推理一以止私勝之流仁之方也無别而迷兼愛以至於無父之極義之賊也子比而同之過矣分立而推其理之一則無私勝之蔽此為仁之方西銘是也施無差等而迷於兼愛則其極也至於無父此害義之賊墨氏是也且彼欲使人推而行之本為用也反謂不及不亦異乎西銘本言理一欲人推大公之用因龜山有兼愛之疑故程子又明其分之殊盖莫非自然之理也或曰旣言理一又曰分殊是理與分為二也曰以理推之則並生於天地之間者同體同性不容以異觀也然是理也則有品節之殊輕重之等所謂分也者特是理之差等耳非二端也横渠先生又作砭愚曰戲言出於思也戲動作於謀也發於聲見乎四支謂非己心不明也欲人無巳疑不能也言雖戲必以思而出也動雖戲必以謀而作也戲言發於聲戲動見乎四支謂非本於吾心是惑也本於吾心而欲人之不我疑不可得也過言非心也過動非誠也失於聲繆迷其四體謂巳當然自誣也欲他人已從誣人也言之過者非其心之本然也動之過者非其誠之實然也失於聲而為過言繆迷其四體而為過動謂之過者皆誤而非故也或者吝於改過遂以為巳之當然是自誣其心也既憚改而自誣又欲人之從之是誣人也此夫子所謂小人之過也必文孟子所謂過則順之又從而為之辭或者謂出於心者歸咎為巳戲失於思者自誣為巳誠不知戒其出汝者歸咎其不出汝者長傲且遂非不知孰甚焉戲謔出於心思乃故為也不知所當戒徒歸咎以為戲則長傲而慢愈滋矣過誤不出於心思乃偶失耳不知歸咎於偶失反自誣以為實則遂非而過不改矣學者深省乎此則崇徳辨惑矯輕警惰之功亦大矣然其於戲且誤者克治尚如此之嚴况乎過之非戲誤者豈復留之纖芥以累其身心哉横渠學堂雙牖右書訂頑左書砭愚伊川曰是起爭端改訂頑曰西銘砭愚曰東銘頑者暴忍而不仁愚者昏塞而不智訂頑主仁而義在其中砭愚主智而禮在其中將修巳必先厚重以自持厚重知學徳乃進而不固矣忠信進徳惟尚友而急賢欲勝巳者親無如改過之不吝横渠文集下同説見論語君子修己之道必以厚重為本苟輕浮則無受道之基然徒厚重而不知學則徳亦固滯而不進矣然進徳之道必以忠信為主而未忠信之輔者莫急於交勝巳之賢但或吝於改過則無所施其責善之道賢者亦不我親矣學則不固之説與本文異此自是一義有益學者故取焉凡録經説有與本文異者放此横渠先生謂范巽之曰吾輩不及古人病源何在巽之請問先生曰此非難悟設此語者蓋欲學者存意之不忘庶游心寖熟有一日脫然如大寐之得醒耳范育字巽之朱子曰横渠說此語正要學者將此題目時時自省積乆貫熟而自得之耳又曰人於義理須如所謂脫然大寐之得醒方始是信得處未知立心惡思多之致疑既知所立惡講治之不精立心未定而多思致惑則所向或移立心既定而講治粗疎則所業莫進講治致思莫非術内雖勤而何厭所以急於可欲者求立吾心於不疑之地然後若決江河以利吾往承上文而言致思講治乃窮理之事皆在吾學術之内初何厭乎勤此言講治之貴精然所以急於明可欲之善者蓋欲先定吾志無所疑惑然後能若決江河進而不可竭此言立心之必定遜此志務時敏厥修乃來故雖仲尼之才之美然且敏以求之今持不逮之資而欲徐徐以聴其自適非所聞也説見尚書遜順也遜此志則立心以定務時敏則講學為急如是則所修乃日見其進也明善為本固執之乃立擴充之則大易視之則小在人能𢎞之而已明善者為學之本知之既明由是固守之則此徳有立推廣之則此徳日大苟以忽心視之則所見者亦寖微矣今且只將尊徳性而道問學為心日自求於問學者有所背否於徳性有所懈否此義亦是博文約禮下學上達以此警䇿一年安得不長尊者崇尚敬持之道由也由學問而惟恐背違崇徳性而惟恐懈惰曰以此自省積之歳月則内外兼進矣尊徳性則是約禮上達之事道問學則是博文下學之事毎日須求多少為益知所亡改得少不善此徳性上之益學者日省其身所以増益其不知者何如所以改治其不善者何如以是存心則徳日新矣讀書求義理編書須理㑹有所歸著勿徒寫過又多識前言徃行此問學上益也讀書者必窮其義理不徒事章句訓詁之末編書者必求其指歸不徒務博洽紀録之功多識前哲之言行以廣所知則學日進矣勿使有俄頃閒度逐日似此三年庻㡬有進君子之學一有問斷則此心外馳徳性日隳學問日廢矣為天地立心為生民立道為去聖繼絶學為萬世開太平天地以生生為心聖人參贊化育使萬物各正其性命此為天地立心也建明義理扶植綱常此為生民立道也繼絶學謂纘述道統開太平如有王者起必來取法利澤垂於萬世學者以此立志則所任至大而不安於小成所存至公而不苟於近用載所以使學者先學禮者只為學禮則便除去了世俗一副當習熟纒繞譬之延蔓之物解纒繞即上去苟能除去了一副當世習便自然脱灑也又學禮則可以守得定學禮則可以消除習俗之累又有所依據而自守須放心寛快公平以求之乃可見道況徳性自廣大易曰窮神知化徳之盛也豈淺心可得横渠易説人之徳性本自廣大故必廣大其心求之偏狹固滯豈足以見道也人多以老成則不肻下問故終身不知又為人以道義先覺處之不可復謂有所不知故亦不肻下問從不肻問遂生百端欺妄人我寜終身不知横渠論語説言人虚驕恥於下問内則欺己外則欺人終於不知而已多聞不足以盡天下之故苟以多聞而待天下之變則道足以酬其所甞知若劫之不測則遂窮矣横渠孟子説下同故所以然也酬應也心通乎道則能盡夫事理之所以然故應變而不窮不通乎道而徒事乎記問則見聞有限而事變無窮卒然臨之以所未甞知則窮矣為學大益在自求變化氣質不爾皆為人之弊卒無所發明不得見聖人之奥所貴於學正欲陶鎔氣質矯正偏駁不然則非為已之學亦何以推明聖人之藴哉朱子曰寛而栗柔而立剛而無虐簡而無傲便是教人變化氣質文要宻察心要洪放語録下同文不宻察則見理粗疎心不洪放則所存狹滯不知疑者只是不便實作既實作則須有疑有不行處是疑也始學之士知必有所不明行必有所不通殊不知疑者是未甞實用功也心大則百物皆通心小則百物皆病心大則寛平𢎞逺故處已待人無往而不達心小則偏急固陋無所處而不為病也人雖有功不及於學心亦不宜忘心苟不忘則雖接人事即是實行莫非道也心若忘之則終身由之只是俗事人有妨廢學問之功者然心不忘乎學則日用無非道故曰即是實行心苟忘乎學則日用而不知故曰只是俗事實行與俗事非二事特以所存者不同耳合内外平物我此見道之大端合内外者表裏一致就己而為言也平物我者物我一體合人己而為言也既學而先有以功業為意者於學便相害既有意必穿鑿創意作起事端也徳未成而先以功業為事是代大匠斲希不傷手也功業立言立事皆是也為學而先志於功業則穿鑿創造必害於道矣竊甞病孔孟既殁諸儒囂然不知反約窮源勇於苟作持不逮之資而急知後世明者一覽如見肺肝然多見其不知量也方且創艾其弊黙養吾誠顧所患日力不足而未果他為也不知反約窮源故浮淺而無實黙養吾誠則反約窮源之事也學未至而好語變者必知終有患葢變不可輕議若驟然語變則知操術己不正變者非常行之道葢權宜之事也自非見理明制義精者不足以與此苟學未至而輕於語變則知其學術之源己不正終必流於邪譎凡事蔽葢不見底只是不求益行已無隠則是非善惡有所取正庻可增益其所未知所未能苟故為蔽覆恐人之知是則非求益者也有人不肻言其道義所得所至不得見底又非於吾言無所不説人不肻言其知之所得行之所至使人不可得而見者葢苟安自足恐人之非己又非若顔子之如愚於聖言無所不説者之比也耳目役於外攬外事者其實是自惰不肻自治只言短長不能反躬者也急於自治何暇務外厚於反躬何暇議人學者大不宜志小氣輕志小則易足易足則無由進氣輕則以未知為己知未學為己學志小則易於自是故怠惰而無新功氣輕則易於自大故虛誕而無實得近思録卷二
