body:
  text: 近思録卷十二宋朱子吕祖謙同編葉采集解警戒此卷論戒謹之道修己治人常存警省之意不然則私欲易萌善日消而惡日積矣濓溪先生曰仲由喜聞過令名無窮焉今人有過不喜人規如護疾而忌醫寧滅其身而無悟也噫通書改子路有過遷善之實故令名無窮焉伊川先生曰德善日積則福祿日臻德踰於祿則雖盛而非滿自古隆盛未有不失道而喪敗者也易傳下同泰卦九三傳德勝於祿則所享者雖厚而不為過祿過其德則所享者雖薄且不能勝況於隆盛乎隆盛之敗喪必自無德者致之也人之於豫樂心説之故遲遲遂至於耽戀不能已也豫之六二以中正自守其介如石其去之速不俟終日故貞正而吉也人處豫樂易至耽戀六二中正上又無應特立自守其節之堅介然如石無所轉移也其去之速不俟終日無所耽戀也處豫不可安且久也久則溺矣如二可謂見幾而作者也蓋中正故其守堅而能辨之早去之速也惟其自守之堅故能見幾而作人君致危亡之道非一而以豫為多豫卦六五傳衰世之君大率以逸豫致危亡可不深戒哉聖人為戒必於方盛之時方其盛而不知戒故狃安富則驕侈生樂舒肆則紀綱壞忘禍亂則釁孽萌是以浸淫不知亂之至也臨卦彖傳驕侈每生於安富之餘綱紀每廢於舒肆之日釁端禍孽每兆於無虞之中故方盛之時實將衰之漸聖人為戒於早則可保其長盛復之六三以隂躁處動之極復之頻數而不能固者也震下坤上為復三既隂躁又處震動之終其於復善也躁動而不能固守者也復貴安固頻復頻失不安於復也復善而屢失危之道也有失而後有復屢復而屢失不當其德危之道也聖人開其遷善之道與其復而危其屢失故云厲無咎不可以頻失而戒其復也頻失則為危屢復何咎過在失而不在復也屢失故危厲屢復故無咎無咎者補過之稱也劉質夫曰頻復不已遂至迷復劉絢字質夫程子門人也頻復頻失而不止久則玩溺而不能復必至上九之迷復矣伊川先生曰睽極則咈戾而難合剛極則躁暴而不詳明極則過察而多疑聧之上九有六三之正應實不孤而其才性如此自睽孤也兊下離上為睽上居睽之終是睽之極也以九居上是剛之極也居離之終是明之極也有是一者何往而不睽孤哉雖有正應亦不合矣如人雖有親黨而多自疑猜妄生乖離雖處骨肉親黨之間而常孤獨也多自疑猜過明之患也妄生乖離遇剛好睽之致也解之六三曰負且乘致寇至貞吝伊川易傳曰小人而竊盛位雖勉為正事而氣質卑下本非在上之物終可吝也負者小人之事也乘者君子之器也故為小人竊盛位之象勉為正事者貞也然而隂柔卑下之質冒居內卦之上非其所安是以吝也若能大正則如何曰大正非隂柔所能也若能之則是化為君子矣益之上九曰莫益之或擊之伊川易傳曰理者天下之至公利者衆人所同欲苟公其心不失其正理則與衆同利無侵於人人亦欲與之若切於好利蔽於自私求自益以損於人則人亦與之力爭故莫肯益之而有擊奪之者矣在上者推至公之理而與衆同其利則衆亦與之同其利苟懷自私之心而惟利己則人亦各欲利其己而奪其所利矣益之上九人莫益之而或擊之者以其求益之過也艮之九三曰艮其限列其夤厲薰心伊川易傳曰夫止道貴乎得宜行止不能以時而定於一其堅強如此則處世乖戾與物睽絶其危甚矣限界分也列絶也夤膂肉也亦一身上下之限也三居內卦之上實內外之分故取象皆為限止之義所貴於止者謂各得所宜止而無過與不及也不度時中而一於限止焉堅執強忍如此則違世絶物危厲甚矣人之固止一隅而舉世莫與宜者則艱蹇忿畏焚撓其中豈有安裕之理厲薰心謂不安之勢薰爍其中也大率以説而動安有不失正者歸妹彖傳兊下震上為歸妹兊説也震動也心有所好樂則不得其正況從欲而忘返者耶男女有尊卑之序夫婦有倡隨之理此常理也若徇情肆欲惟説是動男牽欲而失其剛婦狃説而忘其順則凶而無所利矣同上震長男兊少女以説而動則徇情肆欲必且失其常理而致凶矣雖舜之聖且畏巧言令色説之惑人易入而可懼也如此兊卦六五傳巧言者工佞之言令色者善柔之色皆務以恱人也人心喜順惡逆故巧言令色易以惑人凡説之道皆然不可不戒也治水天下之大任也非其至公之心能捨己從人盡天下之議則不能成其功豈方命圯族者所能乎方不順也命天理也圯族敗類也夫任天下之大事者非一人之私智所能集要必合天下之謀而後可也苟上不順乎天理下不依乎羣情恃其才智任己而行烏能有濟鯀雖九年而功弗成然其所治固非他人所及也惟其功有敘故其自任益強咈戾圯類益甚公議隔而人心離矣是其惡益顯而其功卒不可成也經説下同事公議隔而得失莫聞人心離而業莫與共之者矣君子敬以直內微生高所枉雖小而害直則大子曰孰謂微生高直或乞醯焉乞諸其鄰而與之微生姓高名君子敬以直內不容有一毫之邪枉所謂直也微生高以無為有曲意徇人蓋邪枉之態不能掩者事雖微所以害於直者甚大故聖人因以立教人有欲則無剛剛則不屈於欲謝上蔡曰剛與欲正相反能勝物之謂剛故常伸於萬物之上為物掩之謂欲故常屈於萬物之下人之過也各於其類君子常失於厚小人常失於薄君子過於愛小人傷於忍君子小人之分在於仁與不仁而已故仁者之過常在於厚與愛不仁者之過常在於薄與忍明道先生曰富貴驕人固不善學問驕人害亦不細遺書下同君子之學為己而已以學問驕人非特其學為務外而傲惰敗德學亦不進矣人以料事為明便駸駸入逆詐億不信去也子曰不逆詐不億不信朱子曰逆未至而迎之也億未見而意之也愚謂事而無情曰詐言而無實曰不信詐者巧而不信者誕也揚子雲謂匿行曰詐易言曰誕是也若事未顯而逆料臆度之則自流於巧而惑於疑未必得事之情實矣人以料事為明者必至於是周子曰謂能疑為明何啻千里人於外物奉身者事事要好只有自家一箇身與心却不要好苟得外面物好時却不知道自家身與心却巳先不好了也所謂以小害大賤害貴者也人於天理昏者是只為嗜欲亂著他莊子言其嗜欲深者其天機淺此言却最是嗜欲多則志亂氣昏而天理微矣二者常相為消長伊川先生曰閲機事之久機心必生蓋方其閲時心必喜既喜則如種下種子莊子曰有機械者必有機事有機事者必有機心疑病者未有事至時先有疑端在心周羅事者先有周事之端在心皆病也周羅俚語猶兜攬也事未至而有好疑喜事之端則事至之時有不當疑而疑不當攬而攬者矣故治心者必去其端較事大小其弊為枉尺直尋之病事無大小惟理是視或者有苟成急就之意謂道雖少屈而所伸者大義雖微害而所利者博則有冒而為之者原其初心止於權大小遂至枉尺直尋其末流之弊乃有不可勝言矣小人小丈夫不合小了他本不是惡性無不善而局於氣質汩於利欲者自小之耳雖公天下事若用私意為之便是私事出於公而以私意為之即是私也故學者以正心為本論人者必察其心不徒考其事做官奪人志仕而志於富貴者固不必言或馳騖乎是非豫奪之境而此志動於喜怒愛惡之私或經營於建功立業之間而此志陷於計度區畫之巧德未成而從政者未有不奪其志學者所當深省也驕是氣盈吝是氣歉人若吝時於財上亦不足於事上亦不足凡百事皆不足必有歉歉之色驕矜夸吝鄙嗇也驕氣盈者常覺其有餘吝氣歉者常覺其不足惟君子所志者道故無時而盈亦無所不足未知道者如醉人方其醉時無所不至及其醒也莫不愧恥人之未知學者自視以為無缺及既知學反思前日所為則駭且懼矣邢恕云一日三點檢明道曰可哀也哉其餘時理會甚事蓋倣三省之説錯了可見不曾用功又多逐人面上説一般話明道責之邢曰無可説明道曰無可説便不得不説曾子三省謂日以三事自省邢倣其言乃云一日三次點檢橫渠先生曰學者捨禮義則飽食終日無所猷為與下民一致所事不踰衣食之間燕逰之樂耳正蒙鄭衛之音悲哀令人意思留連又生怠惰之意從而致驕淫之心雖珍玩竒貨其始惑人也亦不如是切從而生無限嗜好故孔子曰必放之亦是聖人經歷過但聖人能不為物所移耳橫渠禮樂説孟子言反經特於鄉原之後者以鄉原大者不先立心中初無主惟是左右看順人情不欲違一生如此橫渠孟子説好經常也古今不易之常道也是是非非必有定理而善惡惡必有定見今鄉原浮沈俯仰無所可否蓋其義理不立中無所主惟務恱人以是終身乃亂常之尤者君子反經復其常道則是非昭然而鄉原偽言偽行不得以惑之矣近思録卷十二
