body:
  text: 近思録卷六宋朱子吕祖謙同編葉采集解家道凡二十二條此卷論齊家蓋克己之功既至則施之家而家可齊矣伊川先生曰弟子之職力有餘則學文不修其職而學非為己之學也經解說見論語之為弟為子者其職在於孝弟而已行有餘力而後可學詩書六藝之文職有未盡而急於學文則是徒欲人之觀美非為己之學也孟子曰事親若曽子可也未嘗以曽子之孝為有餘也蓋子之身所能為者皆所當為也易傳下同師卦九二傳可者僅足而無餘之稱竭其所當為無過外也幹母之蠱不可貞子之於母當以柔巽輔導之使得於義不順而致敗蠱則子之罪也蠱卦九二傳幹治也蠱事之弊也人子事親皆當以承順為主使事得於理而已然婦人柔暗有難以遽曉尤當以柔巽行之比之事父又有間矣但為矯拂而反害其所治之事則子之過也從容將順豈無道乎若伸已剛陽之道遽然矯拂則傷恩所害大矣亦安能入乎在乎屈己下意巽順將承使之身正事治而已剛陽之臣事柔弱之君義亦相近以剛直之資遽為矯拂內則傷恩而有害天倫之重外則敗事而卒廢幹蠱之功剛陽之臣事柔弱之君若孟子於齊宣王諸葛孔明於蜀後主是也蠱之九三以陽處剛而不中剛之過也故小有悔然在巽體不為無順順事親之本也又居得正故無大咎然有小悔已非善事親也九爻陽而三位剛位又不中剛過乎中者也事親而過剛不能無悔矣然蠱之下卦為巽巽者順也又陽爻居陽位居得其正則亦不至大過故無大咎也但謂之小悔則於事親之道已非盡善者矣正倫理篤恩義家人之道也家人卦彖傳正倫理則尊卑之分明篤恩義則上下之情合二者並行而後處家之道得矣然必以正倫理為先未有倫理不正而恩義可篤者也人之處家在骨肉父子之間大率以情勝禮以恩奪義惟剛立之人則能不以私愛失其正理故家人卦大要以剛為善家人卦六二傳相親附猶骨之於肉家人上九爻辭謂治家當有威嚴而夫子又復戒云當先嚴其身也威嚴不先行於己則人怨而不服上九威如終吉象曰威如之吉反身之謂也所貴治家之威者非徒繩治之嚴蓋必正己為本使在我持身謹嚴而無少縱弛則家人自然有所嚴憚而不敢踰越有所觀感而率歸於正凡御下之道皆然齊家本於修身則尤為切近歸妹九二守其幽貞未失夫婦常正之道世人以媟狎為常故以貞靜為變常不知乃常久之道也正靜乃相處可久之道媟狎則玩侮乖離所自生世人多愼於擇壻而忽於擇婦其實壻易見婦難知所係甚重豈可忽哉遺書下同人無父母生日當倍悲痛更安忍置酒張樂以為樂若具慶者可矣具慶謂父母俱存問行狀云盡性至命必本於孝弟不識孝弟何以能盡性至命也伊川曰後人便將性命别作一般說了性命孝弟只是一統底事就孝弟中便可盡性至命伊川先生所作明道先生行狀孝弟者人道之本百行之原仁民愛物皆由是推之人能盡孝弟之道擴而充之至於極致則可以盡性至命矣是朱子曰此與孝弟也者其為仁之本與一意又曰若聖人如舜之孝王季之友便是盡性至命事如灑掃應對與盡性至命亦是一統底事無有本末無有精粗却被後來人言性命者别作一般高逺說故舉孝弟是於人切近者言之天下無理外之事亦無事外之理即其末而本已存即其粗而精實具本末精粗非二致也然今時非無孝弟之人而不能盡性至命者由之而不知也今之孝弟者未必能盡性至命蓋行不著習不察故亦不能擴充之以抵作聖之極功問第五倫視其子之疾與兄子之疾不同自謂之私如何伊川曰不待安寢與不安寢只不起與十起便是私也父子之愛本是公才著些心做便是私也後漢第五倫傳或問倫曰公有私乎對曰吾兄子嘗病一夜十起退而安寢吾子有疾雖不省視而竟夕不眠若是者豈可謂無私乎人知安寢與不眠為私愛其子而不知十起與不起亦私意也蓋事事物物各有自然之理不容安排父子之愛天性今子疾不視而十起於兄子豈人情哉著意安排即是私矣又問視己子與兄子有間否曰聖人立法曰兄弟之子猶子也是欲視之猶子也視兄弟之子亦如己子又問天性自有輕重疑若有間然曰只為今人以私心看了孔子曰父子之道天性也此只就孝上說故言父子天性若君臣兄弟賓主朋友之類亦豈不是天性只為今人小看却不推其本所由來故爾己之子與兄之子所爭幾何是同出於父者也只為兄弟異形故以兄弟為手足人多以異形故親己之子異於兄弟之子甚不是也又問孔子以公冶長不及南容故以兄之子妻南容以己之子妻公冶長何也曰此亦以己之私心看聖人也凡人避嫌者皆內不足也聖人至公何更避嫌凡嫁女各量其才而求配或兄之子不甚美必擇其相稱者為之配己之子美必擇其才美者為之配豈更避嫌耶若孔子事或是年不相若或時有先後皆不可知以孔子為避嫌則大不是如避嫌事賢者且不為況聖人乎聖人所為至公無私安行乎天理何嫌之可避凡人避嫌者皆內有不足而不能自信者也問孀婦於理似不可取如何伊川曰然凡取以配身也若取失節者以配身是己失節也婦人從一而終者也再嫁為失節又問或有孤孀貧窮無託者可再嫁否曰只是後世怕寒餓死故有是說然餓死事極小失節事極大餓死事極小所惡有甚於死也病卧於牀委之庸醫比之不慈不孝事親者亦不可不知醫外書下同程子葬父使周恭叔主客客欲酒恭叔以告先生曰勿陷人於惡周行已字恭叔臨喪飲酒非禮也買乳婢多不得已我不能自乳必使人然食己子而殺人之子非道必不得已用二子乳食三子足備他虞或乳母病且死則不為害又不為己子殺人之子但有所費若不幸致誤其子害孰大焉幼吾幼以及人之幼其慮之周蓋如此先公太中諱珦字伯溫前後五得任子以均諸父子孫嫁遣孤女必盡其力所得俸錢分贍親戚之貧者伯母劉氏寡居公奉養甚至其女之夫死公迎從女兄以歸教養其子均於子姪既而女兄之女又寡公懼女兄之悲思又取甥女以歸嫁之時小官祿薄克己為義人以為難任子謂保任使之入仕諸父謂從父也公慈恕而剛斷平居與幼賤處惟恐有傷其意至於犯義理則不假也左右使令之人無日不察其飢飽寒燠娶侯氏侯夫人事舅姑以孝謹稱與先公相待如賓客先公賴其內助禮敬尤至而夫人謙順自牧雖小事未嘗專必稟而後行仁恕寬厚撫愛諸庶不異己出從叔幼孤夫人存視常均己子治家有法不嚴而整不喜笞撲奴婢視小臧獲如兒女男僕曰臧女僕曰獲諸子或加呵責必戒之曰貴賤雖殊人則一也汝如是大時能為此事否先公凡有所怒必為之寬解唯諸兒有過則不掩也常曰子之所以不肖者由母蔽其過而父不知也夫人男子六人所存惟二其愛慈可謂至矣然於教之之道不少假也才數歲行而或踣家人走前扶抱恐其驚啼夫人未嘗不呵責曰汝若安徐寧至踣乎飲食常置之坐側嘗食絮羹即叱止之曰幼求稱欲長當何如絮羹調羹也禮不絮羹為其詳於味也雖使令輩不得以惡言罵之故頤兄弟平生於飲食衣服無所擇不能惡言罵人非性然也教之使然也與人爭忿雖直不右曰患其不能屈不患其不能伸及稍長常使從善師友游雖居貧或欲延客則喜而為之具夫人七八歲時誦古詩曰女子不夜出夜出秉明燭自是日暮則不復出房閣既長好文而不為辭章見世之婦女以文章筆札傳於人者則深以為非文集橫渠先生嘗曰事親奉祭豈可使人為之行狀使人代為孝敬之心安在舜之事親有不悅者為父頑母嚚不近人情若中入之性其愛惡略無害理姑必順之事親以順為主非甚不得已者固不可輕為矯拂也親之故舊所喜者當極力招致以悅其親凡於父母賓客之奉必極力營辦亦不計家之有無然為養又須使不知其勉强勞苦苟使見其為而不易則亦不安矣橫渠記說所謂養志者也斯干詩言兄及弟矣式相好矣無相猶矣言兄弟宜相好不要相學猶似也人情大抵患在施之不見報則輟故恩不能終不要相學己施之而已詩說下同兄弟友愛盡其在我不可視報以為施兄友而弟不恭不可學弟而廢其友弟恭而兄不友不可學兄而廢其恭人不為周南召南其猶正牆面而立常深思此言誠是不從此行甚隔著事向前推不去蓋至親至近莫甚於此故須從此始宜其家人而后可以教國人不然猶正牆面隔礙而不可通行也婢僕始至本懷勉勉敬心若到所提掇更謹則加謹慢則棄其本心便習以成性故仕者入治朝則德日進入亂朝則德日退只觀在上者有可學無可學耳語録謂提掇提起警䇿之也近思録卷六
