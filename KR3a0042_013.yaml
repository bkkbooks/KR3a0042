body:
  text: 近思録卷十三宋朱子吕祖謙同編葉采集解辨别異端凡十四條此卷辨異端蓋君子之學雖已至然異端之辨尤不可以不明苟於此有毫釐之未辨則貽害於人心者甚矣明道先生曰楊墨之害甚於申韓佛老之害甚於楊墨楊朱墨翟詳見孟子申不害者鄭人以刑名干韓昭侯昭侯用以為相韓非韓之諸公子善刑名法術之學佛者本西域之人為寂滅之學自漢以來其説始入中國老者周柱下史老聃也其書論清淨無為之道楊氏為我疑於仁墨氏兼愛疑於義申韓則淺陋易見故孟子只闢楊墨為其惑世之甚也楊氏為我可謂自私而不仁矣然而猶疑似於無欲之仁墨氏兼愛可謂泛濫而無義矣然猶疑似於無私之義故足以惑人也若申韓之刑名功利淺陋而易見故孟子但闢楊墨恐其為人心之害而申韓不足闢也佛老其言近理又非楊墨之比此所以為害尤甚楊墨之害亦經孟子闢之所以廓如也遺書下同非佛氏言心性老氏談道德皆近於理又楊墨之比故其為人心之害尤甚揚子雲曰古者楊墨塞路孟子辭而闢之廓如也朱子曰楊朱即老聃弟子孟子闢楊墨則老莊在其中矣伊川先生曰儒者潛心正道不容有差其始甚微其終則不可救如師也過商也不及於聖人中道師只是過於厚些商只是不及些然而厚則漸至於兼愛不及則便至於為我其過不及同出於儒者其末遂至楊墨至於楊墨亦未至於無父無君孟子推之便至於此蓋其差必至於是也師子張名商子夏名子張才高意廣泛愛兼容故常過乎中子夏篤信自守規模謹密故常不及乎中二子於道亦未逺也然師之過其流必至於墨氏之兼愛子夏之不及其後傳田子方子方之後為莊周是楊氏為我之學也孟氏推楊墨之極致則兼愛者至於無父蓋愛其父亦同於路人是無父也為我者至於無君蓋自私其身而不知有上下是無君也明道先生曰道之外無物物之外無道是天地之間無適而非道也即父子而父子在所親即君臣而君臣在所嚴以至為夫婦為長幼為朋友無所為而非道此道所以不可須臾離也然則毁人倫去四大者其外於道也逺矣物由道而形故道外無物道以物而具故物外無道人於天地間不能違物而獨立故無適而非道也今釋氏乃毁棄人倫滅絶四大其戾於道逺矣釋氏以地水火風為四大謂四大幻假而成人身寂滅幻根斷除一切故君子之於天下也無適也無莫也義之與比若有適有莫則於道為有間非天地之全也適可也莫不可也比從也君子之於天下無可無不可惟義之從也今釋氏可以寂滅無為而不可以察理應事必欲斷除外相始見法性非天地本然全體之性矣彼釋氏之學於敬以直內則有之矣義以方外則未之有也釋氏習定欲得此心收斂虛靜亦若所謂敬以直內然有體而無用絶滅倫理何有於義故滯固者入於枯稿疏通者歸於恣肆此佛之教所以為隘也吾道則不然率性而已斯理也聖人於易備言之釋氏離器以為道故於日用事物之間或拘或肆皆為之病名為大自在而實則隘陋而一毫不容也若吾儒率性之道動靜各正既不病於拘亦不至於肆聖人贊易所謂知至至之可與幾也知終終之可與存義也敬以直內義以方外時止則止時行則行動靜不失其時體用本末備言之矣又曰佛有一箇覺之理可以敬以直內矣然無義以方外其直內者要之其本亦不是佛學禪者覺也覺者心無倚著靈覺不昧所謂常惺惺法若可敬以直內矣然而無制事之義則其所謂覺者猶無寸之尺無心之兩其直內之本亦非矣釋氏本怖死生為利豈是公道釋氏謂有生必有滅故有輪回今求不生不滅之理可免輪回之苦此本出於利己之私意也惟務上達而無下學然則其上達處豈有是也元不相連屬但有間斷非道也絶學而求頓悟故無下學工夫道器本不相離合捨物以明理泯迹以求心豈知道者哉孟子曰盡其心者知其性也彼所謂識心見性是也若存心養性一段事則無矣朱子曰釋氏恍惚之間略見得心性影子都不見裏面許多道理就使有存養之功亦只存養得他所見影子終不分明彼固曰出家獨善便於道體自不足道本人倫今曰出家則於道體虧欠大矣或曰釋氏地獄之類皆是為下根之人設此怖令為善先生曰至誠貫天地人尚有不化豈有立偽教而人可化乎學者於釋氏之説直須如淫聲美色以逺之不爾則駸駸然入於其中矣顔淵問為邦孔子既告之以二帝三王之事而復戒以放鄭聲逺佞人曰鄭聲淫佞人殆彼佞人者是他一邉佞耳然而於已則危只是能使人移故危也至於禹之言曰何畏乎巧言令色直消言畏只是須著如此戒慎猶恐不免釋氏之學更不消言常戒到自家自信後便不能亂得初學立心未定必屏逺異端之説信道既篤乃可考辨其失所以謂萬物一體者皆有此理只為從那裏來生生之謂易生則一時生皆完此理人則能推物則氣昏推不得不可道他物不與有也天地之理流行化生人之與物均有是生則亦均具是理所謂萬物一體也然人所稟之氣通故能推物所稟之氣塞故不能推人只為自私將自家軀殼上頭起意故看得道理小了他底放這身來都在萬物中一例看大小大快活人知萬物一體之理不為私己之見自然與物各得其所釋氏以不知此去他身上起意思奈何那身不得故却厭惡要得去盡根塵為心源不定故要得如枯木死灰然沒此理要有此理除是死也釋氏惟不知萬物一體順理而行本無障礙顧乃自生私見為吾身不能不交於物也遂欲盡去根塵空諸所有佛書以耳舌口鼻身意為六根以色聲香味觸法為六塵其説為幻塵滅故幻根亦滅幻根滅故幻心亦滅然心本生道有體則有用豈容絶滅哉釋氏其實是愛身放不得故説許多譬如蝜蝂之蟲已載不起猶自更取物在身又如抱石投河以其重愈沈終不道放下石頭惟嫌重也原釋氏之初本是愛己妄生計較欲世離生死而不知去私己之念本無事也人有語導氣者問先生曰君亦有術乎明道曰吾嘗夏葛而冬裘飢食而渴飲節嗜欲定心氣如斯而已矣聖賢養生順理窒欲而已豈若偏曲之士為長生久視之術哉佛氏不識隂陽書夜死生古今安得謂形而上者與聖人同乎以上並明道語生伊川先生曰形而上者性命也隂陽書夜死古今乃天命之流行二氣之屈伸釋氏指為輪回為幻妄則其所談性命亦異乎聖人矣釋氏之説若欲窮其説而去取之則其説未能窮固已化而為佛矣只且於迹上考之其設教如是則其心果如何固難為取其心不取其迹有是心則有是迹王通言心迹之判便是亂説故不若且於迹上斷定不與聖人合其言有合處則吾道固己有有不合者固所不取如是立定却省易此言雖為初學立心未定者設然孟子闢楊墨亦不過考其迹而推其心極之於無父無君此實辨異端之要領也問神仙之説有諸明道曰若説白日飛升之類則無若言居山林間保形煉氣以延年益夀則有之譬如一爐火置之風中則易過置之密室則難過有此理也又問揚子言聖人不師仙厥術異也聖人能為此等事否曰此是天地間一賊若非竊造化之機安能延年使聖人肯為周孔為之矣人之精氣聚則生散則死彼有見於造化之機竊而用之使精氣固結而不散故能獨夀理之所有也顧其自私小技聖賢弗為耳謝顯道歷舉佛説與吾儒同處問伊川先生先生曰恁地同處雖多只是本領不是一齊差却外書其大本既差則説似同而實異橫渠先生曰釋氏妄意天性而不知範圍之用反以六根之微因緣天地明不能盡則誣天地日月為幻妄範圍猶裁成也聖盡性故能裁成天地之道釋氏乃欲識性而不知範圍之用則是未嘗知性也謂六根悉本天地六根起滅無有實相天地日月等為幻妄蔽其用於一身之小溺其志於虛空之大此所以語大語小流遁失中厭此身之小則蔽其用而不能推樂虛空之大則溺其志而不能反故其語大語小輾轉流遁皆失其中其過於大也塵芥六合其蔽於小也夢幻人世謂之窮理可乎不知窮理而謂之盡性可乎謂之無不知可乎上下四方為六合謂六合在虛空中特一微塵芥子耳所以言虛空之大一切有為法如夢幻泡影所以言人世之微此皆不能窮理盡性之過塵芥六合謂天地為有窮也夢幻人世明不能究其所從也正蒙下同佛説謂虛空無窮天地有窮人世起滅皆為幻妄莫知所從來也大易不言有無言有無諸子之陋也易曰一隂一陽之謂道蓋隂陽之運其所以然者即道也體用相因精粗罔間不可以有無分後世異端見道不明始則以道為無以器為有有者為幻妄為土苴無者為玄妙為真空析有無而二之皆諸子之陋見也浮圗明鬼謂有識之死受生循環遂厭苦求免可謂知鬼乎精氣聚則為人散則為鬼散則澌滅就盡而已釋氏謂神識不散復寓形而受生是不明鬼之理也以人生為妄見可謂知人乎人生日用無非天理之當然釋氏指為浮生幻化豈為知人乎天人一物輒生取舍可謂知天乎天人一理今乃棄人事而求天性豈為知天乎孔孟所謂天彼所謂道惑者指逰魂為變為輪回未之思也大學當先知天德知天德則知聖人知鬼神今浮圗劇論要歸必謂死生流轉非得道不免謂之悟道可乎本注云悟則有義有命均死生一天人推知晝夜通隂陽體之無二當生而生當死而死是則有義有命生死均安何所厭苦天人一致何所取舍知晝夜通隂陽則知生死之説何所謂輪回自其説熾傳中國儒者未容窺聖學門牆已為引取淪胥其間指為大道乃其俗達之天下致善惡知愚男女臧獲人人著信使英才間氣生則溺耳目恬習之事長則師世儒崇尚之言遂冥然被驅因謂聖人可不修而至大道可不學而知故未識聖人心已謂不必求其迹未見君子志已謂不必事其文此人倫所以不察庶物所以不明治所以忽德所以亂世儒於聖門未有所見而耳目習熟固已陷溺於異端乃謂不假修為立地成佛不立文字教外别傳不修而至故謂不必求其迹不學而知故謂不必事其文異言入耳上無禮以防其偽下無學以稽其弊自古詖淫邪遁之辭翕然並興一出於佛氏之門者千五百年向非獨立不懼精一自信有大過人之才何以正立其間與之較是非計得失哉詭服異行非修先王之禮何以防其偽邪説異教非通聖人之學何以稽其弊近思録卷十三
