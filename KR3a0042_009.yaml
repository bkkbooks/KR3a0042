body:
  text: 近思録卷九宋朱子吕祖謙同編葉采集解治法凡二十七條此卷論治法蓋治本雖立而治具不容缺禮樂刑政有一之未備未足以成極治之功也濓溪先生曰古聖王制禮法修教化三綱正九疇敘百姓太和萬物咸若朱子曰綱網上大綱也三綱者夫為妻綱父為子綱君為臣綱也疇類也九疇見洪範若順也此所謂理而後和也乃作樂以宣八風之氣以平天下之情朱子曰八音以宣八方之風見國語宣所以達其理之分平所以節其和之流故樂聲淡而不傷和而不淫入其耳感其心莫不淡且和焉淡則欲心平和則躁心釋朱子曰淡者禮之發和者樂之為先淡後和亦主靜之意也然古聖賢之論樂曰和而已此所謂淡蓋以今樂形之而後見其本於莊敬齊肅之意耳優柔平中德之盛也天下化中治之至也是謂道配天地古之極也朱子曰欲心平故平中躁心釋故優柔言聖人作樂功化之盛如此或云化中當作化成後世禮法不修政刑苛紊縱欲敗度下民困苦謂古樂不足聽也代變新聲妖淫愁怨導欲增悲不能自止故有賊君棄父輕生敗倫不可禁者矣朱子曰縱欲敗度故其聲不淡而妖淫政苛民困故其聲不和而愁怨妖淫故導欲而至於輕生敗倫愁怨故增悲而至於賊君棄父嗚呼樂者古以平心今以助欲古以宣化今以長怨朱子曰古今之異淡與不淡和與不和而已不復古禮不變今樂而欲至治者逺哉通書復朱子曰古禮然後可以變今樂明道先生言於朝曰治天下以正風俗得賢才為本宜先禮命近侍賢儒及百執事悉心推訪有德業充備足為師表者其次有篤志好學材良行修者延聘敦遣萃於京師俾朝夕相與講明正學其道必本於人倫明乎物理大而人倫微而物理皆道之體也其教自小學灑掃應對以往修其孝弟忠信周旋禮樂其所以誘掖激勵漸摩成就之道皆有節序誘掖引而進之激勵作而興之漸摩則有漸成就則周足其要在於擇善修身至於化成天下自鄉人而可至於聖人之道擇善者致知格物也修身者誠意正心修身也化成天下者齊家治國平天下也鄉人鄉里之常人孟子曰我猶未免為鄉人是也其學行皆中於是者為成德取材識明達可進於善者使日受其業所學所行中乎是者謂擇善修身足以化成天下蓋成德之士也則又取夫材識明達可與適道者使受學於成德之人擇其學明德尊者為太學之師次以分教天下之學教成使為學官推教法於天下擇士入學縣升之州州賓興於太學聚而教之歲論其賢者能者於朝此仿周禮鄉大夫賓興司馬論士之制凡選士之法皆以性行端潔居家孝弟有亷恥禮遜通明學業曉達治道者文集下同則以此選士通於理而適於用本於身而及於天下其與後世以文詞記誦取士者有間矣明道先生論十事一曰師傅古者自天子達於庶人必須師友以成就其德業今師傅之職不修友臣之義未著所以尊德樂善之風未成二曰六官天地四時之官歷二帝三王未之或改今官秩淆亂職業廢弛太平之治所以未至三曰經界制民常産使之厚生則經界不可不正井地不可不均今富者跨州縣而莫之止貧者流離餓殍而莫之恤幸民雖多而衣食不足者蓋無紀極生齒日益繁而不為之制則衣食日蹙轉死日多四曰鄉黨古者政教始乎鄉里其法起於比閭族黨州鄉酇遂以相聨屬統治故民相安而親睦刑法鮮犯亷恥易格五曰貢士庠序所以明人倫化成天下今師學廢而道德不一鄉射亡而禮義不興貢士不本於鄉里而行實不修秀民不養於學校而人材多廢六曰兵役古者府史胥徒受祿公上而兵農未始判也今驕兵耗匱國力禁衛之外不漸歸之農則將貽深慮府史胥徒之役毒遍天下不更其制則未免大患七曰民食古者民必有九年之食今天下耕之者少食之者衆地力不盡人功不勤固宜漸從古制均田務農公私交為儲粟之法以為凶歲之備八曰四民古者四民各有常職而農者十居八九故衣食易給今京師浮民數逾百萬此在酌古變今均多恤寡漸為之業以救之耳九曰山澤聖人理物山虞澤衡各有常禁故萬物阜豐而財用不乏今五官不修六府不治用之無節取之不時惟修虞衡之職使長養之則有變通長久之勢十曰分數古者冠昏喪祭車服器用等差分别莫敢踰僭故財用易給而民有常心今禮制不足以檢飭人情名數不足以旌别貴賤姦詐攘奪人人求厭其欲此爭亂之道也以上十條並節録本文其言曰無古今無治亂如生民之理有窮則聖王之法可改後世能盡其道則大治或用其偏則小康此歷代彰灼著明之效也苟或徒知泥古而不能施之於今姑欲徇名而遂廢其實此則陋儒之見何足以論治道哉然儻謂今人之情皆已異於古先王之迹不可復於今趣便目前不務高逺則亦恐非大有為之論而未足以濟當今之極弊也泥古而不度今之冝徇復古之名而失其實此固陋儒之見然遂謂先王治法不可用於今苟且卑陋此又世俗之淺識豈足以大有為而拯極弊哉伊川先生上疏先生除崇正殿説書首上此疏曰三代之時人君必有師傅保之官師道之教訓道開誘也傅傅之德義傅附益也保保其身體保安全也後世作事無本知求治而不知正君知規過而不知養德君正則治可舉德盛則過自消正君養德者本也求治規過者末也傅德義之道固已疏矣保身體之法復無聞焉後世徒存保傅之名而無其職不言師者今日經筵之官則道之教訓之事臣以為傅德義者在乎防見聞之非節嗜好之過非禮之事不接於耳目嗜好之私不溺乎心術則德義進矣保身體者在乎適起居之宜存畏愼之心外適起居之宜內存畏謹之念則心神莊肅氣體和平矣今既不設保傅之官則此責皆在經筵欲乞皇帝在宫中言動服食皆使經筵官知之官中言動服食之間經筵官皆得與聞之則深宫燕私之時無異於經筵講誦之際對宦官宫妾之頃猶若師保之臨乎前也有翦桐之戲則隨事針規違持養之方則應時諫止文集史記成王與叔虞戲削桐葉為圭曰以此封若史佚曰天子無戲言遂請封叔虞於唐本注遺書又云某嘗進言欲令上於一日之中親賢士大夫之時多親宦官宮人之時少所以涵養氣質薰陶德性伊川先生看詳三學條制云舊制公私試補蓋無虛月學校禮義相先之地而月使之爭殊非教養之道請改試為課有所未至則學官召而教之更不考定高下設教之道禮遜為先制尊賢堂以延天下道德之士及置待賓吏師齋立檢察士人行檢等法尊賢謂道德可矜式者待賓謂行能可賓敬者吏師通於治道可為吏之師法也三者皆才德過人首延禮之使士人知所向慕次乃立檢察士行之法又云自元豐後設利誘之法增國學解額至五百人來者奔湊捨父母之養忘骨肉之愛往來道路旅寓他土人心日偷士風日薄偷苟得也薄謂薄於人倫今欲量留一百人餘四百人分在州郡解額窄處自然士人各安鄉土養其孝愛之心息其奔趨流浪之志風俗亦當稍厚又云三舍升補之法皆案文責迹有司之事非庠序育材掄秀之道舊制以不犯罰為行試在高等為藝按其文而不考其實責其迹而不察其心教之者非育才之道取之者非掄秀之法蓋朝廷授法必達乎下長官守法而不得有為是以事成於下而下得以制其上此後世所以不治也朝廷之法直達於下中間更不任人故長吏拘於法而不得自任在下者反得執法以取必於上後世不治皆此之由非獨庠序而已或曰長二得人則善矣或非其人不若防間詳密可循守也殊不知先王制法待人而行未聞立不得人之法也苟長二非人不知教育之道徒守虛文密法果足以成人材乎或者謂任人則人不能保其皆善任法則法猶可守也殊不知法待人而後行苟不得人則雖有密法而無益於成才苟得其人則無待於密法而法之密反害其成才之道故不若略文法而專責任也明道先生行狀云先生為澤州晉城令民以事至邑者必告之以孝弟忠信入所以事父兄出所以事長上教民孝弟為政先務度鄉村逺近為伍保使之力役相助患難相恤而姦偽無所容五家為伍五伍為保伍謂相參比也保謂相保任也凡孤煢殘廢者責之親戚鄉黨使無失所行旅出於其塗者疾病皆有所養孤窮而無依殘廢而不全羇旅而疾病者皆窮民無告使之各得所養諸鄉皆有校暇時親至召父老與之語兒童所讀書親為正句讀教者不善則為易置擇子弟之秀者聚而教之鄉民為社會為立科條旌别善惡使有勸有恥觀此則養民善俗平易忠厚之政可知矣萃王假有廟伊川易傳曰羣生至衆也而可一其歸仰人心莫知其鄉也而能致其誠敬鬼神之不可度也而能致其來格天下萃合人心總攝衆志之道非一其至大莫過於宗廟故王者萃天下之道至於有廟則萃道之至也假至也王者至於有廟則萃道之盛也蓋羣生向背不齊惟於鬼神則歸仰如一人心出入無時惟奉鬼神則誠敬自盡言人心之渙散每萃於祭享也鬼神視之而弗見聽之而弗聞然齊明盛服以承祭祀則洋洋如在可致來格言鬼神之遊散亦每萃於宗廟也祭祀之報本於人心聖人制禮以成其德耳故豺獺能祭其性然也易傳古者戍役再期而還今年春暮行明年夏代者至復留備秋至過十一月而歸又明年仲春遣次戍者每秋與冬初兩番戍者皆在疆圉乃今之防秋也經説論采薇遣戍役北人畏暑耐寒又秋氣折膠則弓弩可用故秋冬易為侵暴每留戍以防之聖人無一事不順天時故至日閉關遺書下同復卦彖傳説見第四卷韓信多多益辦只是分數明分者管轄階級之分數者行伍多寡之數分數明則上下相臨統紀不紊所御者愈衆而所操者常寡伊川先生曰管轄人亦須有法徒嚴不濟事今帥千人能使千人依時及節得飯喫只如此者亦能有幾人管轄統軍之官法謂區畫分數之法嘗謂軍中夜驚亞夫堅臥不起不起善矣然猶夜驚何也亦是未盡善漢景帝時七國反遣周亞夫將兵擊之軍中夜驚擾至帳下亞夫堅臥帳中不起有頃遂定管攝天下人心收宗族厚風俗使人不忘本須是明譜系收世族立宗子法譜籍録也系聨屬也明之者辨著其宗派古者諸侯之適子適孫繼世為君其餘庶子不得禰其先君因各自立為本派之始祖其子孫百世皆宗之所謂大宗也族人雖五世外皆為之齊衰三月大宗之庶子又别為小宗而小宗有四其繼高祖之適長子則與三從兄弟為宗繼曽祖之適長子則與再從兄弟為宗繼祖之適長子則與同堂兄弟為宗繼禰之適長子則與親兄弟為宗蓋一身凡事四宗與大宗為五宗也又曰一年有一年工夫行之以漸持之以久宗子法壞則人不自知來處以至流轉四方往往親未絶不相識今且試以一二巨公之家行之其術要得拘守得須是且如唐時立廟院仍不得分割了祖業使一人主之立廟院則人知所自出而不散不分祖業則人重其宗而不遷凡人家法須月為一會以合族古人有花樹韋家宗會法可取也每有族人逺來亦一為之吉凶嫁娶之類更須相與為禮使骨肉之意常相通骨肉日疏者只為不相見情不相接爾冠婚喪祭禮之大者今人都不理會豺獺皆知報本今士大夫家多忽此厚於奉養而薄於先祖甚不可也某嘗修六禮大略家必有廟庶人立影堂自庶人以下皆本注廟必有主高祖以上即當祧也主式見文集又云今人以影祭或一髭髮不相似則所祭己是别人大不便月朔必薦新薦後方食時祭用仲月止於高祖旁親無後者祭之别位冬至祭始祖冬至陽之始也始祖厥初生民之祖也無主於廟中正位設一位合考妣享之立春祭先祖立春生物之始也先祖始祖而下高祖而上非一人也亦無主設兩位分享考妣季秋祭禰季秋成物之時也忌日遷主祭於正寢凡事死之禮當厚於奉生者人家能存得此等事數件雖幼者可使漸知禮義卜其宅兆宅墓次也兆塋域也卜其地之美惡也地美則神靈安其子孫盛然則曷謂地之美者土色之光潤草木之茂盛乃其驗也而拘忌者惑以擇地之方位決日之吉凶甚者不以奉先為計而專以利後為慮尤非孝子安厝之用心也惟五患者不得不愼須使後日不為道路不為城郭不為溝池不為貴勢所奪不為耕犁所及本注云一本所謂五患者溝渠道路避村落逺井窑正叔云某家治喪不用浮圖在洛亦有一二人家化之司馬公曰世俗信浮圖誑誘飯僧設道場捨經造像建塔廟曰為此者減除大罪惡必生天堂不為者必入地獄受無邊波吒之苦殊不知人生含血氣知痛癢或剪爪剃髮從而燒研之巳不知苦況於死者形神相離形則入於黃壤朽腐消滅與木石等神則飄若風火不知何之借使銼燒舂磨豈復知之安得有天堂地獄之理今無宗子故朝廷無世臣若立宗子法則人知尊祖重本人既重本則朝廷之勢自尊古者宗子襲其世祿故有世臣人知尊祖而重本上下相維自然固結而不渙散故朝廷之勢自尊古者子弟從父兄今父兄從子弟由不知本也且如漢高祖欲下沛時只是以帛書與沛父老其父兄便能率子弟從之又如相如使蜀亦移書責父老然後子弟皆聽其命而從之只有一箇尊卑上下之分然後順從而不亂也若無法以聨屬之安可漢初去古未逺猶有先王之遺俗尊卑之分素定所以上下順承而無違悖也且立宗子法亦是天理譬如木必有從根直上一幹亦必有旁枝又如水雖逺必有正源亦必有分派處自然之勢也直幹正源猶大宗也旁枝分派猶小宗也然而又有旁枝達而為幹者故曰古者天子建國諸侯奪宗云天子為天下主故得封建侯國賜之土而命之胙諸侯為一國之主雖非宗子亦得移宗於已建宗廟為祭主郉和叔敘明道先生事云堯舜三代帝王之治所以博大悠逺上下與天地同流者先生固已默而識之所謂識其大者至於興造禮樂制度文為下至行師用兵戰陳之法無所不講皆造其極外之邊圉情狀山川道路之險易邊鄙防戍城寨斥候控帶之要靡不究知壘土居民曰城木柵處兵曰寨斥逺也候伺也謂逺伺敵人控制禦也帶圍護也其吏事操決文法簿書又皆精密詳練若先生可謂通儒全才矣附録操決謂操持斷決也介甫言律是八分書是他見得外書朱子曰律是刑統歷代相傳至周世宗命竇儀注解名曰刑統與古法相近故曰八分書又曰律所以明法禁非亦有助於教化但於根本上少有欠缺耳是他見得蓋許之之詞橫渠先生曰兵謀師律聖人不得已而用之其術見三王方策歷代簡書惟志士仁人為能識其逺者大者素求預備而不敢忽忘文集下同好謀而成師出以律雖聖人用師無謀則必敗無律則必亂特非若後世譎詐以為謀酷暴以為律斯其為逺者大者惟志士仁人為能識之肉辟於今世死刑中取之亦足寬民之死過此當念其散之之久肉刑有五刻顙曰墨辟截鼻曰劓辟刖足曰剕辟淫刑曰宫辟死刑曰大辟至漢文帝始罷墨劓剕宫之刑或曰宫刑不廢今欲取死刑情輕者用肉刑以代之外此當念民心渙散之久必明禮義教化以維持之不但省刑以緩死吕與叔撰橫渠先生行狀曰先生慨然有意三代之治論治人先務未始不以經界為急嘗曰仁政必自經界始貧富不均教養無法雖欲言治皆苟而已孟子曰仁政必自經界始蓋經界不正則富者有所恃而易於為惡貧者失所養而不暇為善教養之法俱廢其治苟且而已世之病難行者未始不以亟奪富人之田為辭然兹法之行悅之者衆苟處之有術期以數年不刑一人而可復所病者特上之人未行耳乃言曰縱不能行之天下猶可驗之一鄉方與學者議古之法共買田一方畫為數井上不失公家之賦役退以其私正經界分宅里立斂法廣儲蓄興學校成禮俗救災恤患敦本抑末足以推先王之遺法明當今之可行此皆有志未就橫渠先生為雲巖令政事大抵以敦本善俗為先去浮華而務質抑末作而尚本皆敦本之事也勉其孝弟興於禮遜皆善俗之事也每以月吉具酒食召鄉人高年會縣庭親為勸酬使人知養老事長之義因問民疾苦及告所以訓戒子弟之意行狀月吉月朔也橫渠先生曰古者有東宮有西宫有南宮有北宮異宮而同財此禮亦可行古人慮逺目下雖似相疏其實如此乃能久相親蓋數十百口之家自是飲食衣服難為得一族大人衆則服食器用固有不能齊者同宮合處則怨爭之風或作矣又異宮乃容子得伸其私所以避子之私也子不私其父則不成為子古之人曲盡人情必也同宮有叔父伯父則為子者何以獨厚於其父為父者又烏得而當之雖同宗祖然親疏有分異宫者亦使人子各得盡情於其親也不然則交相病矣父子異宮為命士以上愈貴則愈嚴一命為士則父子亦異宫愈貴則分制愈密故異宫猶今世有逐位非如異居也樂説治天下不由井地終無由得平周道止是均平語録下同周道如砥言其平也井田卒歸於封建乃定國有定君官有定守故民有定業後世長吏更易不常相仍苟且縱復井田不歸於封建則其欺蔽紛爭之患庸可定乎近思録卷九
