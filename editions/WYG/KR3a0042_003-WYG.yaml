body:
  text: 近思録卷三宋朱子吕祖謙同編葉采集解致知凡七十八條此卷論致知知之至而後有以行之自首段至二十一段總論致知之方然致知莫大於讀書二十三段至三十三段總論讀書之法三十四段以後乃分論讀書之法而以書之先後為序始於大學使知為學之規模次序而後繼之以論孟詩書義理充足於中則可探大本一原之妙故繼之以中庸達乎本原則可以窮神知化故繼之以易理之明義之精而達乎造化之蘊則可以識聖人之大用故繼之以春秋明乎春秋之用則可推以觀史而辨其是非得失之致矣横渠易説以下則仍語録之序而周官之義因以具焉伊川先生答朱長文書曰心通乎道然後能辨是非如持權衡以較輕重孟子所謂知言是也道者事物當然之理通曉達也知言者天下之言無不究明其理而識其是非之所以然心不通乎道而較古人之是非猶不持權衡而酌輕重竭其目力勞其心智雖使時中亦古人所謂億則屢中君子不貴也文集下同説見論語時中謂有時而中之億以意揣度也揣度而中則非明理之至矣伊川先生答門人曰孔孟之門豈皆賢哲固多衆人以衆人觀聖賢弗識者多矣惟其不敢信己而信其師是故求而後得今諸君與頤言纔不合則置不復思所以終異也不可便放下更且思之致知之方也伊川先生答横渠先生曰所論大槩有苦心極力之象而無寛裕溫厚之氣非明睿所照而考索至此故意屢偏而言多窒小出入時有之本註云明所照者如目所覩纎微盡識之矣考索至者如揣料於物約見髣髴爾能無差乎更願完養思慮涵泳義理他日自當條暢苦思强索則易至於鑿而不足以達於理涵泳深厚則明睿自生欲知得與不得於心氣上驗之思量有得中心悦豫沛然有裕者實得也思慮有得心氣勞耗者實未得也强揣度耳學固原於思然所貴從容饜飫而自得不可勞心極慮而强通甞有人言比因學道思慮心虛曰人之血氣固有虛實疾病之來聖賢所不免然未聞自古聖賢因學而致心疾者遺書下同今日雜信鬼怪異説者只是不先燭理若於事上一一理㑹則有甚盡期須只於學上理㑹講學則理明而怪妖不足以惑之矣學原於思學以明理為先善思則則睿生而物理可格所謂日月至焉與久而不息者所見規模雖略相似其意味氣象迥别學者於仁或日或月而至焉方其至之時其視夫三月不違者所造所見亦無以異但其意味氣象則淺深厚薄迥然不同須濳心黙識玩索久之庶㡬自得學者不學聖人則已欲學之須熟玩味聖人之氣象不可只於名上理㑹如此只是講論文字濳玩聖賢氣象庻養之厚而得之深若徒考論文義則末矣問忠信進徳之事固可勉强然致知甚難忠信進徳力行也謂行可以强而進知不可以强而至伊川先生曰學者固當勉强然須是知了方行得若不知只是覻却堯學他行事無堯許多聰明睿知怎生得如他動容周旋中禮學者當以致知為先苟明有所不至徒規規然學堯行事其可得乎如子所言是篤信而固守之非固有之也固守者勉强而堅執固有者從容而自得未致知便欲識意是躐等也勉强行者安能持久忠信即誠意之事欲誠其意者先致其知知有未至而勉强以為忠信其能久乎除非燭理明自然樂循理性本善循理而行是順理事本亦不難但為人不知旋安排著便道難也見理明則真知而實信之自然樂於循理葢人性本善順理而行宜無待於勉强惟於理有未知或知有未盡臨事布置故覺其難知有多少般數煞有深淺學者須是真知纔知得是便泰然行将去也真知者知之至也真知其是則順而行之莫能遏矣某年二十時解釋經義與今無異然思今日覺得意味與少時自别此可見先生致知之功進徳之實而聖經之㫖要必玩味積久乃能真知而亦不徒在於解釋文義而已凡一物上有一理須是窮致其理窮理亦多端或讀書講明義理或論古今人物别其是非或應接事物而處其當皆窮理也三者窮理之目當隨寓而究竟然讀書講明義理尤為要切而觀人處事之準則要亦於書而得之或問格物須物物格之還只格一物而萬理皆知曰怎得便㑹貫通若只格一物便通衆理雖顔子亦不敢如此道須是今日格一件明日又格一件積習既多然後脱然自有貫通處朱子曰程子説格物曰格至也格物而至於物則物理盡意向俱到不可移易天生烝民有物有則物者形也則者理也人其是物而不能明其物之理則無以順性命之正而處事物之當故必即是物以求之知求其理矣而不知乎物之極則事之理有未窮而吾之知亦未盡故必至其極而後已又曰所務於窮理者非道盡窮了天下萬物之理又不道是窮得一理便到只要積累多後自然見去朱子曰今人務博者却要盡窮天下之理務約者又謂反身而誠則天下之物無不在我此皆不是唯程子積累貫通之説為妙思曰睿思慮久後睿自然生説見尚書睿通微也人心虛靈本然明徳致思窮理久自通微若於一事上思未得且别換一事思之不可專守著這一事葢人之知識於這裏蔽著雖强思亦不通也致知之道弗明弗措然人心亦有偏暗處當且置之庶不滯於一隅問人有志於學然知識蔽固力量不至則如之何曰只是致知若知識明則力量自進真知事理之當然則自有不容己者問觀物察己還因見物反求諸身否曰不必如此説物我一理纔明彼即曉此此合内外之道也天下無二理物之理即吾心之理也因見物而反求諸身則是以物我為二致又問致知先求之四端如何曰求之情性固是切於身然一草一木皆有理須是察四端説見孟子理散於萬物而實㑹於吾心皆所當察也又曰自一身之中以至萬物之理但理㑹得多胷次自然豁然有覺處按上段曰積習既多然後脱然自有貫通處又曰積累多後自然見去又曰理㑹得多自然豁然有覺處再三言之惟欲學者隨事窮格積習既多於天下事物各有以見其當然之則一旦融㑹貫通表裏洞徹則覺斯道之大原全吾心之本體物既格而知且至矣其在孔門則顔子卓然之後曽子一唯之時乎或者厭乎觀理之煩而遽希一貫之妙或專滯於文義之末而終昧上達之㫖皆不足有見於是道也思曰睿睿作聖致思如掘井初有渾水久後稍引動得清者出來人思慮始皆溷濁久自明快致思則能通乎理故明睿生充其睿則可以入聖域故睿作聖然致思之始疑慮方生所以溷濁致思之久疑慮既消自然明快此由思而生睿也問如何是近思曰以類而推思慮泛逺而不循序漸進則勞心而無得即吾所知者以類推之則心路易通而思有條理是謂近思朱子曰若是真箇劈初頭理㑹得一件分曉透徹便逐件如此理㑹去相次亦不難又曰從已理㑹得處推将去便不隔越若逺去尋討則不切已學者先要㑹疑朱子曰書始讀未知有疑其次漸有疑又其次節節有疑過了此一番後疑漸漸釋以至融㑹貫通都無可疑方始是學横渠先生答范巽之曰所訪物怪神姦此非難語顧語未必信耳物異為怪神妖為姦見理未明自不能無疑雖得於人言亦未必信孟子所論知性知天學至於知天則物所從出當源源自見知所從出則物之當有當無莫不心諭亦不待語而後知天者物理之所自出知天則通乎幽明之故察乎事物之原而妖異之所由興皆可識矣諸公所論但守之不失不為異端所劫進進不已則物怪不須辨異端不必攻不逾期年吾道勝矣學者知有未至且堅守正論不為邪妄所奪又能進於學而不已則怪異不必攻辨将自識破若欲委之無窮付之以不可知則學為疑撓智為物昏交來無間卒無以自存而溺於怪妄必矣文集下同不能堅守正論内懷疑端外為邪蔽久則所惑愈深矣子貢謂夫子之言性與天道不可得而聞既言夫子之言則是居常語之矣聖門學者以仁為己任不以苟知為得必以了悟為聞因有是説性者人心禀賦之理天道者造化流行之妙以仁為己任葢期於實體而自得也苟知者徒聞其説了悟者深達其理然則後之學者髙談性命而實不領㑹者可以自省矣義理之學亦須深沉一作玩方有造非淺易輕浮之可得也朱子曰聖人言語一重又一重須入深處看方有得若只見皮膚便有差錯學不能推究事理只是心麤至如顔子未至於聖人處猶是心麤顔子不能不違仁於三月之後者是其察理猶或有一毫之未精故所存猶或有一毫之間㫁博學於文者只要得習坎心亨葢人經歴險阻艱難然後其心亨通上下坎為習坎卦當重險而彖辭曰維心亨人之博學窮理始多齟齬積習既久自然心通義理有疑則濯去舊見以來新意心有所疑而滯於舊見則偏執固吝新意何從而生舊疑何自而釋心中有所開即便劄記不思則還塞之矣疑義有所通隨即劄記則已得者可以不忘未得者可以有進不記則思不起猶山徑之蹊間不用則茅塞之矣更須得朋友之助一日間意思差别須日日如此講論久則自覺進也按此段及焞到問為學之方一段泉州本皆繫卷末而舊本則此段在第二十一尹問一段在三十三今考此卷編輯之意則二段乃總論致知不當在卷末無疑也但舊本此段不全載心中有所開以下云云恐是後來欲添足此數語傳者誤成重出耳又詳此段已是專論讀書之法不當在廿一疑當時欲移在尹問之後故並録之耳今不敢輕改姑從舊本而添入心中有所開数語凡致思到説不得處始復審思明辨乃為善學也若告子則到説不得處遂已更不復求横渠孟子説思之其説似窮然後更加審思明辨之功則其窮者通而所得者深也若告子不得於言不復求之於心固執偏見而不求至當此孟子所深病也此以上總論致知之方以下乃專論求之於書者詳見卷首伊川先生曰凡看文字先須曉其文義然後可求其意未有文義不曉而見意者也遺書下同學者要自得六經浩𣺌乍來難盡曉且見得路徑後各自立得一箇門庭歸而求之可矣識路徑則知趨向立門庭則有規模得於師友者如此然後歸而求之可矣凡解文字但易其心自見理理只是人理甚分明如一條平坦底道路詩曰周道如砥其直如矢此之謂也理本平直苟以﨑嶇委曲之意求之乃失之鑿詩見小雅大東篇或曰聖人之言恐不可以淺近看他曰聖人之言自有近處自有深逺處如近處怎生强要鑿教深逺得聖人之道逺近精麤無所不備故聖人之言道亦無所不至如食無求飽居無求安是其近者如一貫之㫖性天之言是其逺者固無非道也又豈容盡求其深逺而過為穿鑿邪揚子曰聖人之言逺如天賢人之言近如地頤與改之曰聖人之言其遠如天其近如地其逺者雖子貢猶未易得而聞其近者雖鄙夫可得而竭也或曰聖人之言包蓄無所不盡語近而不遺乎逺語逺而不遺乎近故曰其逺如天其近如地非但髙逺而已愚按此段本欲人平心以觀書不可妄生穿鑿又謂聖人之言自有逺處自有近處如此則謂語近而不遺乎逺者意自不同也前説為是學者不泥文義者又全背却逺去理㑹文義者又滯泥不通如子濯孺子為将之事孟子只取其不背師之意人須就上面理㑹事君之道如何也又如萬章問舜完廪浚井事孟子只答他大意人須要理㑹浚井如何出得來完廪又怎生下得來若此之學徒費心力凡觀書不可以相類泥其義不爾則字字相梗當觀其文勢上下之意如充實之謂美與詩之美不同充實之美在己詩之稱美在人如此之類豈可泥為一義問瑩中甞愛文中子或問學易子曰終日乾乾可也此語最盡文王所以聖亦只是箇不已陳忠肅公瓘字瑩中子曰者文中子答或人之問謂乾乾不息此語最為盡易之道先生曰凡説經義如只管節節推上去可知是盡夫終日乾乾未盡得易據此一句只做得九三使若謂乾乾是不已不已又是道漸漸推去自然是盡只是理不如此學經者要當周遍精宻各窮其㫖歸而後能通經苟但借其一語謂足以盡一經之㫖豈治經之道葢好髙求約之病子在川上曰逝者如斯夫言道之體如此這裏須是自見得朱子曰天地之化往者過來者續無一息之停乃道體之本然也然其可指而易見者莫如川流故於此發以示人􅁒學者時時省察而無毫髪之間㫁也張繹曰此便是無窮先生曰固是道無窮然怎生一箇無窮便道了得他朱子曰固是無窮須見所以無窮始得今人不㑹讀書如誦詩三百授之以政不達使於四方不能專對雖多亦奚以為須是未讀詩時不達於政不能專對既讀詩後便達於政能專對四方始是讀詩説見論語朱子曰專獨也詩本人情該物理可以驗風俗之盛衰見政治之得失其言溫厚和平長於風諭故誦之者必達於政而能專對也人而不為周南召南其猶正牆面須是未讀詩時如面牆到讀了後便不面牆方是有驗同上朱子曰為猶學也周南召南所言皆修身齊家之事正牆而言即其至近之地而一物無所見一歩不可行也大抵讀書只此便是法如讀論語舊時未讀是這箇人及讀了後來又只是這箇人便是不曽讀也讀書之法但反諸已驗其實得致其實用變化氣質必有日新之功凡看文字如七年一世百年之事皆當思其如何作為乃有益論語子曰善人教民七年亦可以即戎矣又曰如有王者必世而後仁又曰善人為邦百年可以勝殘去殺矣觀聖賢治效遲速淺深之殊要必究其規模之略施為之方乃於己有益此致知之法也凡解經不同無害但緊要處不可不同爾外書緊要謂綱領也焞初到問為學之方先生曰公要知為學須是讀書書不必多看要知其約多看而不知其約書肆耳此言徒貪多而不知其要則是蓄書之肆而已頤縁少時讀書貪多如今多忘了須是将聖人言語玩味入心記著然後力去行之自有所得又言徒貪多而無玩習之功則所學者非我有也玩味而不忘而又力行其所知則所得為實得以上總論讀書之法以下乃分論讀書之法初學入徳之門無如大學其他莫如語孟遺書下同朱子曰大學規模雖大然首尾該備而綱領可尋節目分明而工夫有序無非切於學者之日用又曰不先乎大學無以提挈綱領而盡語孟之精微不參之語孟無以融㑹貫通而極中庸之歸趣學者先須讀語孟窮得語孟自有要約處以此觀他經甚省力語孟如丈尺權衡相似以此去量度事物自然見得長短輕重語孟之書尤切於學者身心日用之常得其要領則易於推明他經而可以權度事物矣讀論語者但将諸弟子問處便作已問将聖人答處便作今日耳聞自然有得若能於論孟中深求玩味将來涵養成甚生氣質甚生猶非常也凡看語孟且須熟玩味将聖人之言語切己不可只作一塲話説人只看得此二書切己終身儘多也終身儘多謂一生受用不盡論語有讀了後全無事者有讀了後其中得一兩向喜者有讀了後知好之者有讀了後不知手之舞之足之蹈之者全無事者全無所得朱子曰有得一二句喜者這一二句喜處便是入頭處從此著實理㑹去将久自解倐然悟時聖賢格言自是句句好學者當以論語孟子為本論語孟子既治則六經可不治而明矣不治而明言易明也讀書者當觀聖人所以作經之意與聖人所以用心與聖人所以至聖人而吾之所以未至者所以未得者未至以所行言未得以所知言句句而求之晝誦而味之中夜而思之平其心易其氣闕其疑則聖人之意見矣句句而求則察之宻晝味夜思則思之熟然平心易氣而不失於鑿有疑則闕而不强其通如是則聖人之意可得而見矣讀論語孟子而不知道所謂雖多亦奚以為語孟極聖賢之淵源為斯道之統㑹體用兼明精麤畢備讀之而不通於道則章句訓詁而已雖博而何益論語孟子只剩讀著便自意足學者須是玩味若以語言解著意便不足某始作此二書文字既而思之又似剩只有些先儒錯㑹處却待與整理過外書下同問且将語孟緊要處看如何伊川曰固是好然若有得終不浹洽葢吾道非如釋氏一見了便從空寂去朱子曰此是程子答呂晉伯問後來晉伯終身坐此病説得孤單入禪學去學者讀書須逐一去理㑹便通貫浹洽與於詩者吟詠性情涵暢道徳之中而歆動之有吾與㸃也之氣象詩大扺出於人情之真感化之自然者學者於詩吟哦諷詠其性情涵養條暢於道徳自然有感動興起之意此即曽㸃浴沂詠歸之氣象又云興於詩是興起人善意汪洋浩大皆是此意遺書詩人之詞寛平忠厚故有興起人汪洋浩大之意謝顯道云明道先生善言詩他又渾不曽章解句釋但優游玩味吟哦上下便使人有得處瞻彼日月悠悠我思道之云逺曷云能來思之切矣終曰百爾君子不知徳行不忮不求何用不臧歸於正也朱子曰讀詩之法只是熟讀涵泳自然和氣從胷中流出其妙處不可得而言不待安排立説只平讀著意自足又云伯淳常談詩並不下一字訓詁有時只轉却一兩字㸃掇地念過便教人省悟又曰古人所以貴親炙之也外書下同㸃掇猶沾綴拈掇也意如上章親炙親近而熏炙之也明道先生曰學者不可以不看詩看詩便使人長一格價觀詩則使人興起感發便自然有進不以文害辭文文字之文舉一字則是文成句是辭詩為解一字不行却遷就他説如有周不顯自是作文當如此詳見孟子詩大雅文王篇曰有周不顯言周家豈不顯乎葢言其顯也苟直謂之不顯則是以文害辭看書須要見二帝三王之道如二典即求堯所以治民舜所以事君遺書下同中庸之書是孔門傳授成於子思孟子其書雖是雜記更不分精麤一衮説了今人語道多説髙便遺却卑説本便遺却末中庸子思所述而傳之孟子者也其言天命之性則推之於脩道之教言中和則極之於天地位萬物育言政而本之於達徳逹道言治天下國家則合之於誠小大並舉費隠兼該葢是道之大體用相涵本末一貫元不相雜説本而遺其末則亦陷於空虛而未達天下之大本矣伊川先生易傳序曰易變易也隨時變易以從道也隂陽變易而生萬化聖人象之而畫卦爻使人體卦爻之變易而隨時以從道也或問易即道也何以言變易以從道朱子曰易之所以變易固皆理之當然聖人作易因象明理教人以變易從道之方耳如乾初則潜二則見之類是也其為書也廣大悉備将以順性命之理通幽明之故盡事物之情而示開物成務之道也聖人之憂患後世可謂至矣故所以然也開物者使其知之明成務者使其行之就也去古雖逺遺經尚存然而前儒失意以傳言後學誦言而忘味自秦而下葢無傳矣予生千載之後悼斯文之湮晦将俾後人沿流而求源此傳所以作也沿流而求源謂因言以求其意也易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占吉凶消長之理進退存亡之道備於辭推辭考卦可以知變象與占在其中矣尚尊尚之也辭者聖人所繫之辭變者隂陽老少之變象者天地山澤雷風水火之類是也占者吉凶悔吝厲无咎之類是也辭者言之則也故以言者尚其辭變者動之時也故以動者尚其變象事知器故制器者尚其象占事知來故卜筮者尚其占然辭變象占雖各有尚而吉凶消長進退存亡易之大用皆具於辭故變推辭而可知象與占皆不外乎辭也君子居則觀其象而玩其辭動則觀其變而玩其占得於辭不達其意者有矣未有不得於辭而能通其意者也玩厭習也不止於觀而已葢卦之象可觀而辭之理則無窮故必玩習其辭爻之變可觀而占之義則無窮故必玩習其占平居而觀象玩辭則各盡乎卦之理臨事而觀變玩占則各盡乎爻之用然象與變占皆具於辭故必由辭以通其意至㣲者理也至著者象也體用一源顯㣲無間觀㑹通以行其典禮則辭無所不備朱子曰自理而觀則理為體象為用而理中有象是一源也自象而觀則象為顯理為㣲象中有理是無間也又曰㑹以理之所聚而言通以事之所宜而言其實一也又曰衆理㑹處便有許多難易窒礙必於其中得其通處乃可行耳典禮者典常之禮故善學者求言必自近易於近者非知言者也予所傳者辭也由辭以得意則在乎人焉文集下同道無逺近之間然觀書者必由粗以達於精即顯以推其㣲本民彛日用之常而極於窮神知化之妙不可忽乎近而徒務乎髙逺也伊川先生答張閎中書曰易傳未傳自量精力未衰尚覬有少進爾來書云易之義本起於數則非也有理而後有象有象而後有數易因象以明理由象以知數得其義則象數在其中矣本註云理無形也故因象以明理理既見乎辭矣則可由辭以觀象故曰得其義則象數在其中矣張閎中見程氏門人録易有太極形而上之理也是生兩儀而後象與數形焉此作易之本也易之理寓於象象必有數知其理則象與數皆在其中此學易之要也必欲窮象之隠㣲盡數之毫忽乃尋流逐末術家之所尚非儒者之所務也理者象數之本也不務求其本而徒欲窮其末如京房郭璞之流是也知時識勢學易之大方也易傳下同夬卦九二象傳方猶術也時有盛衰勢有强弱學易者當隨其時勢惟變所適惟道之從也大畜初二乾體剛健而不足以進四五隂柔而能止時之盛衰勢之强弱學易者所宜深識也乾下艮上為大畜初與二雖剛健而不足以進者以畜之時不利於進初二俱位乎下勢又不能進也四與五雖隂柔而能止乎健者以畜之時在於止四五位據乎上勢人足以為止也諸卦二五雖不當位多以中為美三四雖當位或以不中為過中常重於正也葢中則不違於正正不必中也天下之理莫善於中於九二六五可見震卦六五傳二者内卦之中五者外卦之中皆中也三為内卦之上四為外卦之下皆不中也六爻之位初三五為陽二四上為隂以陽爻居陽位隂爻居隂位為當位反此者為不當位當位者正也不當位者非正也坤六五非正也而曰黄裳元吉泰九二非正也而曰得尚于中行葢以中為美也蠱之三四皆正也而三則有悔四則往吝既濟之三四皆正也而三則有三年之憊四則有終日之戒葢以不中為歉也正者天下之定理中者時措之宜也正者有時而失其中中則隨時而得其正者也故中之義重於正問胡先生解九四作太子恐不是卦義先生云亦不妨只看如何用當儲貳則做儲貳使九四近君便作儲貳亦不害但不要拘一若執一事則三百八十四爻只作得三百八十四件事便休了遺書下同胡瑗字翼之號安定先生五為君位四近君亦可以為儲貳然易本無拘惟其所遇皆可用占看易且要知時凡六爻人人有用聖人自有聖人用賢人自有賢人用衆人自有衆人用學者自有學者用君有君用臣有臣用無所不通因問坤卦是臣之事人君有用處否先生曰是何無用如厚徳載物人君安可不用易中只是言反復往來上下反復如復姤之類往來如賁无妄之類上下如咸恆之類皆隂陽變易之道而易之所以為易也作易自天地幽明至於昆蟲草木㣲物無不合外書下同易無不該無不合者理之根極本一貫也今時人看易皆不識得易是何物只就上穿鑿若念得不熟只就上添一徳亦不覺多就上減一徳亦不覺少譬如不識此兀子若減一隻脚亦不知是少若添一隻亦不知是多若識則自添減不得也學者當體此意使於卦象辭義皆的然見其不可易而後為得也游定夫問伊川隂陽不測之謂神伊川曰賢是疑了問是揀難底問游氏或未之深思特以此語艱深而率爾請問故伊川不答而直攻其心欲使反已而致思也伊川以易傳示門人曰只説得七分後人更須自體究義理無窮聖賢之心亦無窮學者不可以不自勉伊川先生春秋傳序曰天之生民必有出類之才起而君長之治之而爭奪息導之而生養遂教之而倫理明然後人道立天道成地道平天生烝民必有司牧為之制節而後爭奪息導之播植佃漁而後生養遂示之五品教之孝弟忠信而後倫理明三者具矣故建極秉彛而人道立五氣順布而天道成山川奠位而地道平二帝而上聖賢世出隨時有作順乎風氣之宜不先天以開人各因時而立政以大聖人之資豈不能一旦而盡興天下之利而必待相繼而始備者葢聖人之所為惟其時而已暨乎三王迭興三重既備子丑寅之建正忠質文之更尚人道備矣天運周矣中庸曰王天下有三重焉鄭氏曰三重謂三王之禮天開於子地闢於丑人生於寅周正建子為天統商正建丑為地統夏正建寅為人統而天運周矣夏尚忠商尚質周尚文而人道備矣聖王既不復作有天下者雖欲倣古之迹亦私意妄為而已事之繆秦至以建亥為正道之悖漢專以智力持世豈復知先王之道也三代而下王者之迹熄時君雖欲倣而為之亦皆無所考證不過用其私意妄為而已子丑寅建正葢本三才以更始秦至以亥月為歳首自謂水徳欲以勝周忠質文更尚皆本仁義以致用漢專以智力把持天下故謂漢家自有制度葢極言世變之不復近古夫子當周之末以聖人不復作也順天應時之治不復有也於是作春秋為百王不易之大法所謂考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑者也夫子因魯史作春秋寓經世之大法所以上承将墜之緒下開無窮之治也故考諸前聖而無差謬參諸天地而無違悖驗諸鬼神之幽而無所疑待乎百世之逺而無所惑葢天地鬼神同此理前聖後聖同此心先儒之傳曰游夏不能贊一辭辭不待贊也言不能與於斯耳斯道也惟顔子甞聞之矣行夏之時乘殷之輅服周之冕樂則韶舞此其準的也聖人之辭本無待於贊助然游夏擅文學之科而不能贊一辭者以見其㣲權奥㫖非聖人不能與於此也顔子克己復禮以至三月不違其於道也庶幾矣故四代禮樂獨得與間其説夏時謂夏以斗柄初昏建寅之月為歳首得乎人時之正始事之宜者也輅古之木車也殷車曰大輅左傳曰大輅越席昭其儉也葢適於用而辨於等故不厭其質也冕祭冠也周禮有五冕其制始備葢尊首飾而嚴祀事故不厭其華也韶舞舜樂葢盡善盡美者也或問顔子甞聞春秋大法何也朱子曰不是孔子将春秋大法向顔子説葢三代制作大備矣不可復作告以四代禮樂只是集百王不易之大法其作春秋善者則取之惡者則誅之要亦明聖王之大法而已故伊川引以為據後世以史視春秋謂褒善貶惡而已至於經世之大法則不知也春秋大義數十其義雖大炳如日星乃易見也惟其㣲辭隠義時措從宜者為難知也或抑或縱或與或奪或進或退或㣲或顯而得乎義理之安文質之中寛猛之宜是非之公乃制事之權衡揆道之模範也春秋大義在尊君而卑臣貴仁義而賤功利正中國而外夷狄之類其義雖大炳如日星也其難見者葢在於㣲辭隠義各以其時措從宜者非深明乎時中者未易窺也或有功而抑或有罪而宥或功未就而予或罪未著而奪或尊而退之或卑而進之或婉其辭或章其實要皆得乎義理之安而各當其則文質之中而不華不俚寛猛之宜而無過與不及是非之公而無有作好作惡揆度也權衡者酌一時之輕重模範者立萬世之軌則朱子曰春秋大義如成宋亂宋災故之類乃是聖人直著誅貶自是分明如胡氏謂書晉侯為以常情待晉襄書秦人為以王事待秦繆之類却恐未必如此所謂㣲辭隠義時措從宜者為難知正為此也夫觀百物然後識化工之神聚衆材然後知作室之用於一事一義而欲窺聖人之用心非上智不能也故學春秋者必優游涵泳黙識心通然後能造其㣲也聖人精義入神泛應曲當未可以一端窺測故學春秋者必優游而不迫涵泳而有餘心悟自得庶㡬深造㣲奥後王知春秋之義則雖徳非禹湯尚可以法三代之治自秦而下其學不傳予悼夫聖人之志不明於後世也故作傳以明之俾後之人通其文而求其義得其意而法其用則三代可復也是傳也雖未能極聖人之蘊奥庶㡬學者得其門而入矣文集通其文而後能明其義得其意而後能法其用詩書載道之文春秋聖人之用詩書如藥方春秋如用藥治病聖人之用全在此書所謂不如載之行事深切著明者也道非無用用無非廹然詩書即道而推於用主道而言故曰載道之文春秋即用以明道主用而言故曰聖人之用詩書如藥方固可以治病春秋如因病用藥是非得失尤為深切著明者也有重疊言者如征伐盟㑹之類葢欲成書勢須如此不可事事各求異義但一字有異或上下文異則義須别遺書下同五經之有春秋猶法律之有㫁例也律令唯言其法至於㫁例則始見其法之用也律令者立法以應事㫁例者因事以用法學春秋亦善一句是一事是非便見於此此亦窮理之要然他經豈不可以窮理但他經論其義春秋因其行事是非較著故窮理為要較判别也春秋一句為一事故是非易決又考其事迹而是非易明故於窮理為要甞語學者且先讀論語孟子更讀一經然後看春秋先識得箇義理方可看春秋更讀一經如下文所論中庸春秋雖於窮理為要然又須義理通明然後能察人事得失之機識聖人裁制之權春秋以何為準無如中膺欲知中庸無如權須是時而為中若以手足腁胝閉戸不出二者之間取中便不是中若當手足腁胝則於此為中當閉戶不出則於此為中春秋之權衡即中庸之時中也若於禹顔之間取中則當洪水之時不躬乎胼胝之勞在陋巷之時不安乎簞瓢之樂皆失乎時中矣權之為言秤錘之義也何物為權義也時也只是説得到義義以上更難説在人自看如何義者所以處時措之宜所謂權也義以上則聖人之妙用未易以言盡也春秋傳為按經為㫁本註程子又云某年二十時看春秋黄偶問某如何看某答曰以傳考經之事迹以經别傳之真偽凡讀史不徒要記事迹須要識其治亂安危興廢存亡之理且如讀髙帝紀便須識得漢家四百年終始治亂當如何是亦學也觀髙祖寛大長者能用三傑則知漢所以得天下觀其入闗除秦苟法則知漢所以立四百年基業觀偽游雲夢則知諸侯王次第而叛觀繫蕭相國獄則知漢之大臣多不保終如此之類皆致知之方也先生每讀史到一半便掩卷思量料其成敗然後却看有不合處又更精思其間多有幸而成不幸而敗今人只見成者便以為是貶者便以為非不知成者煞有不是敗者煞有是底讀史須見聖賢所存治亂之機賢人君子出處進退便是格物機謂治忽動於㡬㣲者元祐中客有見伊川者几案間無他書惟印行唐鑑一部先生曰近方見此書三代以後無此議論外書范祖禹字淳夫按外書又云范淳夫甞與伊川論唐事及為唐鑑盡用先生之説先生謂門人曰淳夫乃能相信如此横渠先生曰序卦不可謂非聖人之蘊今欲安置一物猶求審處況聖人之於易其間雖無極至精義大槩皆有意思觀聖人之書須遍布細宻如是大匠豈以一斧可知哉横渠易説天官之職須襟懷洪大方看得葢其規模至大若不得此心欲事事上致曲窮究湊合此心如是之大必不能得也周建六官而天官冢宰統理邦國内外之政小大之事無所不總若非心量廣大何以包舉四海綜理百職今無此心量但欲毎事委曲窮究必不能周悉通貫之矣釋氏錙銖天地可謂至大然不甞為大則為事不得若畀之一錢則必亂矣釋氏論性極廣大然不可以理事其體用不相涉也如此又曰太宰之職難看葢無許大心胷包羅記得此復忘彼其混混天下之事當如捕龍蛇摶虎豹用心力看方可其他五官便易看止一職也語録下同古人能知詩者惟孟子為其以意逆志也夫詩人之志至平易不必為艱嶮求之今以艱嶮求詩則已喪其本心何由見詩人之志人情不相逺以己之意迎彼之志是為得之詩以感遇而發於人情之自然本為平易今以艱嶮之心求詩則已失吾心之自然矣而何以見詩人之心詩人之情性溫厚平易老成本平地上道著言語今須以﨑嶇求之先其心已狹隘了則無由見得詩人之情本樂易只為時事拂著他樂易之性故以詩道其志詩人之情性溫厚而無刻薄平易而無艱嶮老成而無輕躁若以崎嶇狹隘之心安能見詩人寛平廣大之意尚書難看葢難得胷臆如此之大只欲解義則無難也朱子曰他書却有次第尚書只合下便大如堯典克明峻徳以親九族至黎民於變時雍展開是大小大分命羲和定四時成嵗便是心中包一箇三百六十五度四分度之一底天方見得恁地若不得一箇大底心胷如何看得讀書少則無由考校得義精葢書以維持此心一時放下則一時徳性有懈讀書則此心常在不讀書則終看義理不見讀書不多則見義不精然讀書者又所以維持此心使無放逸也故讀書則心存心存則理得書須成誦精思多在夜中或静坐得之不記則思不起但通貫得大原後書亦易記朱子曰書須成誦少問不知不覺自然觸發曉得葢一段文義横在心下自是放不得必曉得而後已今人所以記不得思不去心下若存若亡皆不精不熟之故也又曰横渠作正䝉時或夜裏黙坐徹曉他直是恁地勇方做得所以觀書者釋己之疑明己之未達每見每知新益則學進矣於不疑處有疑方是進矣每見是書而每加新孟則學進矣然學固足以釋疑而學亦貴於有疑葢疑則能思思則能得於無疑而有疑則察理宻矣六經須循環理㑹義理儘無窮待自家長得一格則又見得别如中庸文字輩直須句句理㑹過使其言互相發明春秋之書在古無有乃仲尼所自作惟孟子能知之非理明義精殆未可學先儒未及此而治之故其説多鑿孟子論春秋皆發明聖人之大旨舉春秋之綱領後人未及於理明義精而揣摩臆決故其説多鑿近思錄卷三
