body:
  text: 近思錄卷五宋朱子吕祖謙同編葉采集解克治凡四十一條此卷論力行蓋窮理旣明涵養既厚及推於行已之間尤當盡其克治之力也濓溪先生曰君子乾乾不息於誠然必懲忿窒慾遷善改過而後至乾之用其善是損益之大莫是過聖人之旨深哉重乾相繼故九三曰君子終日乾乾言君子體乾健而又健至誠不息此用乾之善者也山澤為損激於忿象山之髙必懲創之溺於慾象澤之深必窒塞之此用損之大者也風雷為益遷善象風之烈則德日長改過象雷之迅則惡日消此用益之大者也朱子曰乾乾不息者體也去惡進善者用也無體則用無以行無用則體無所措故以三卦合而言之或曰其字亦是莫字吉凶悔吝生乎動噫吉一而已動可不愼乎通書動而得則吉失則凶悔則過失而自咎吝則私小而可羞四者一善而三惡動其可不謹乎濓溪先生曰孟子曰養心莫善於寡欲予謂養心不止於寡而存耳蓋寡焉以至於無無則誠立明通誠立賢也明通聖也遺文朱子曰誠立謂實體安固明通則實用流行立如三十而立之立通則不惑知命而鄉乎耳順矣或問孟子與周子之言果有以異乎曰孟子所謂欲者以耳目口鼻四肢之欲人所不能無然多而無節則為心害周子則指心之流於欲者是則不可有也所指有淺深之不同然由孟子之寡欲則可以盡周子之無欲矣伊川先生曰顔淵問克已復禮之目夫子曰非禮勿視非禮勿聽非禮勿言非禮勿動四者身之用也由乎中而應乎外制於外所以養其中也朱子曰由乎中而應乎外謂視聽言動乃此心之形見處制乎外所以養其中謂就視聽言動上克治也上二句言其理下二句是工夫顔淵請事斯語所以進於聖人後之學聖人者冝服膺而勿失也因箴以自警或問明知其不當視而自接乎目明知其不當聽而自接乎耳則將如何朱子曰視與見異聽與聞異非禮之色雖過乎目在我不可有視之之心非禮之聲雖過乎耳在我不可有聽之之心視箴曰心兮本虚應物無迹操之有要視為之則蔽交於前其中則遷制之於外以安其内克己復禮久而誠矣人心虚靈感應出入無迹可執操存之要莫先謹視則猶節也苟物欲之蔽交乎吾前惑於所見中必移矣惟能制之於外目不妄視則神識泰定内斯以安久而誠則實理流行動容周旋中禮矣聽箴曰人有秉彝本乎天性知誘物化遂亡其正卓彼先覺知止有定閑邪存誠非禮勿聽人稟五常之性本無不善惟知識誘於外而忘返物欲化其内而莫覺由是所稟之正日以喪矣誘者化之初化者誘之極也知止者知其所當止也有定者得其所當立也閑邪於外所以存誠於中也言箴曰人心之動因言以宣發禁躁妄内斯靜專矧是樞機興戎出好吉凶榮辱惟其所召傷易則誕傷煩則支已肆物忤出悖來違非法不道欽哉訓辭躁輕肆也妄虚謬也言語之發禁其輕肆則内靜定矣禁其虚謬則内專一矣樞扉臼也機弩牙也戶之闔闢射之中否皆由之發言乃吾身之樞機故一言之惡或至於興師一言之善或可以合好得則有吉有榮失則有凶有辱躁而傷於易則誕肆而不審妄而傷於煩則支離而逺實肆縱情也肆已者必忤物躁之致也悖乖理也悖而出者必悖而反妄之致也動箴曰哲人知幾誠之於思志士厲行守之於為順理則裕從欲惟危造次克念戰兢自持習與性成聖賢同歸文集朱子曰思是動之微為是動之著思是動於内為是動於外明哲之人知其幾㣲故於所思而誠之一念之動不敢妄也立志之士勉勵其行故於所為而守之一事之動不敢忽也順理而動則安裕從欲而動則危殆守於為也造次俄頃而克念不忘戰兢恐懼而自持不失誠於思也習謂修於已性謂得於天習與性合則全其本然之善而與聖賢一矣復之初九曰不逺復無祗悔元吉伊川易傳曰陽君子之道故復為反善之義初復之最先者也是不逺而復也陽往為剝陽來為復復卦乃善之返初爻乃復之先過而先復是不逺而復也失而後有復不失則何復之有唯失之不逺而復則不至於悔大善而吉也人必有所失而後有所復旣有失則不能無悔惟未逺而復故不至於悔乃元吉也顔子無形顯之過夫子謂其庶幾乃無祗悔也過旣未形而改何悔之有有過而知之敏改之速不待其形顯故無悔也旣未能不勉而中所欲不踰矩是有過也然其明而剛故一有不善未嘗不知旣知未嘗不遽改故不至於悔乃不逺復也學問之道無他也惟其知不善則速改以從善而已易傳下同不待勉强而中乎道從心所欲而不過乎則是聖人之事無過之可改者也顔子未能及是故未免於有過然其明也故過而必知其剛也故知而即改晉之上九晉其角維用伐邑厲吉无咎貞吝伊川易傳曰人之自治剛極則守道愈固進極則遷善愈速如上九者以之自治則雖傷於厲而吉且无咎也嚴厲非安和之道而於自治則有功也以陽居上剛之極也在晉之終進之極也剛進之極動則為過惟可用之以自伐其邑伐邑内自治也以是自治則守道固而遷善速雖過於嚴厲吉且无咎雖自治有功然非中和之德故於貞正之道為可吝也剛進之極有乖中和終為疵吝損者損過而就中損浮末而就本實也天下之害無不由末之勝也峻宇雕牆本於宫室酒池肉林本於飲食淫酷殘忍本於刑罰窮兵黷武本於征討凡人欲之過者皆本於奉養其流之逺則為害矣先王制其本者天理也後人流於末者人欲也損之義損人欲以復天理而已損卦彖傳天下之事其本皆出於天理民生日用之常治道之不可廢者其末流則末勝本華勝實人欲勝天理其害有不勝言者矣故損之為用亦惟損過以就中損浮末而就本實損人欲以復天理耳夬九五曰莧陸夬夬中行无咎象曰中行无咎中未光也傳曰夫人心正意誠乃能極中正之道而充實光輝若心有所比以義之不可而決之雖行於外不失其中正之義可以无咎然於中道未得為光大也蓋人心一有所欲則離道矣夫子於此示人之意深矣九五與上六比心有所昵未必能正特以義不可而勉勉決去之意亦未必誠也但九五中正故所行猶不失中正之義僅可无咎然心有所比不能無欲其於中正之道未得為光大聖人發此示人欲使人正心誠意無一毫繫累乃能盡中正之道充實而有光輝也方說而止節之義也節卦彖傳兌上坎下為節兌說也坎險也見險則止矣人惟說則易流方說而能止是節之義也節之九二不正之節也以剛中正為節如懲忿窒慾損過抑有餘是也不正之節如嗇節於用懦節於行是也九二以剛居柔在節卦是為不正之節也懲忿窒慾損過抑有餘者節其過以就中此剛中正之節也節於用而為吝嗇則於用有不足節於行而為柔懦則於行有不足此不正之節九二是也人而無克伐怨欲惟仁者能之有之而能制其情不行焉斯亦難能也謂之仁則未可也此原憲之問夫子答以知其為難而不知其為仁此聖人開示之深也經說克忮害伐驕矜怨忿恨欲貪慾四者皆生於人心之私也天理流行自無四者之累則仁矣四者有於中而能力制於外則亦可謂之難能然慾之根未除故未可謂之仁朱子曰克己為仁者從根源上便斬截了更不復萌不行者但禁制其末不行於外耳若其本則著於心而未能去也明道先生曰義理與客氣常相勝只看消長分數多少為君子小人之别義理所得漸多則自然知得客氣消散得漸少消盡者是大賢遺書下同義理者性命之本然客氣者形氣之使然或謂人莫不知和柔寛緩然臨事則反至於暴厲明道曰只是志不勝氣氣反動其心也學以立志為本而後氣質可變化人不能祛思慮只是吝吝故無浩然之氣吝則為私意小智所纒繞而無浩然正大之氣治怒為難治懼亦難克己可以治怒明理可以治懼怒氣盛則不能自遏懼氣怯則不能自立故治之皆難然己私既克則一朝之忿有所不作矣物理既明則非理之懼有所不動矣堯夫解他山之石可以攻玉玉者溫潤之物若將兩塊玉來相磨必磨不成須是得箇麤礪底物方磨得出譬如君子與小人處為小人侵陵則修省畏避動心忍性増益豫防如此便道理出來邵康節先生名雍字堯夫解詩小雅鶴鳴篇君子與小人處為小人所侵陵則修省其身者必謹畏避小人者必嚴動心而不敢苟安忍性而不敢輕發增益其所不能豫防其所未至如此則德日進而理日明矣目畏尖物此事不得放過便與克下室中率置尖物須以理勝他尖必不刺人也何畏之有人有目畏尖物者明道敎以室中率置尖物習見旣熟則不復畏之矣克己之功類當如此明道先生曰責上責下而中自恕己豈可任職分專務責人而不知責己是捨己職分而憂人之憂者也舍己從人最為難事己者我之所有雖痛舍之猶懼守己者固而從人者輕也朱子曰此程子為學者言若聖人分上則不如此也九德最好臯陶曰亦行有九德寛而栗柔而立愿而恭亂而敬擾而毅直而溫簡而亷剛而塞强而義寛𢎞而莊栗則寛不至於弛和柔而卓立則柔不至於懦愿而恭則朴愿而不専尚乎質亂治也亂而敬則整治而不徒事乎文蓋恭著於外敬守於中也馴擾而毅則擾不至於隨勁直而温則直不至於訐簡大者或規矩之不立今有亷隅則簡不至於疎剛者或傷於果斷今塞實而篤厚則剛不至於虐强力者或徇血氣之勇今有勇而義則强不至於暴蓋游氣紛擾萬有不齊其生人也有氣稟之拘自非聖人至清至厚至中至正渾然天理無所偏雜蓋自中人以下未有不滯於一偏者惟能就其氣質之偏窮理克己矯揉以歸於正則偏者可全矣是知學問之道在理虞之際其論德已如是之密矣飢食渴飲冬裘夏葛若致些私吝心在便是廢天職食飲衣服各有當然之則是天賦之職分也有一毫私己貪吝之意即是廢天職獵自謂今無此好周茂叔曰何言之易也但此心潛隱未發一日萌動復如前矣後十二年因見果知未也本註云明道年十六七時好田獵十二年暮歸在田野間見田獵者不覺有喜心周子用功之深故知不可易言程子治心之密故能隨寓加察在學者警省克治之力尤不可以不勉也伊川先生曰大抵人有身便有自私之理宜其與道難一人有耳目鼻口四肢自然有私己之欲惟能克己然後合天理之公罪己責躬不可無然亦不當長留在心胷為悔有過自責乃羞惡之心然已徃之失長留愧怍應酬之間反為繫累所欲不必沉溺只有所向便是欲一念外馳所向旣差即是欲也明道先生曰子路亦百世之師本註云人告之以有過則喜聞過而喜則好善也誠改過也速子路以兼人之勇而用之於遷善改過其進德也庸可既乎是足為百世師矣人語言緊急莫是氣不定否曰此亦當習習到言語自然緩時便是氣質變也學至氣質變方是有功問不遷怒不貳過何也語錄有怒甲不遷乙之說是否伊川曰是曰若此則甚易何待顔子而後能曰只被說得麤了諸君便道易此莫是最難須是理㑹得因何不遷怒怒甲而不遷其怒於乙槩而觀之則稟性和平者若皆可能然以身驗其實而求其所以不遷怒之由則非此心至虚至明喜怒各因乎物舉無一毫之私意者殆未易勉强而能也朱子曰顔子見得道理透故怒於甲者雖欲遷於乙亦不可得遷也如舜之誅四凶怒在四凶舜何與焉蓋因是人有可怒之事而怒之聖人之心本無怒也譬如明鏡好物來時便見是好惡物來時便見是惡鏡何嘗有好惡也聖人之心因事當怒者而怒之是怒因物而生不自我而作也又豈有之於己耶譬明鏡照物妍媸在物鏡未嘗自有妍媸也世之人固有怒於室而色於市且如怒一人對那人說話能無怒色否有能怒一人而不怒别人者能忍得如此已是煞知義理者若聖人因物而未嘗有怒此莫是甚難怒氣易發而難制世固有怒於其室而作色於市人者其遷怒也甚矣有能自禁持怒此人而不以餘怒加辭色於他人者已不易得況乎物各付物而喜怒不有於我者豈非甚難者耶君子役物小人役於物今見可喜可怒之事自家著一分陪奉他此亦勞矣聖人之心如止水役物者我常定役於物者逐物而往聖人之心常湛然如止水無有一毫作好作惡人之視最先非禮而視則所謂開目便錯了次聽次言次動有先後之序人能克己則心廣體胖仰不愧俯不怍其樂可知有息則餒矣外書下同朱子曰此數語極有味又曰當初亦知是好語謾錄於此今看來直是恁地好身心無私欲之累自然安舒俯仰無所愧怍自然快樂少有間斷則自視欿然矣聖人責己感也處多責人應也處少聖人所謂厚於責己而薄於責人者非若後世欲為長厚之意蓋有感而後有應責人之應而不自反其感之之道則是薄於本而厚望於末無是理也謝子與伊川别一年往見之伊川曰相别一年做得甚工夫謝曰也只去箇矜字曰何故曰子細檢㸃得來病痛盡在這裏若按伏得這箇罪過方有向進處伊川點頭因語在坐同志者曰此人為學切問近思者也按胡文定公問上蔡矜字罪過何故恁地大謝曰今人做事只管要夸耀别人耳目渾不闗自家受用事有底人食前方丈便向人前喫只蔬食菜羹却去房裏喫為甚恁地愚謂充謝子為己之學則一切外物皆不足以動其心矣思叔詬詈僕夫伊川曰何不動心忍性思叔慙謝說見孟子朱子曰動心忍性謂悚動其心堅忍其性然所謂性者亦指氣稟而言耳見賢便思齊有為者亦若是見不賢而内自省蓋莫不在已說見論語見人有善即思自勉則誰不可及見人不善惟當自省亦無非反己之地横渠先生曰湛一氣之本攻取氣之欲口腹於飲食鼻舌於臭味皆攻取之性也知德者屬厭而已不以嗜慾累其心不以小害大末喪本焉耳正䝉下同湛而不動一而不雜者氣之本體也飲食臭味之嗜而營求攻取於外者氣之動於欲者也攻取之性即氣質之性屬足也屬厭猶飫足也君子知德之本故凡飲食臭味才取足而已不以嗜好之末而累此心之本也孟子所謂不以口腹累心毋以小害大賤害貴是也纖惡必除善斯成性矣察惡未盡雖善必麤矣成性者全其本然之天惡不仁故不善未嘗不知徒好仁而不惡不仁則習不察行不著人能惡不仁則其察已也精有不善必知之矣苟徒知仁之可好而不知不仁之可惡則所習者或未之察所行者或未之明雖有好仁之心而卒陷於不仁而莫之覺矣是故徒善未必盡義徒是未必盡仁好仁而惡不仁然後盡仁義之道徒好仁而不惡不仁則雖有向善之意而無斷制之明故曰未必盡義徒惡不仁而不好仁則雖有去非之意而無樂善之誠故曰未必盡仁責己者當知無天下國家皆非之理故學至於不尤人學之至也處世有乖違豈在人者皆非在我者皆是以此存心則惟務盡已不必咎人也有潛心於道忽忽為他慮引去者此氣也舊習纒繞未能脫灑畢竟無益但樂於舊習耳舊習未除志不勝氣則心慮紛雜古人欲得朋友與琴瑟簡編常使心在於此惟聖人知朋友之取益為多故樂朋友之來横渠論語說朋友有講習責善之義琴瑟有調適性情之用簡編有前言往行之識朝夕於是則心有所養而習俗放僻之念不作矣然三者之中朋友之益尤多故有朋自遠方來所以樂也矯輕警惰語錄下同輕則浮躁惰則弛慢二者為學之大患然輕者必惰雖二病而實相因其進銳者其退速輕與惰之謂也仁之難成乆矣人人失其所好蓋人人有利欲之心與學正相背馳故學者要寡慾仁者天理之公利欲者人心之私故背馳君子不必避他人之言以為太柔太弱至於瞻視亦有節視有上下視高則氣髙視下則心柔故視國君者不離紳帶之中學者先須去其客氣其為人剛行音項終不肯進堂堂乎張也難與並為仁矣學者當去輕傲之氣存恭謹之心剛行麤暴也其為人麤暴必不肯遜志務學而亦終不能深造於道子張氣貌高亢而無收斂誠實之意故曽子以為難與並為仁蓋目者人之所常用且心常託之視之上下且試之已之敬傲必見於視所以欲下其視者欲柔其心也柔其心則聽言敬且信心之神寓於目故目視高下而心之敬傲可見心柔者聴人之言必敬且信而不敢怠慢矣人之有朋友不為燕安所以輔佐其仁今之朋友擇其善柔以相與拍肩執袂以為氣合一言不合怒氣相加朋友之際欲其相下不倦故於朋友之間主其敬者日相親與得效最速始則氣輕而苟於求合終則負氣而不肯相下若是者其果有益於己乎故朋友之間以謙恭為主則其相親之意無厭相觀之效尤速仲尼嘗曰吾見其居於位也與先生並行也非求益者欲速成者則學者先須溫柔溫柔則可以進學闕里童子居則當位行則與先生並蓋輕傲而不循禮故夫子以為非能求益者但欲速於成人而已故學者當以和順為先則謙虚恭謹有以為進學之地詩曰溫溫恭人維德之基蓋其所益之多詩大雅抑篇溫和恭敬為德之本世學不講男女從幼便驕惰壞了到長益凶很只為未嘗為子弟之事則於其親己有物我不肯屈下病根常在又隨所居而長至死只依舊為子弟則不能安灑掃應對在朋友則不能下朋友有官長則不能下官長為宰相則不能下天下之賢甚則至於徇私意義理都喪也只為病根不去隨所居所接而長人須一事事消了病則義理常勝後世小學既廢父母愛踰於禮恣之驕惰而莫為禁止病根既立隨寓隨長卒至盡失其良心蓋有自來學者所當察其病源力加克治則舊習日消而道心日長矣近思錄卷五
