body:
  text: 近思錄卷七宋朱子吕祖謙同編葉采集解出處凡三十九條此卷論出處之道蓋身旣修家旣齊則可以仕矣然去就取舍惟義之從所當審處也伊川先生曰賢者在下豈可自進以求於君苟自求之必無能信用之理古之人所以必待人君致敬盡禮而後徃者非欲自為尊大蓋其尊德樂道之心不如是不足與有為也易傳下同䝉卦彖傳賢者之進將以行其道也自非人君有好賢之誠心則諫不行言不聽豈足以有為哉君子之需時也安靜自守志雖有須而恬然若將終身焉乃能用常也雖不進而志動者不能安其常也需卦初九象傳靜退以待時而終至於失常者蓋其身雖退而志則動也比吉原筮元永貞无咎伊川易傳曰人相親比必有其道苟非其道則有悔咎故必推原占決其可比者而比之所比得元永貞則无咎元謂有君長之道永謂可以常乆貞謂得正道上之比下必有此三者下之從上必求此三者則无咎也羣然相比而不得所主苟焉為比而非可久邪媚求比而不由正皆不能无咎者也履之初九曰素履往无咎伊川易傳曰夫人不能自安於貧賤之素則其進也乃貪躁而動求去乎貧賤耳非欲有為也旣得其進驕溢必矣故往則有咎小人志在富貴故得志則驕溢賢者則安履其素其處也樂其進也將有為也故得其進則有為而無不善賢者素其位而行窮而在下初無貧賤之憂逹而在上將遂行道之志以是而進何咎之有若欲貴之心與行道之心交戰於中豈能安履其素乎欲貴之心勝則必不能安行乎素位而亦卒無可行之道矣大人於否之時守其正節不雜亂於小人之羣類身雖否而道之亨也故曰大人否亨不以道而身亨乃道否也否卦六二傳身之否亨由乎時道之否亨由乎我大人者身有否而道無否也蓋否之時小人羣集君子不入其黨身則否矣然直道而行無所撓屈道則亨也人之所隨得正則逺邪從非則失是無兩從之理隨之六二苟係初則失五矣故象曰弗兼與也所以戒人從正當專一也隨六二與九五為正應然下比初九苟隨私昵必失正應君子所貴世俗所羞世俗所貴君子所賤故曰賁其趾舍車而徒君子所貴者行義也世俗所貴者勢位也賁之初九所賁在下故為趾為徒行世俗以失勢位為羞君子以得行義為榮蠱之上九曰不事王侯髙尚其事象曰不事王侯志可則也伊川易傳曰士之自高尚亦非一道有懷抱道德不偶於時而高潔自守者伊尹耕於莘野太公釣於渭濱之時是也有知止足之道退而自保者張良疏廣之類是也有量能度分安於不求知者徐孺子申屠蟠之類是也有清介自守不屑天下之事獨潔其身者嚴陵周黨之類是也所處雖有得失小大之殊皆自高尚其事者也象所謂志可則者進退合道者也四者雖處心有大小處義有得失要皆能高尚其事者若蠱上九陽剛之才超然斯世之表象謂其志可則者蓋指懷抱道德進退合義者言也遯者陰之始長君子知微故當深戒而聖人之意未便遽己也故有與時行小利貞之敎艮上乾下為遯二隂初長固所當戒然乾剛在上九五六二中正而應君子於此猶可與時消息不一於遯雖未能大正尚幸其小有可正也聖賢之於天下雖知道之將廢豈肯坐視其亂而不救必區區致力於未極之間强此之衰難彼之進圖其暫安苟得為之孔孟之所屑為也王允謝安之於漢晉是也强此之衰扶君子之道未盡消難彼之進抑小人之道未驟長明夷初九事未顯而處甚艱非見㡬之明不能也如是則世俗孰不疑怪然君子不以世俗之見怪而遲疑其行也若俟衆人盡識則傷己及而不能去矣離下坤上明夷離明坤地也明入地中傷明也初九傷猶未顯而爻之象曰君子于行三日不食蓋知㡬而去之速處人之所難而不疑也楚王戊不設醴酒而穆生去之曰不去楚人將鉗我於市當時雖申公之賢猶以為過其後申公受胥靡之辱至是欲去而不得矣晉之初六在下而始進豈遽能深見信於上苟上未見信則當安中自守雍容寛裕無急於求上之信也苟欲信之心切非汲汲以失其守則悻悻以傷於義矣故曰晉如摧如貞吉罔孚裕无咎在下則勢疎始進則交淺上未見信惟當安於守正寛以待人豈可求其信也求信之急則必汲汲以失其貞正之守求信愈急人愈不信則必悻悻以傷其事上之義晉之初六未敢必於進也進而復退得正則吉未敢必人之信也寛裕以待之則无咎矣然聖人又恐後之人不達寛裕之義居位者廢職失守以為裕故特云初六裕則无咎者始進未受命當職任故也若有官守不信於上而失其職一日不可居也卦之初為無位晉之始未當職任故寛裕以待其自信可也苟有官守不見信於上必將廢職失守急去可也豈容寛裕以處之哉然事非一槩久速唯時亦容有為之兆者兆幾微之見君子知幾則可久可速不失其時矣不正而合未有久而不離者也合以正道自無終睽之理故賢者順理而安行智者知幾而固守睽卦六三傳賢者順是理之當然安而行之智者知其幾之必然固而守之皆謂必以正道而後合者君子當困窮之時既盡其防慮之道而不得免則命也當推致其命以遂其志知命之當然也則窮塞禍患不以動其心行吾義而已困卦象曰君子以致命遂志推致其命知其當然而不可免則無所撓懼而能遂其為義之志矣蓋命者出乎氣數而不可易義者在我裁制而不可違彼已定之禍福雖憂懼而何益行吾義而已苟不知命則恐懼於險難隕穫於窮戹所守亡矣安能遂其為善之志乎隕穫猶顚隮也寒士之妻弱國之臣各安其正而已苟擇勢而從則惡之大者不容於世矣困卦九四傳井之九三渫治而不見食乃人有才智而不見用以不得行為憂惻也蓋剛而不中故切於施為異乎用之則行舍之則藏者矣九三陽剛而處下卦之上在井則已渫治而可食矣然而無得於五故不見食爻位剛而不中切於施為故憂惻異乎聖賢視用舍為行藏㤗然不以累其心者矣革之六二中正則無偏蔽文明則盡事理應上則得權勢體順則無違悖時可矣位得矣才足矣處革之至善者也必待上下之信故已日乃革之也六二居中得正下卦為離故曰文明二與五應故曰應上爻位皆柔故曰體順時當變革則時可矣居中應上則位得矣文明體順則才足矣是處革之至善者然必待上下盡信而後革故辭曰已日乃革之謹之至也如二之才德當進行其道則吉而无咎也不進則失可為之時為有咎也革固不可遽然當其時處其位有其才豈容自己故辭曰征吉无咎鼎之有實乃人之有才業也當愼所趨向不愼所往則亦陷於非義故曰鼎有實愼所之也抱負才業急於有為每不暇謹持所向則反為才業累矣如苟彧之類是也士之處高位則有拯而無隨在下位則有當拯有當隨有拯之不得而後隨艮卦六二傳在上位者當以正君定國為己任故有拯而無隨在下位者職守所在是當拯也職所不及是當隨也又有拯之不得而後隨者如孔子嘗從大夫之列故請討陳恒然不在其位則亦隨之而已君子思不出其位位者所處之分也萬事各有其所得其所則止而安若當行而止當速而久或過或不及皆出其位也況踰分非據乎艮卦象傳位者所處當然之分也處之不踰其分是不出其位也所謂止者當其分而已苟當行而止當速而久或過或不及皆為出位而非得其止者也況踰越常分據非所據者又出位之尤者也人之止難於久終故節或移於晩守或失於終事或廢於久人之所同患也艮之上九敦厚於終止道之至善也故曰敦艮吉人之止易於暫而難於久易於始而難於終艮之上九止之終也止道愈厚是以吉也中孚之初九曰虞吉象曰志未變也伊川易傳曰當信之始志未有所從而虞度所信則得其正是以吉也志有所從則是變動虞之不得其正矣處卦之初未有所從則中無私繫虞度所信得其正矣苟志有所繫則好惡成於中是非變於外所度者牽於私意安能得其正哉賢者惟知義而已命在其中中人以下乃以命處義命者窮達夭夀出於氣質有必然之數義者是非可否夲乎天理有當然之宜賢者惟知義之當然命固在其中矣中人以下於義未能眞知而安行然知命之已定則亦不敢越義以妄求故曰以命處義如言求之有道得之有命是求無益於得知命之不可求故自處以不求孟子所謂求之有道謂不可以苟求也得之有命謂不可以倖得也是求無益於得者謂得非可以求而遂也此言要亦為中人以下者設爾若賢者則求之以道得之以義不必言命遺書下同求之必以道不枉道以求之也得之必以義不非義而受之也所求所得惟道與義而已命何足道哉愚謂命雖定於事物之先實顯於事物之後義雖因事物而有實著於應酬之時如去就辭受之間要決於義也而後命從之以顯苟應事之時欲以命決之其可乎故君子求之道義而已命不必言也人之於患難只有一箇處置盡人謀之後却須泰然處之有人遇一事則心心念念不肯捨畢竟何益若不㑹處置了放下便是無義無命也人遇患難但當審所以處之之道所謂義也若夫處置之後在已無闕則亦安之而已成敗利鈍亦無如之何所謂命也或遇事而不能處是無義也或處置了而不能放下是無命也門人有居太學而欲歸應鄉舉者問其故曰蔡人尠習戴記決科之利也先生曰汝之是心已不可入於堯舜之道矣尠甚少也得失有命妄起計度之私是利心也故不可入堯舜之道夫子貢之高識曷嘗規規於貨利哉特於豐約之間不能無留情耳且貧富有命彼乃留情於其間多見其不信道也故聖人謂之不受命有志於道者要當去此心而後可與語也謂不能安受乎天命而有心於貧富也人苟有朝聞道夕死可矣之志則不肯一日安於所不安也何止一日須臾不能如曾子易簀須要如此乃安朱子曰道者事物當然之理苟得聞之則生順死安無復遺恨矣人不能若此者只為不見實理實理者實見得是實見得非朱子曰實理與實見不同恐記錄漏字愚謂本以人心見處而言唯實見是非之理然後為實理蓋理無不實但見有未實耳凡實理得之於心自别若耳聞口道者心實不見若見得必不肯安於所不安人之一身儘有所不肯為及至他事又不然若士者雖殺之使為穿窬必不為其他事未必然至如執卷者莫不知說禮義又如王公大人皆能言軒冕外物及其臨利害則不知就義理却就富貴如此者只是說得不實見及其蹈水火則人皆避之是實見得須是有見不善如探湯之心則自然别昔曽經傷於虎者他人語虎則雖三尺之童皆知虎之可畏終不似曽經傷者神色懾懼至誠畏之是實見得也此一節反覆推明實見之理最為親切學者要亦察理之明立志之剛知行並進豁然有悟然後所見為實見充其所見死生利害皆不足以移之矣得之於心是謂有德不待勉强然學者則須勉强古人有捐軀隕命者若不實見得則烏能如此須是實見得生不重於義生不安於死也故有殺身成仁只是成就一箇是而已心有實見而後謂之有徳此則不待勉强學者實見有所未盡則亦勉而行之可也孟子辨舜跖之分只在義利之間言間者謂相去不甚逺所争毫末耳義與利只是箇公與私也纔出義便以利言也只那計較便是為有利害若無利害何用計較利害者天下之常情也人皆知趨利而避害聖人則更不論利害惟看義當為不當為便是命在其中也張南軒曰無所為而為之者義也有所為而為之者利也愚謂義之與利始於毫釐之差實則霄壤之判有心於計較利害者即是人欲之私有所為而為者也不論利害惟義所在者卽是天理之公無所為而為者也聖人惟義之從固不論利害況義如是則命亦當如是又何趨避之有大凡儒者未敢望深造於道且只得所存正分别善惡識廉恥如此等人多亦須漸好趙景平問伊川曰子罕言利所謂利者何利曰不獨財利之利凡有利心便不可如作一事須尋自家穩便處皆利心也聖人以義為利義安處便為利聖人處義不計其利然事當乎義處之而安乃所以為利也如釋氏之學皆本於利故便不是釋氏惡死則欲無生惡物欲亂心則滅絶人倫推其本心惟欲利已而已是賊義之大者問郉恕久從先生想都無知識後來極狼狽先生曰謂之全無知則不可只是義理不能勝其利欲之心便至如此郉恕事見國史及語錄謝湜自蜀之京師過洛而見程子子曰爾將何之曰將試敎官子不答湜曰何如子曰吾嘗買婢欲試之其母怒而弗許曰吾女非可試者也今爾求為人師而試之必為此媼笑也湜遂不行先生在講筵不曽請俸諸公遂牒戶部問不支俸錢戶部索前任厯子先生云某起自草萊無前任厯子先生元祐初以大臣薦除校書郎三辭不聽除崇政殿說書未幾除侍講本注云舊例初入京官時用下狀出給料錢厯先生不請其意謂朝廷起我便當廩人繼粟庖人繼肉也遂令戶部自為出券厯又不為妻求封范純甫問其故先生曰某當時起自草莱三辭然後受命豈有今日乃為妻求封之理問今人陳乞恩例義當然否人皆以為本分不為害先生曰只為而今士大夫道得箇乞字慣却動不動又是乞也因問陳乞封父祖如何先生曰此事體又别再三請益但云其說甚長待别時說封親與封妻事體不同顯榮其親亦人子之至情謂之不當求則不可謂之當求則先生特召與常人異故難為言也或云若是應舉得官便只當以常調自處雖陳乞封䕃可也朱子曰此自今常人言之如此可也然朝廷士却不當如此伊川所以難言之也但云其說甚長其意謂要當從科舉法都變了乃為正耳漢策賢良猶是人舉之如公孫𢎞者猶强起之乃就對武帝初卽位招賢良文學之士是時公孫𢎞以賢良徴為博士使匈奴還報不合意乃移病免歸元光五年復徴賢良文學菑川國復推上𢎞𢎞謝曰前已嘗西用不能罷願更選國人固推𢎞至如後世賢良乃自求舉爾若果有曰我心只望廷對欲直言天下事則亦可尚已若志在富貴則得志便驕縱失志則便放曠與悲愁而已伊川先生曰人多說某不敎人習舉業某何嘗不敎人習舉業也人若不習舉業而望及第却是責天理而不修人事但舉業既可以及第即己若更去上面盡力求必得之道是惑也問家貧親老應舉求仕不免有得失之累何修可以免此伊川先生曰此只是志不勝氣若志勝自無此累家貧親老須用祿仕然得之不得為有命曰在己固可為親奈何曰為己為親也只是一事若不得其如命何孔子曰不知命無以為君子人苟不知命見患難必避遇得喪必動見利必趨其何以為君子或謂科舉事業奪人之功是不然且一月之中十日為舉業餘日足可為學然人不志於此必志於彼故科舉之事不患妨功惟患奪志外書奪志則根本廢矣故妨功之患小奪志之患大朱子曰科舉亦不害為學但今人把心不定所以為害才以得失為心理㑹文字意思都别了又曰科舉特一事耳自家工夫到後那邊自輕横渠先生曰世祿之榮王者所以錄有功尊有德愛之厚之示恩遇之不窮也為人後者所宜樂職勸功以服勤事任長廉逺利以似述世風而近代公卿子孫方且下比布衣工聲病售有司不知求仕非義而反羞循理為無能不知蔭襲為榮而反以虚名為善繼誠何心哉文集聲病詩律有四聲八病今進士詩賦之學是也求仕非義謂投牒覓舉之類循理謂服勤事任似述世風者也不資其力而利其有則能忘人之勢孟子說人之歆動乎勢位者皆有待於彼也惟不藉其力而利其所有則己自重而彼自輕人多言安於貧賤其實只是計窮力屈才短不能營畫耳若稍動得恐未肯安之須是誠知義理之樂於利欲也乃能語錄下同朱子曰人須是讀書洞見此理知得不求富貴只是本分求著便是罪過不惟不可有求之之迹亦不可有求之之心愚謂眞知義理之可樂然後富貴不足動其心天下事大患只是畏人非笑不養車馬食麤衣惡居貧賤皆恐人非笑不知當生則生當死則死今日萬鍾明日棄之今日富貴明日飢餓亦不恤惟義所在義之所在則死生去就有所不顧况夫懷齷齟之見畏人非笑而恥居貧賤豈有大丈夫之氣哉近思録卷七
