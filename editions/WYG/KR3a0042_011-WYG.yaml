body:
  text: 近思録卷十一宋朱子吕祖謙同編葉采集解教學凡二十二條此卷論教人之道葢君子進則推斯道以覺天下退則明斯道以淑其徒所謂得英才而教育之即新民之事也濂溪先生曰剛善為義為直為斷為嚴毅為幹固惡為猛為隘為強梁柔善為慈為順為㢲惡為懦弱為無㫁為邪佞朱子曰氣禀剛柔固隂陽之大分而其中又各有善惡之分焉惡者固為非正而善者亦未必皆得乎中也惟中也者和也中節也天下之達道也聖人之事也朱子曰此以得性之正而言也然其以和為中與中庸不合葢就已發無過不及者而言之如書所謂允執厥中者也故聖人立教俾人自易其惡自至其中而止矣通書朱子曰易其惡則剛柔皆善有嚴毅慈順之徳而無強梁懦弱之病矣至其中則其或為嚴毅或為慈順也又皆中節而無太過不及之偏矣伊川先生曰古人生子能食能言而教之古者子生能食則教之以右手能言則教之唯諾大學之法以豫為先人之幼也知思未有所主便當以格言至論日陳於前雖未曉知且當薰聒使盈耳充腹久自安習若固有之雖以他言惑之不能入也學記曰禁於未發之謂豫此所謂少成若天性習慣如自然者也若為之不豫及乎稍長私意偏好生於内衆口辯言鑠於外欲其純完不可得也文集為教之不早及其稍長内為物欲所䧟溺外流俗所銷靡欲其心徳之無偏駁難矣觀之上九曰觀其生君子无咎象曰觀其生志未平也伊川易傳曰君子雖不在位然以人觀其徳用為儀法故當自慎省觀其所生常不失於君子則人不失所望而化之矣上為無位之地故曰不在位然當觀之時高而在上固衆人所觀瞻而用為法則者要當謹畏反觀内省己之所為常不違乎君子之道而後人心慰滿得所矜式也不可以不在於位故安然放意無所事也易傳釋志未平也言高尚之士亦不可以輕意肆志也聖人之道如天然與衆人之識甚殊邈也門人弟子既親炙而後益知其高逺既若不可及則趨望之心怠矣故聖人之教常俯而就之聖人教人循循善誘常俯而就之葢亦因其資以設教不使之徒見高逺而自沮也事上臨喪不敢不勉君子之常行不困於酒尤其近也而以己處之者不獨使夫資之下者勉思企及而才之髙者亦不敢易乎近矣經說說見論語道固不外日用常行之間在聖人無事乎思勉耳夫子設教固常人之所可勉而賢者之所不可忽也明道先生曰憂子弟之輕俊者只教以經學念書不得令作文字志輕才俊者憚於檢束而樂於馳逞使之習經念書則心平氣定使作文字則得以用其才而長其輕俊矣子弟凡百玩好皆奪志至於書札於儒者事最近然一向好著亦自喪志如王虞顔栁輩誠為好人則有之曾見有善書者知道否平生精力一用於此非惟徒廢時日於道便有妨處足知喪志也遺書下同之王右軍羲虞永興世南顔魯公真卿栁河東公權皆工書札亦各有風節表見當世然終不足以知道葢専工一藝豈特徒廢時日妨於學問而志局於此已失其操存之本矣胡安定在湖州置治道齋學者有欲明治道者講之於中如治民治兵水利算數之類嘗言劉彛善治水利後累為政皆興水利有功治民如政教施設之方治兵如戰陣部伍之法水利如江河渠堰之利算數如律厯九章之𩔖凡立言欲涵蓄意思不使知徳者厭無徳者惑知徳者玩其意而不厭無徳者守其說而不惑朱子曰近看尹先生論語說句句有意味不可以為常談而忽之也教人未見意趣必不樂學欲且教之歌舞如古詩三百篇皆古人作之如闗雎之類正家之始故用之鄉人用之邦國日使人聞之此等詩其言簡奥今人未易曉欲别作詩略言教童子灑掃應對事長之節令朝夕歌之似當有助子厚以禮教學者最善使學者先有所據守禮以恭敬辭遜為本而有節文度數之詳學者從事乎此則日用言動之間皆有依據持守之地語學者以所見未到之理不惟所聞不深徹反將理低看了學者所見未到而驟以語之則彼不惟無深造自得之功而亦且輕視之矣舞射便見人誠古之教人莫非使之成已舞者所以導其和射者所以正其志要必以誠心為之誠者所以成己也自灑掃應對上便可到聖人事灑掃應對即是教之以誠誠之至即是聖人事自幼子常視母誑以上便是教人以聖人事說見曲禮視同示誑欺妄也小未有知常示以正事此聖人无妄之道先傳後倦君子教人有序先傳以小者近者而後教以大者逺者非是先傳以近小而後不教以逺大也子游譏子夏之門人於灑掃應對進退末事則可矣於道之本原則無如之何子夏聞而非之曰君子之道孰先傳焉孰後倦焉葢君子教人先後有序不容躐等而驟進非謂傳以近小者於先而不教以逺大者於後也朱子曰灑掃應對精義入神事有大小禮無大小事有大小故其教有序而不可躐理無大小故隨其所處而皆不可不盡愚謂子夏正謂教人小大有别前段程子之說却就灑掃應對上發明理無大小自是一義伊川先生曰說書必非古意轉使人薄學者須是潛心積慮優游涵養使之自得今一日說盡只是教得薄至如漢時說下帷講誦猶未必說書理貴玩索至於口耳之傳末矣下帷講誦如董仲舒之徒說見漢史古者八嵗入小學十五入大學擇其才可教者聚之不肖者復之農畝葢士農不易業既入學則不治農然後士農判古者自國之貴胄子弟及士庶人之子八嵗則皆入小學十五則入大學然後擇其才之可教者聚之於學其不可教者復歸之農畝在學之養若士大夫之子則不慮無養雖庶人之子既入學則亦必有養古之士者自十五入學至四十方仕中間自有二十五年學又無利可趨則所志可知須去趨善便自此成徳後之人自童稚間已有汲汲趨利之意何由得向善故古人必使四十而仕然後志定只營衣食却無害惟利禄之誘最害人本註云人有養便方定志於學先王設教養之周而行之久士有定志專於修己而緩於干禄故能一意趨善卒於成徳後世反是只營衣食者求於力分之内未足以奪志故無害若誘於利禄則所學皆非為己而根本己撥矣故害最甚天下有多少才只為道不明於天下故不得有所成就且古者興於詩立於禮成於樂如今人怎生會得古人於詩如今人歌曲一般雖閭巷童稚皆習聞其說而曉其義故能興起於詩後世老師宿儒尚不能曉其義怎生責得學者是不得興於詩也古人歌詩習熟其說而通達其義故吟諷之間足以感發其善心而懲創其逸志古禮既廢人倫不明以至治家皆無法度是不得立於禮也禮所以叙人倫而施之家國者皆有法度以為據依故能有立也古人有歌詠以養其性情聲音以養其耳目舞蹈以養其血脈今皆無之是不得成於樂也歌詠聲詩溫柔篤厚有以養其性情也五聲成文八音相比鴻殺䟽數節奏和平有以養其耳目也至於手之舞足之蹈執其羽籥干戚之器習其屈伸俯仰綴兆舒疾之文是以容貌得莊行列得正進退得齊心志條暢而血氣和平是有以養其血脈也古之成材也易今之成材也難孔子教人不憤不啟不悱不發葢不待憤悱而發則知之不固待憤悱而後發則沛然矣學者須是深思之思而不得然後為他說便好朱子曰憤者心求通而未得之意悱者口欲言而未能之貌啟謂開其意發謂達其辭愚謂不待憤悱而遽啟發之則未嘗深思其受之也必淺既無所得其聴之也若亡啟發於憤悱之餘則思深力窮而倐然有得必沛然而通達矣初學者須是且為他說不然非獨他不曉亦止人好問之心也此又誘進初學之道横渠先生曰恭敬撙節退讓以明禮仁之至也愛道之極也曲禮曰君子恭敬撙節退讓以明禮鄭氏曰撙猶趨也謂趨就乎節約也恭敬者禮之本撙節退讓禮之文君子從事乎此則視聴言動之間天理流行人欲消盡而心徳全矣是仁之至也恭敬則無慢忽撙節則無驕溢退讓則無怨爭是皆所以盡仁愛之道者也己不勉明則人無從倡道無從𢎞教無從成矣正䝉明謂明禮也人必以禮而倡率道必以禮而宏大教必以禮而成就學記曰進而不顧其安使人不由其誠教人不盡其材其安其成其材皆謂受教者人未安之又進之未喻之又告之徒使人生此節目不盡材不顧安不由誠皆是施之妄也此言進而不顧其安徒使人生此節目葢三患實相因而然皆陵節躐等不當其可而施之也教人至難必盡人之材乃不誤人觀可及處然後告之聖人之明直若庖丁之解牛皆知其隙刃投餘地無全牛矣此言教人必盡其材聖人隨材施教各當其可如庖丁解牛洞見間隙無全牛矣事見莊子人之才足以有為但以其不由於誠則不盡其材若曰勉率而為之則豈有由誠哉横渠禮記說下同誠此言使人不由其誠勉強為之而無意雖材所可為者亦不能盡之矣朱子曰嘗見横渠簡與人謂其子日來誦書不熟宜教他熟誦盡其誠與材古之小兒便能敬事長者與之提攜則兩手奉長者之手問之掩口而對說見曲禮捧手習扶持尊者掩口而對習其鄉尊者屏氣也葢稍不敬事便不忠信故教小兒且先安詳恭敬安詳則不躁率恭敬則不誕慢此忠信之本也孟子曰人不足與適也政不足與間也唯大人為能格君心之非非唯君心至於朋游學者之際彼雖議論異同未欲深較惟整理其心使歸之正豈小補哉横渠孟子說近思録卷十一
