body:
  text: 近思錄卷十四宋朱子吕祖謙同編葉采集解總論聖賢凡二十六條此卷論聖賢相傳之統而諸子附焉斷自唐虞堯舜禹湯文武周公道統相傳至於孔子孔子傳之顔曽曽子傳之子思子思傳之孟子遂無傳焉於是楚有荀卿漢有毛萇董仲舒揚雄諸葛亮隋有王通唐有韓愈雖未能傳斯道之統然其立言立事有補於世教皆所當攷也迨於宋朝人文再闢則周子唱之二程子張子推廣之而聖學復明道統復續故備著之明道先生曰堯與舜更無優劣及至湯武便别孟子言性之反之自古無人如此說只孟子分别出來便知得堯舜是生而知之湯武是學而能之文王之德則似堯舜禹之德則似湯武要之皆是聖人遺書下同性之者生而知之安而行之天性渾全不待修習者也反之者學而知之利而行之修身體道以復其性者也文王不識不知順帝之則蓋亦生知之性也禹克勤克儉不矜不伐蓋亦學能之事也仲尼元氣也顔子春生也孟子并秋殺盡見夫子大聖之資猶元氣周流渾淪溥博無有涯涘罔見間隙顔子亞聖之才如春陽盎然發生萬物四時之首衆善之長也孟子亦亞聖之才剛烈明辨整齊嚴肅故并秋殺盡見仲尼無所不包顔子示不違如愚之學於後世有自然之和氣不言而化者也孟子則露其材蓋亦時然而已夫子道全德備故無所不包顔子不違如愚與聖人合德後世可想其自然和氣黙而成之不言而信者也孟子英才發越蓋亦戰國之時世道益衰異端益熾又無天子主盟於其上故其衛道之嚴辨論之明不得不然也仲尼天地也顔子和風慶雲也孟子泰山巖巖之氣象也觀其言皆可見之矣天地者高明而博厚也和風慶雲者協氣祥光也泰山巖巖者峻極不可踰越也仲尼無迹顔子微有迹孟子其迹著夫子渾然天成故無迹顔子不違如愚本亦無迹然為仁之問喟然之歎猶可窺測其㣲至於孟子則發明底蘊故其迹彰彰孔子儘是明快人顔子儘豈弟孟子儘雄辯夫子清明在躬猶青天白日故極其明快顔子有若無實若虚犯而不校故極其豈弟孟子息邪說詎詖行放滛辭故極其雄辯此段反覆形容大聖大賢氣象各臻其妙古今之言聖賢未有若斯者也學者其濳心焉曽子傳聖人學其德後來不可測安知其不至聖人如言吾得正而斃且休理㑹文字只看他氣象極好被他所見處大後人雖有好言語只被氣象卑終不類道曽子悟一貫之旨已傳聖人之學矣至其易簀之言吾何求哉吾得正而斃焉斯可矣自非樂善不倦安行天理一息尚存必歸於正夫豈一時之所能勉强哉遺書又曰曽子疾病只要以正不慮死與武王殺一不辜行一不義得天下不為同心傳經為難如聖人之後纔百年傳之已差聖人之學若非子思孟子則幾乎息矣道何嘗息只是人不由之道非亡也幽厲不由也羣經定於夫子之手至孟子時纔百年間微言絶而大義乖矣猶賴曽子之門有傳子思孟子之徒相繼纘述提綱挈領闢邪輔正以埀萬世如論語大學中庸孟子之書可見矣荀卿才高其過多揚雄才短其過少苟卿名況字卿為楚蘭陵令揚雄字子雲為漢光祿卿荀卿才高敢為異論如以人性為惡以子思孟子為非其過多揚雄才短如作太𤣥以擬易法言以擬論語皆模倣前聖之遺言其過少荀子極偏駁只一句性惡大本已失揚子雖少過然已自不識性更說甚道率性之謂道荀子性惡揚子善惡混均之不識本然之性何以語道董仲舒曰正其誼不謀其利明其道不計其功此董子所以度越諸子自春秋以來舉世皆趨功利仲舒此言最為純正朱子曰仲舒所立甚高後世所以不如吉人者以道義功利闗不透耳漢儒如毛萇董仲舒最得聖賢之意然見道不甚分明下此卽至揚雄規模又窄狭矣毛萇治詩為漢時獻王博士仲舒舉賢良對策為膠西相二子論治皆以修身齊家為本先德敎而後功利最為得聖賢意揚雄以清淨寂寞為道無儒者規模或問伊川謂仲舒見道不分明朱子曰如云性者生之質性非敎化不成似不識本然之性又問何所主而取毛公曰考之詩傳緊要有數處如闗雎所謂夫婦有別則父子親父子親則君臣敬君臣敬剛朝廷正朝廷正則王化咸要之亦不多見只是氣象大槩好林希謂揚雄為祿隱揚雄後人只為見他著書便須要做他是怎生做得是祿隱謂浮沉下位依祿而隱即祿仕之意也雄失身事莽以是祿隱何辭而可孔明有王佐之心道則未盡王者如天地之無私心焉行一不義而得天下不為孔明必求有成而取劉璋聖人寧無成耳此不可為也諸葛亮字孔明東漢末曾操據漢將簒孔明輔先主志欲攘除姦凶興復漢室而其規模宏逺操心公平有王佐之心然於王道則有所未盡蓋聖人之道如天地發育無有私意行一不義雖可以得天下而不為先主以詐取劉璋孔明不得以無責蓋其志於有成行不義而不暇顧若聖人則寧漢無興不忍為此若劉表子琮將為曹公所并取而興劉氏可也先主依劉表曹操南侵㑹表卒子琮迎降孔明說先主取荆州先主不忍琮降則地歸曹氏矣取以興漢何負於表較之取劉璋則曲直有間矣或謂先主雖得荆州未必能禦曹操然此又特以利鈍言者也諸葛武侯有儒者氣象孔明輔漢討賊以信義為主以節制行師以公誠待人至於親賢臣逺小人諮諏善道察納雅言有大臣格君之業朱子曰孔明雖嘗學申韓然資質好却有正大氣象孔明庶幾禮樂文中子曰使孔明而無死禮樂其有興乎亮之治國政刑修舉而人心豫附名正言順禮樂其庶幾乎文中子本是一隱君子世人往往得其議論附㑹成書其間極有至言荀揚道不到處文中子王氏名通隋末不仕敎授於河汾其弟王凝子福畤等收其議論増益為書名曰中說朱子曰其書多為人添入眞偽難見然好處甚多就中論世變因革處說得極好又曰文中子論治體處高似仲舒而本領不及爽似仲舒而純不及韓愈亦近世豪傑之士如原道中言語雖有病然自孟子而後能將許大見識尋求者才見此人至如斷曰孟氏醇乎醇又曰荀與揚擇焉而不精語焉而不詳若不是他見得豈千餘年後便能斷得如此分明韓愈字退之仕唐為吏部侍郎嘗著原道其間如博愛之謂仁則明其用而未盡其體如道德為虚位則辨其名而不究其實如言正心誠意之學而遺格物致知之功凡此類皆有疵病然其扶正學闢異端秦漢以來未有及之者至於論孟氏之與荀揚尤其卓然之見也學本是修德有德然後有言退之却倒學了因學文日求所未至遂有所得古之學者務修德而已德之既盛則發於言辭有自然之文退之反因學文而有所見如曰軻之死不得其傳似此言語非是蹈襲前人又非鑿空撰得出必有所見若無所見不知言所傳者何事朱子曰韓文公見得大意已分明只是不曽向裏面省察不能就身上細密做工夫周茂叔胸中灑落如光風霽月見黄庭堅所作詩序李延平每誦此言以為善形容有道者氣象其為政精密嚴恕務盡道理通書附錄見潘延之所撰墓誌又孔經父祭文云公年壯盛玉色金聲從容和毅一府皆傾伊川先生撰明道先生行狀曰先生資稟既異而充養有道資稟得於天充養存於己純粹如精金純粹而不雜溫潤如良玉溫良而潤澤寛而有制寛大而有規矩和而不流和易而有撙節忠誠貫於金石忠誠之至可貫於金石孝弟通於神明孝弟之至可通於鬼神視其色其接物也如春陽之溫春陽發逹盎然其和聽其言其入人也如時雨之潤優游而不廹沾洽而有餘胸懷洞然徹視無間測其蘊則浩乎若滄溟之無際胸次洞逹無少隱匿然測其學識所蘊則又深博而無涯極其德美言蓋不足以形容以上一節言資稟之粹充養之厚也先生行已内主於敬而行之以恕敬主於身而恕及於物敬則其本正而一恕則其用公而溥見善若出諸己與人為善也不欲勿施於人視人猶己也居廣居而行大道居天下之廣居不安於狹陋行天下之大道不由於邪僻言有物而行有常言必有實故曰物行必有度故曰常以上一節言行己之本末也先生為學自十五六時聞汝南周茂叔論道遂厭科舉之業慨然有求道之志未知其要泛濫於諸家出入於老釋者幾十年返求諸六經而後得之按濓溪先生為南安軍司理參軍時程公珦攝通守事視其氣貌非常人與語知其為學知道也因與為友且使其二子受學焉而程氏遺書有言再見周茂叔後吟風弄月以歸有吾與㸃也之意明道學於濓溪者雖得其大意然其博求精察益充所聞以抵於成者尤多自得之功明於庶物察於人倫明則有以識理察則加詳於明知盡性至命必本於孝弟窮神知化由通於禮樂孝弟說見四卷樂記曰天高地下萬物散殊而禮制行矣流而不息合同而化而樂興焉通乎禮則知萬化散殊之迹通乎樂則窮萬化同流之妙此言明乎天實本乎人也辨異端似是之非開百代未明之惑秦漢而下未有臻斯理也謂孟子没而聖學不傳以興起斯文為己任其言曰道之不明異端害之也昔之害近而易知今之害深而難辨昔之惑人也乗其迷暗今之入人也因其高明昔之害楊墨申韓是也今之害佛老是也淺近故迷暗者為所惑深逺故高明者反陷其中自謂窮神知化而不足以開物成務自謂通逹𤣥妙實則不可以有為於天下言為無不周徧實則外於倫理自謂性周法界然實則外乎人倫物理窮深極微而不可以入堯舜之道堯舜之道大中至正窮深極微是過之也天下之學非淺陋固滯則必入於此自道之不明也邪誕妖異之說競起塗生民之耳目溺天下於汙濁雖高才明智膠於見聞醉生夢死不自覺也是皆正路之蓁蕪聖門之蔽塞闢之而後可以入道淺陋固滯者乃刑名功利之習訓詁詞章之士是也學者不入於淺陋固滯則必入於佛老之空無先生進將覺斯人退將明之書不幸早世皆未及也其辨析精微稍見於世者學者之所傳耳以上一節言學道之本末與其闢異端正人心之大略也先生之門學者多矣先生之言平易易知賢愚皆獲其益如羣飲於河各充其量先生敎人自致知至於知止誠意至於平天下灑掃應對至於窮理盡性循循有序病世之學者舎近而趨逺處下而闚高所以輕自大而卒無得也此一節言敎人之道本末備具而循序漸進惟恐學者厭卑近而務高逺輕自肆而無實得也先生接物辨而不間是非雖明而亦不絶之感而能通感而必應敎人而人易從敎人各因其資而平易明白故易從怒人而人不怨怒所當怒而心平氣和故不怨賢愚善惡咸得其心愛而公故咸得其歡心狡偽者獻其誠待人盡其誠而人不忍欺之暴慢者致其恭待人盡其禮而人不忍以非禮加之聞風者誠服誠服者眞實而非勉强聞風而服則無逺不格矣覿德者心醉盛德所形見者熏乎至和如飲醇酎雖小人以趨向之異顧於利害時見排斥退而省其私未有不以先生為君子也先生以議新法不合遂遭排斥然當時用事者亦曰伯淳忠信人也則其言行之懿有不可誣者以上一節言接物之道先生為政治惡以寛開其自新之路改而正處煩而裕得其要領且順乎理當法令繁密之際未嘗從衆為應文逃責之事人皆病於拘礙而先生處之綽然衆人憂以為甚難而先生為之沛然法令峻密而先生未嘗為苟且應命之事然而處之有道故不見其礙為之有要故不見其難雖當倉卒不動聲色理素明而志素定方監司競為嚴急之時其待先生率皆寛厚設施之際有所頼焉忠信懇惻足以感人故能不徇時好而得遂其所為先生所為綱條法度人可效而為也至其道之而從動之而和不求物而物應未施信而民信則人不可及也文集政令設施可倣而行道化孚感不可力而致以上一節言為政之道明道先生曰周茂叔牕前草不除問之云與自家意思一般遺書下同本註云子厚觀驢鳴亦謂如此天地生意流行發育惟仁者生生之意充滿胸中故觀之有㑹於其心者張子厚聞生皇子喜甚見餓莩者食便不美此即西銘之意亦其養德之厚故隨所感遇蹶然動於中而不可遏初非擬議作意而為之也伯淳嘗與子厚在興國寺講論終日而曰不知舊日曾有甚人於此處講此事吕源明曰此處氣象自有合得如此等人說此等話道理謝顯道曰明道先生坐如泥塑人接人則渾是一團和氣外書下同所謂望之儼然即之也溫侯師聖云朱公掞見明道於汝歸謂人曰光庭在春風中坐了一箇月游楊初見伊川伊川瞑目而坐二子侍立既覺顧謂曰賢輩尚在此乎日旣晚且休矣及出門門外之雪深一尺侯仲良字師聖朱光庭字公掞皆程子門人也明道接人和粹伊川師道尊嚴皆盛德所形但其氣質成就有不同耳明道似顔子伊川似孟子劉安禮云明道先生德性充完粹和之氣盎於面背樂易多恕終日怡悅立之從先生三十年未嘗見其忿厲之容附錄明道先生質之美養之厚德之全故其粹然發見從容豈弟如此百世之下聞之者鄙夫寛薄夫敦而況於親炙之者乎呂與叔撰明道哀詞云先生負特立之才知大學之要博文强識躬行力究察倫明物極其所止渙然心釋洞見道體識記也博文强識博學也躬行力究力行也察倫明物以下物格而知至也其造於約也雖事變之感不一知應以是心而不窮雖天下之理至衆知反之吾身而自足應感無窮而實本乎吾心物理散殊而皆備乎吾身言其學雖博而有要也其致於一也異端竝立而不能移聖人復起而不與易致一者見之明而守之定故邪說不能移百世以俟聖人而不惑也其養之成也和氣充浹見於聲容然望之崇深不可慢也遇事優為從容不廹然誠心懇惻弗之措也和易而有含蓄寛裕而懇至也其自任之重也寧學聖人而未至不欲以一善成名寧以一物不被澤為己病不欲以一時之利為己功自任之重所至者逺不安於小成不急於近功其自信之篤也吾志可行不苟潔其去就吾義所安雖小官有所不屑志若可行不潔其去以為高義擇所安亦不屑於就以自卑呂與叔撰横渠先生行狀云康定用兵之時先生年十八慨然以功名自許上書謁范文正公公知其逺器欲成就之乃責之曰儒者自有名教何事於兵因勸讀中庸先生讀其書雖愛之猶以為未足於是又訪諸釋老之書累年盡究其說知無所得反而求之六經嘉祐初見程伯淳正叔於京師共語道學之要先生渙然自信曰吾道自足何事旁求於是盡棄異學淳如也本註尹彦明云横渠昔在京師坐虎皮說周易聽從甚衆一夕二程先生至論易次日横渠撤去虎皮曰吾平日為諸公說者皆亂道有二程近到深明易道吾所不及汝輩可師之愚謂此可以見横渠先生勇於從善無一毫繫吝之意非大公至明孰能如是晩自崇文移疾西歸横渠終日危坐一室左右簡編俯而讀仰而思有得則識之或中夜起坐取燭以書其志道精思未始須臾息亦未嘗須臾忘也學者有問多告以知禮成性變化氣質之道學必如聖人而後已聞者莫不動心有進說竝見前嘗謂門人曰吾學旣得於心則修其辭命辭無差然後斷事斷事無失吾乃沛然精義入神者豫而已矣人於義理其初得於心者雖了然無疑及宣之於口筆之於牘則或有差故命辭無差則所見己審以是應酬事物知明理精妙用無方矣是皆窮理致知之功素立而非勉强擬議於應事之時也先生氣質剛毅徳盛貌嚴然與人居久而日親其治家接物大要正己以感人人未之信反躬自治不以語人雖有未喻安行而無悔故識與不識聞風而畏非其義也不敢以一毫及之德貌嚴毅而中誠懇惻故與人久而益親躬自厚而薄責於人故人心服而不敢加以非義横渠曰二程從十四五時便銳然欲學聖人語錄近思錄卷十四
