body:
  text: 近思録卷四宋朱子吕祖謙同編葉采集解存養凡七十條此卷論存養蓋窮格之雖至而涵養之不足則其知將日昏而亦何以為力行之地哉故存養之功實貫乎知行而此卷之編列乎二者之間也或問聖可學乎濂溪先生曰可有要乎曰有請問焉曰一為要一者無欲也無欲則靜虛動直靜虛則明明則通動直則公公則溥明通公溥庶矣乎通書一者統一而不雜也湛然無欲心乃純一靜而所存者一人欲消盡故虛虛則生明而能通天下之理動而所存者一天理流行故直直則大公而能周天下之務動靜惟一明通公溥庶幾作聖之功用朱子曰此章之旨最為要切學者能深玩而力行之則有以知無極之真兩儀四象之本皆不外乎此心而曰用間自無别用力處矣伊川先生曰陽始生甚微安靜而後能長故復之象曰先王以至日閉關易傳下同朱子曰一陽初復陽氣甚微不可勞動故當安靜以養微陽如人善端方萌正欲靜以養之方能盛大愚謂天人之氣流通無間至日閉關財成輔相之道於是見矣動息節宣以養生也飲食衣服以養形也威儀行義以養德也推己及物以養人也頤卦傳威儀見於容貌行義著於事葉慎言語以養其德節飲食以養其體事之至近而所繫至大者莫過於言語飲食也頤卦象傳言語不謹則敗德飲食無度則病身震驚百里不喪匕鬯臨大震懼能安而不自失者惟誠敬而已此處震之道也震卦彖傳七以載鼎實鬯秬酒也雷震驚百里可謂震矣而奉祀者不失其匕鬯誠敬盡於祀事則雖震而不為驚也是知君子當大患難大恐懼處之安而不自失者惟存誠篤至中有所主則威震不足以動之矣人之所以不能安其止者動於欲也欲牽於前而求其止不可得也故艮之道當艮其背所見者在前而背乃背之是所不見也止於所不見則無欲以亂其心而止乃安艮卦彖傳不見可欲則心不亂然非屏視聽也蓋不牽於欲則無私邪之見耳朱子曰即非禮勿視聽言動之意不獲其身不見其身也謂忘我也無我則止矣不能無我無可止之道朱子曰外既無非禮之視聽言動則內自不見有私己之欲矣行其庭不見其人庭除之間至近也在背則雖至近不見謂不交於物也不交於物非絶物也亦謂中有所主不誘於外物之交也朱子曰姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體是也外物不接內欲不萌如是而止乃得止之道於止為無咎也內欲不萌不獲其身也外物不接不見其人也人已兩忘內外各定是動靜之間各得其所止何咎之有明道先生曰若不能存養只是説話遺書下同徒事問辨而不加存養口耳之學也聖賢千言萬語只是欲人將已放之心約之使反復入身來自能尋向上去下學而上達也聖賢垂訓多端求其指歸則不過欲存此心而己心不外馳則學問日進於髙明矣朱子曰孟子求放心乃開示要切之言程子又發明之曲盡其旨學者宜服膺而勿失也李籲問每常遇事即能知操存之意無事時如何存養得熟明道曰古之人耳之於樂目之於禮左右起居盤盂几杖有銘有戒動息皆有所養今皆廢此獨有理義之養心耳但存此涵養意久則自熟矣敬以直內是涵養意李籲字端伯程子門人也義理養心本兼動靜但此答無事時如何存養得熟故曰但存涵養意久則自熟敬則心存於中無所越逸即涵養之意呂與叔嘗言患思慮多不能驅除明道曰此正如破屋中禦寇東面一人來未逐得西面又一人至矣左右前後驅逐不暇蓋其四面空疏盜固易入無緣作得主定又如虛器入水水自然入若以一器實之以水置之水中水何能入來蓋中有主則實實則外患不能入自然無事誠存則邪自間矣邢和叔言五曹常須愛養精力精力稍不足則倦所臨事皆勉強而無誠意接賓客語言尚可見況臨大事乎邢恕字和叔明道先生曰學者全體此心學雖未盡若事物之來不可不應但隨分限應之雖不中不逺矣體猶體幹全體謂全主宰以為應酬之本心存而理得雖有不中於理亦不逺矣居處恭執事敬與人忠此是徹上徹下語聖人元無二語説見論語恭者敬之形於外者也平居之時齋莊嚴肅儼然於容貌而已及夫執事而敬主於事與人而忠推於人自始學以至成德皆不外此但勉強與安行之異耳伊川先生曰學者須敬守此心不可急迫當栽培深厚涵泳於其間然後可以自得但急迫求之只是私己終不足以達道養心莫善於持敬然不可執持太迫反成私意於道却有礙明道先生曰思無邪毋不敬只此二句循而行之安得有差有差者皆由不敬不正也詩魯頌曰思無邪曲禮曰毋不敬心存乎中而邪念不作則見之所行自無差失朱子曰思無邪是心正意誠毋不敬是正心誠意今學者敬而不自得又不安者只是心生持敬而無自得之意又為之不安者但存心未熟之故亦是太以敬來做事得重此恭而無禮則勞也恭者私為恭之恭也禮者非體之禮是自然底道理也只恭而不為自然底道理故不自在也須是恭而安作意太過勉強以為恭而不知禮本自然是以勞而不安也私為恭者作意以為恭而非其公行者也非體之禮謂非升降揖遜之儀鋪筵設几之文蓋自然安順之理今容貌必端言語必正者非是道獨善其身要人道如何只是天理合如此本無私意只是箇循理而已私意謂矯飾作為之意循理則順乎自然盡乎當然何不安之有今志於義理而心不安樂者何也此則正是剩一箇助之長雖則心操之則存捨之則亡然而持之太甚便是必有事焉而正之也亦須且恁去有志問學而作意太迫則有助長欲速之患朱子曰正預期也春秋傳曰戰不正勝是也説見孟子如此者只是德孤德不孤必有鄰到德盛後自無窒礙左右逢其原也孤謂寡特而無輔也涵養未充義理單薄故無自得之意及德盛而不孤則胸中無滯礙左右逢其原沛然有餘裕又何不安樂之有敬而無失便是喜怒哀樂未發謂之中敬不可謂中但敬而無失即所以中也此言靜而主敬事物未交心主乎敬不偏不倚即所謂未發之中敬非中敬所以養其中也伊川先生曰司馬子微嘗作坐忘論是所謂坐馳也司馬承楨字子微唐天寶中隱居于天台之赤城嘗著論八篇言清淨無為坐忘遺照之道按程子又曰有忘之心乃是馳也伯淳昔在長安倉中間坐見長廊柱以意數之已尚不疑再數之不合不免令人一一聲言數之乃與初數者無差則知越著心把捉越不定著意把捉則心已為之動故愈差明道先生曰人心作主不定正如一箇翻車流轉動搖無須臾停所感萬端若不做一箇主怎生奈何張天祺昔嘗言自約數年自上著牀便不得思量事不思量事後須強把他這心來制縛亦須寄寓在一箇形象皆非自然君實自謂吾得術矣只管念箇中字此又為中所繫縳且中有何形象張戩字天祺欲強絶思慮然心無安頓處司馬溫公欲寓此心於中字亦未免有所繫著朱子曰譬如人家不自作主却請别人來作主有人胸中常若有兩人焉欲為善如有惡以為之間欲為不善又若有羞惡之心者本無二人此正交戰之驗也持其志使氣不能亂此大可驗要之聖賢必不害心疾此言應事處有善惡交戰之患亦是心無所主故也苟能持守其志不為氣所勝則所主者定何有紛紜某寫字時甚敬非是要字好只此是學篤於持敬無往非學伊川先生曰聖人不記事所以常記得今人忘事以其記事不能記事處事不精皆出於養之不完固聖人無心記事故其心虛明自然常記今人著心強記故其心紛擾愈不能記然記事不能與處事不精二者又皆出於所養不厚則明德曰昏故已往者不能記方來者不能察也明道先生在澶州日修橋少一長梁曽博求之民間後因出入見林木之佳者必起計度之心因語以戒學者心不可有一事或問凡事須思而後通朱子曰事如何不思但事過則不留於心可也伊川先生曰入道莫如敬未有能致知而不在敬者非敬則心昏雜理有不能察而知有不能致今人主心不定視心如寇賊而不可制不是事纍心乃是心纍事當知天下無一物是合少得者不可惡也事至當應初何為纍顧心無所主不能定應反纍事耳人只有一箇天理却不能存得更做甚人也人之所以靈於萬物者特以全其天理而已人多思慮不能自寧只是做他心主不定要作得心主定惟是止於事為人君止於仁之類如舜之誅四凶四凶已作惡舜從而誅之舜何與焉止者事物當然之則如大學為人君止於仁之類人之應事能止所當止則亦無思慮紛擾之患矣舜誅四凶惡在四凶自應竄殛舜何與焉人不止於事只是攬他事不能使物各付物物各付物則是役物為物所役則是役於物有物必有則須是止於事以上並伊川語應事而不止其所當止是以一己之私智攬他事而不能物各付物者也所謂物各付物者物來而應不過其則物往而化不滯其迹是則役物而不為物所役不能動人只是誠不至於事厭倦皆是無誠處誠實懇至則人無不感遇事有一毫厭倦之意則是不誠靜後見萬物自然皆有春意明道先生詩曰萬物靜觀皆自得四時佳興與人同胸中躁擾詎識此意孔子言仁只説出門如見大賓使民如承大祭看其氣象便須心廣體胖動容周旋中禮自然惟慎獨便是守之之法胖安舒也仲弓問仁子曰出門如見大賓使民如承大祭無非敬謹之意然玩其氣象則必心無隱慝而廣大寬平體無怠肆而安和舒泰充其至則動容周旋自然中禮者也學者守之則唯在謹獨蓋隱微之中常存敬謹之意則出門使民之際乃能及此聖人修己以敬以安百姓篤恭而天下平惟上下一於恭敬則天地自位萬物自育氣無不和四靈何有不至此體信達順之道子路問君子子曰修已以敬曰如斯而已乎曰修己以安百姓中庸曰君子篤恭而天下平自其敬以修己充而廣之則政理清明而百姓安風化廣被而天下平蓋惟上下孚感一於恭敬舉無乖爭凌犯之風和氣薰蒸自然隂陽順軌萬物遂宜禮運曰鳯凰麒麟皆在郊藪龜龍在宫沼所謂四靈畢至也人曰體信以達順朱子曰信是實理順是和氣體信是無一毫之偽達順是發而皆中節無一物不得其所聰明睿智皆由是出以此事天饗帝敬則心專靜而不昏故明睿生推此敬可以事天饗帝天以理言故曰事動靜語默無非事也帝以主宰言故曰饗如郊祀之類朱子曰聰明睿智皆由是出非程子實因持敬而見其效何以語及此存養熟後泰然行將去便有進所養厚則行有餘力不愧屋漏則心安而體舒屋漏者室之西北隅謂隱暗之地也隱暗之地自反無愧則心安體舒此謹獨之效心要在腔子裏腔子猶所謂神明之舍在腔子裏謂心不外馳也只外面有些隙罅便走了人心常要活則周流無窮而不滯於一隅心常存則常活蓋隨事應酬心常在我無將無迎故常活而無滯明道先生曰天地設位而易行乎其中只是敬也敬則無間斷朱子曰天地亦是有個主宰方始恁地變易無窮就人心言之惟敬然後流行不息敬才間斷便是不誠無物也毋不敬可以對越上帝敬勝百邪朱子曰學者常提醒此心如日之升羣邪自息敬以直內義以方外仁也敬立則內直義形則外方由內達外生理條直而無私欲邪枉之纍則心德全矣若以敬直內則便不直矣必有事焉而勿正則直也文言曰敬以直內而不曰以敬直內蓋有意欲以之而直內則此心已有所偏倚而非直矣必有事焉而勿正者敬所當為而無期必計效之意也涵養吾一心存則不二子在川上曰逝者如斯夫不舍書夜自漢以來儒者皆不識此義此見聖人之心純亦不已也純亦不已天德也有天德便可語王道其要只在慎獨朱子曰聖人見川流之不息歎逝者之如斯原其所以然乃天命流行不息之體惟聖人之心默契乎此故有感焉於此可見聖人純亦不已之心矣又曰有天德則純是天理無私意間斷便做得王道又曰學者謹獨所以為不已少有不謹則人欲乘之便間斷也不有躬無攸利不立已後雖向好事猶為化物不得以天下萬物撓已已立後自能了當得天下萬物蒙卦六三爻辭已未能自立則中心一無所主雖為善事猶為逐物而動若能自立則應酬在我物皆聽命何撓之有伊川先生曰學者患心慮紛亂不能寧靜此則天下公病學者只要立箇心此上頭儘有商量朱子曰學者不先立箇心恰似作室無基址今求此心正為要立基址得此心有箇存主處為學便有歸著可以用功間邪則誠自存不是外面捉一箇誠將來存著今人外面役役於不善於不善中尋箇善來存著如此則豈有入善之理只是間邪則誠自存間邪之意即是誠也苟役心於邪妄而暫欲存其誠則亦無可存之理故孟子言性善皆由內出只為誠便存間邪更著甚工夫但惟是動容貌整思慮則自然生敬孟子言性善如孩提之愛親敬兄如見赤子入井而有怵惕惻隱之心如四端之發無非自然由中而出蓋實心非外鑠操之則存矣所謂間邪者亦不過外肅其容貌內齊其心慮則敬自然生邪自然息敬只是主一也主一則既不之東又不之西如是則只是中既不之此又不之彼如是則只是內存此則自然天理明學者須是將敬以直內涵養此意直內是本本注尹彥明曰敬有甚形影只收斂身心便是主一且如人到神祠中致敬時其心收斂更著不得毫髮事非主一而何敬者心主乎一無放逸也靜而主乎一則寂然不動不散之東西常在中也動而主乎一則知止有定不滯乎彼此常在內也常存此心則天理自明間邪則固一矣然主一則不消言間邪間其邪思則心固一矣然心既主一則自無私邪之念不必間也有以一為難見不可下工夫如何一者無他只是整齊嚴肅則心便一一則自是無非僻之干此意但涵養久之則天理自然明外整齊而內嚴肅則心自一理自明有言未感時知何所寓曰操則存舍則亡出入無時莫知其鄉更怎生尋所寓只是有操而已操之之道敬以直內也人心無常亦惟操之則存學者實用力而有見於斯則直得所以存心之要而不患於出入無時莫知其鄉矣敬則自虛靜不可把虛靜喚做敬朱子曰周子説主靜正是要人靜定其心自作主宰程子又恐人只管求靜遂與事物不交涉却説箇敬云敬則自虛靜學者先務固在心志然有謂欲屏去聞見知思則是絶聖棄智有欲屏去思慮患其紛亂則須坐禪入定如明鑑在此萬物畢照是鑑之常難為使之不照人心不能不交感萬物難為使之不思慮絶聖者黜其聰明棄智者屏其智慮老氏之絶聖棄智釋氏之坐禪入定皆純天理害人心之教也若欲免此惟是心有主如何為主敬而已矣有主則虛虛謂邪不能入無主則實實謂物來奪之免此謂有思慮而無紛亂林用中主一銘云有主則虛神守其都無主則實鬼闞其室或問程子言有主則實又曰有主則虛何也朱子曰此只是有主於中外邪不能入自其有主於中言之則謂之實自其外邪不入言之則謂之虛大凡人心不可二用用於一事則他事更不能入者事為之主也事為之主尚無思慮紛擾之患若主於敬又焉有此患乎主敬則自不為事物紛擾所謂敬者主一之謂敬所謂一者無適之謂一且欲涵泳主一之義不一則二三矣至於不敢欺不敢慢尚不愧於屋漏皆是敬之事也主一無適者心常主乎我而無他適也蓋若動若靜此心常存一而不二所謂敬也不欺不慢不愧屋漏皆戒懼謹獨之意此意常存所主自一朱子曰程子有功於後學最是拈出敬字有力敬則此心不放事事從此做去又曰無適者只是持守得定不馳騖走作之意耳無適即是主一主一即是敬展轉相解非無適之外别有主一主一之外又别有敬也嚴威儼恪非敬之道但致敬須自此入敬存於中嚴威儼恪著於外者然未有外貌弛慢而中能敬著舜孳孳為善若未接物如何為善只是主於敬便是為善也以此觀之聖人之道不是但默然無言孳孳者亹亹不倦之意聖人為善固無間斷然方其未接物之時但有主敬而已是即善之本也不是但默然無言謂其靜而有所存也靜而有存故善問人之燕居形體怠惰心不慢者可否曰安有箕踞而心不慢者昔呂與叔六月中來緱氏間居中某嘗窺之必見其儼然危坐可謂敦篤矣學者須恭敬但不可令拘迫拘迫則難久也盤坐曰箕蹲跱曰踞箕踞乃傲惰之所形見學者始須莊敬持守積久自然安舒矣思慮雖多果出於正亦無害否曰且如在宗廟則主敬朝廷主莊軍旅主嚴此是也如發不以時紛然無度雖正亦邪敬存於㼬事莊示於等威嚴施於法制皆發於心而見於事者發之而當則無害也苟發不以時或雜然而發或過而無節其事雖正亦是邪念蘇季明問喜怒哀樂未發之前求中可否曰不可既思於喜怒哀樂未發之前求之又却是思也既思即是已發本注云思與喜怒哀樂一般才發便謂之和不可謂之中也蘇昞字季明張程門人也喜怒哀樂未發謂之中發而皆中節謂之和方其未發此心湛然無所偏倚故謂之中一念才生便屬已發之和矣又問呂學士言當求於喜怒哀樂未發之前如何曰若言存養於喜怒哀樂未發之前則可若言求中於喜怒哀樂未發之前則不可呂學士與叔也四者於未發之前可以涵養是中若有意求之則不得謂之未發又問學者於喜怒哀樂發時固當勉強裁抑於未發之前當如何用功曰於喜怒哀樂未發之前更怎生求只平日涵養便是涵養久則喜怒哀樂發自中節未發之前不容著力用功但有操存涵養而已曰當中之時耳無聞目無見否曰雖耳無聞目無見然見聞之理在始得朱子曰喜怒哀樂未發之時雖是耳無聞目無見然須是常有箇主宰操持底在這裏始得不然向空寂了賢且説靜時如何曰謂之無物則不可然自有知覺處朱子曰無物字恐當作有物字曰既有知覺却是動也怎生言靜人説復其見天地之心皆以為至靜能見天地之心非也復之卦下面一畫便是動也安得謂之靜復者動之端也故天地之心於此可見或曰莫是於動上求靜否曰固是然最難釋氏多言定聖人便言止如為人君止於仁為人臣止於敬之類是也易之艮言止之義曰艮其止止其所也人多不能止蓋人萬物皆備遇事時各因其心之所重者更互而出才見得這事重便有這事出若能物各付物便自不出來也此段問答皆論喜怒哀樂未發之中此條問者乃轉就動處言也止其所者動中其則而不遷也若心有所重則因重而遷物各付物而我無預焉則止其所止而心不外馳矣或問先生於喜怒哀樂未發之前下動字下靜字曰謂之靜則可然靜中須有物始得這裏便是難處學者莫若且先理會得敬能敬則知此矣朱子曰靜中有物者只是敬則常惺惺在這裏又曰靜中有物只是知覺不昧或問伊川云才有知覺便是動曰若云知寒覺暖便是知覺已動今未曽著於事物但有知覺在何妨其為靜不成靜坐便只是瞌睡或曰敬何以用功曰莫若主一季明曰昞嘗患思慮不定或思一事未了他事如麻又生如何曰不可此不誠之本也須是習習能專一時便好不拘思慮與應事皆要求一心不專一則言動皆無實故曰不誠之本猶學奕者一心以為鴻鵠將至則非誠於學奕也思慮者動於心應事者見於言行皆不可不主於一人於夢寐間亦可以卜自家所學之淺深如夢寐顛倒即是心志不定操存不固朱子曰魂與魄交而成夢心在其間依舊能思慮所以做出夢若心神安定夢寐亦不至顛倒問人心所繫著之事果善夜夢見之莫不害否曰雖是善事心亦是動凡事有眹兆入夢者却無害捨此皆是妄動吉凶云為之兆見於夢者則此心之神應感之理却不為害苟無故而夢皆心妄動人心須要定使他思時方思乃是今人都由心曰心誰使之曰以心使心則可人心自由便放去也人心操之則在我放而不知求則任其所之以心使心非二心也體用而言之耳持其志無暴其氣內外交相養也持其志者有所守於中無暴其氣者無所縱於外然中有所守則氣自完外無所縱則志愈固故曰交相養問出辭氣莫是於言語上用工夫否曰須是養乎中自然言語順理若是慎言語不妄發此却可著力曽子曰出辭氣斯逺鄙倍矣中有所養而後發於外者不悖至若謹言語此亦學者所可用力但不可專於言語上用功先生語繹曰吾受氣甚薄三十而浸盛四十五十而後完今生七十二年矣校其筋骨於盛年無損也繹曰先生豈以受氣之薄而厚為保生耶夫子默然曰吾以忘生徇欲為深恥張南軒曰若他人養生要康強只是利伊川説出來純是天理大率把捉不定皆是不仁外書下同仁者心存乎中純乎天理者也把捉不定則此心外馳理不勝欲皆是不仁伊川先生曰致知在所養養知莫過於寡欲二字外無物欲之撓則心境凊內有涵養之素則明睿生心定者其言重以舒不定者其言輕以疾心専而靜則言不妄發發必審確而和緩浮躁者反是明道先生曰人有四百四病皆不由自家則是心須教由自家只有此心操之在我不可任其所之也謝顯道從明道先生於扶溝明道一日謂之曰爾輩在此相從只是學皓言語故其學心口不相應盍若行之請問焉曰且靜坐伊川每見人靜坐便歎其善學心以靜而定理以靜而明朱子曰靜坐則收拾得精神定道理方有湊泊處橫渠先生曰始學之要當知三月不違與日月至焉內外賓主之辨使心意勉勉循循而不能已過此幾非在我者文集仁猶人之安宅也居之三月而不違者是在內而為主也其違也暫而已日月至焉者是在外而為賓也其至也暫而已過此謂三月不違以上大而化之之事非可以勉強而至矣故曰非在我者朱子曰不違仁者仁在內而為主然其未熟亦有時而出於外日月至焉者仁在外而為賓雖有時入於內而不能久也愚按前説則是已不違乎仁後説是仁不違乎已雖似不同其實則一也心清時少亂時常多其清時視明聽聰四體不待羈束而自然恭謹其亂時反是如此何也蓋用心未熟客慮多而常心少也習俗之心未去而實心未完也心者耳目四肢之主天君澄肅則視明聽聰四體自然從令若存心於道者未熟則客慮足以勝其本心習俗足以奪其誠意朱子曰橫渠大段用工夫來説得更精切又曰客慮是泛泛底思慮習俗之心是從來習染偏勝之心實心是義理之心人又要得剛太柔則入於不立亦有人生無喜怒者則又要得剛剛則守得定不回進道勇敢載則比他人自是勇處多語録下同剛則守之固行之決故足以進於道柔懦委靡必不能有立矣戲謔不惟害事志亦為氣所流不戲謔亦是持氣之一端朱子曰橫渠學力絶人尤勇於改過獨以戲為無傷一日忽曰凡人之過猶有出於不知而為之者至戲則皆有心為之也其為害尤甚遂作東銘正心之始當以己心為嚴師凡所動作則知所懼如此一二年守得牢固則自然心正矣視心如嚴師則知所敬畏而邪僻之念不作定然後始有光明若常移易不定何求光明易大抵以艮為止止乃光明故大學定而至於能慮人心多則無由光明易説下同此心靜定而明生焉水之止者可鑒而流水不可鑒亦是理也動靜不失其時其道光明學者必時其動靜則其道乃不蔽昧而明白今人從學之久不見進長正以莫識動靜見他人擾擾非關己事而所修亦廢由聖學觀之冥冥悠悠以是終身謂之光明可乎艮卦彖辭動靜各有其時然學者多失於不當動而動因循廢學終何光明之有敦篤虛靜者仁之本不輕妄則是敦厚也無所繫閡昏塞則是虛靜也此難以頓悟苟知之須久於道實體之方知其味夫仁亦在乎熟之而已孟子説閡閉礙也言動輕妄而不敦篤則此心外馳非仁也有所繫閡昏塞而不虛靜則此心罔覺非仁也然必存心之久實體於己然後能深知其味近思録卷四
