body:
  text: 近思録卷八宋朱子吕祖謙同編葉采集解治體凡二十五條此卷論治道蓋明乎出處之義則於治道之綱領不可不求講明之一旦得時行道則舉而措之耳濓溪先生曰治天下有本身之謂也治天下有則家之謂也朱子曰則謂物之可視以為法者猶俗言則例則樣是也本必端端本誠心而已矣則必善善則和親而已矣朱子曰心不誠則身不可正親不和則家不可齊以上總論治天下者其本在身其則在家也家難而天下易家親而天下疏也朱子曰親者難處疏者易裁然不先其難亦未有能其易者也家人離必起於婦人故睽次家人以二女同居而其志不同行也朱子曰睽次家人易卦之序二女以下睽彖傳文二女謂睽卦兌下離上兌少女離中女也陰柔之性外和悅而內猜嫌故同居而異志堯所以釐降二女於媯汭舜可禪乎吾兹試矣是治天下觀於家朱子曰釐理也降下也媯水名汭水北舜所居也堯理治下嫁二女於舜將以試舜而授之天下也以上論善則在和親之道治家觀身而已矣身端心誠之謂也誠心復其不善之動而已矣朱子曰不善之動息於外則善心之生於內者無不實矣不善之動妄也妄復則無妄矣無妄則誠焉程子曰無妄之謂誠故無妄次復而曰先王以茂對時育萬物深哉通書茂篤實盛發之意對猶配也謂配天時以育物朱子曰無妄次復亦卦之序先王以下引無妄卦大象以明對時育物惟至誠者能之而贊其旨之深也以上論端本在誠心之道明道先生嘗言於神宗曰得天理之正極人倫之至者堯舜之道也用其私心依仁義之偏者霸者之事也熙寧二年先生以大臣薦召除太子中允權監察御史裏行上疏首言王霸之事有天理人欲之分綱常純駁之辨王道如砥本乎人情出乎禮義若履大路而行無復回曲霸者崎嶇反側於曲徑之中而卒不可與入堯舜之道王道本乎人情之公出乎禮義之正平易正直而無回邪委曲之行崎嶇艱險反側不安之意徑委曲小路也故誠心而王則王矣假之而霸則霸矣二者其道不同在審其初而已易所謂差若毫釐繆以千里者其初不可不審也王者修己愛民正中國攘夷狄無非以誠心而行乎天理霸者假尊王攘夷救災討叛之名義以號令天下而自尊大耳其道雖霄壤之不侔然其初但根於一念之公私誠僞而已朱子曰宣帝雜王霸原不識王霸只是以寬慈喚做王嚴酷喚做霸自古論王霸至明道先生此劄無餘蘊矣惟陛下稽先聖之言察人事之理知堯舜之道備於己反身而誠之推之以及四海則萬世幸甚文集下同伊川先生曰當世之務所尤先者有三一曰立志二曰責任三曰求賢今雖納嘉謀陳善算非君志先立其能聽而用之乎君欲用之非責任宰輔其孰承而行之乎君相協心非賢者任職其能施於天下乎此三者本也制於事者用也三者之中復以立志為本所謂立志者至誠一心以道自任以聖人之訓為可必信先王之治為可必行不狃滯於近規不遷惑於衆口必期致天下如三代之世也立志篤實而逺大則不膠於淺近不惑於流俗比之九五曰顯比王用三驅失前禽伊川易傳曰人君比天下之道當顯明其比道而已如誠意以待物恕己以及人發政施仁使天下䝉其惠澤是人君親比天下之道也如是天下孰不親比於上積誠實之意以待物推愛己之心以及人發政施仁公平正大羣心自然豫附人君顯比天下之道也若乃暴其小仁違道干譽欲以求天下之比其道亦己狹矣其能得天下之比乎暴小惠以市私恩違正道以干虛譽以是求比則非顯比矣王者顯明其比道天下自然來比來者撫之固不煦煦然求比於物若田之三驅禽之去者從而不追來者則取之也此王道之大所以其民皥皥而莫知為之者也煦煦日出微溫之貌禮夫子不合圍蓋搜田之時圍於三面前開一路來者取之去者不追亦猶王者顯明比道初不執小惠以求人之比也皥皥廣大自得之意非惟人君比天下之道如此大率人之相比莫不然以臣於君言之竭其忠誠致其才力乃顯其比君之道也用之與否在君而已不可阿諛逢迎求其比己也在朋友亦然修身誠意以待之親己與否在人而已不可巧言令色曲從苟合以求人之比己也於鄉黨親戚於衆人莫不皆然三驅失前禽之義也易傳下同古之時公卿大夫而下位各稱其德終身居之得其分也位未稱德則君舉而進之士修其學學至而君求之皆非有預於己也農工商賈勤其事而所享有限故皆有定志而天下之心可一後世自庶士至於公卿日志於尊榮農工商賈日志於富侈億兆之心交騖於利天下紛然如之何其可一也欲其不亂難矣履卦象曰君子以辨上下定民志上之人不度其德而制爵位則庶士以至公卿日志於尊榮不明其分而立品節則農工商賈日志於富侈貴賤競趨而心欲無窮此亂之所由生也泰之九二曰包荒用馮河伊川易傳曰人情安肆則政舒緩而法度廢弛庶事無節治之之道必有包含荒穢之量則其施為寬裕詳密弊革事理而人安之若無含𢎞之度有忿疾之心則無深逺之慮有暴擾之患深弊未去而近患己生矣故在包荒也當泰之盛上下安肆政令舒緩而不振法度廢弛而不立庶事泛溢而無節未可以亟正驟起之也必有包含荒穢之量而後見於施為者寬裕而不迫詳密而不疏不迫不疏則弊可革事可理而人且安之矣或者見其百度慢弛不能含忍而遽懷忿疾之心則不暇詳密何有深逺之慮不能寬裕寧免暴擾之憂無深逺之慮則深弊未易革有暴擾之憂則近患己生矣自古泰治之世必漸至於衰替蓋由狃習安逸因循而然自非剛斷之君英烈之輔不能挺特奮發以革其弊也故曰用馮河治泰之道雖不容峻迫然人情玩肆因循苟且漸已陵夷苟非一人剛斷宰輔英烈則亦未能挺持自立奮發有為而作新積弊也無舟渡河曰馮謂必用馮河之勇也或疑上云包荒則是包含寬容此云用馮河則是奮發改革似相反也不知以含容之量施剛果之用乃聖賢之為也有含容之量則剛果不至於疏迫有剛果之用則含容不至於委靡二者相資而後治泰之道可成也觀盥而不薦有孚顒若伊川易傳曰君子居上為天下之表儀必極其莊敬如始盥之初勿使誠意少散如既薦之後則天下莫不盡其孚誠顒然瞻仰之矣盥者祭祀之始盥洗之時也薦者獻腥獻熟之時也方盥之初人心精純嚴肅既薦之後則禮儀繁縟人心漸散故為人上者必外莊內敬常如始盥之時則天下之人莫不誠信其上顒顒然仰望之矣凡天下至於一國一家至於萬事所以不和合者皆由有間也無間則合矣以至天地之生萬物之成皆合而後能遂凡未合者皆為有間也若君臣父子親戚朋友之間有離二怨隙者蓋讒邪間於其間也去其間隔而合之則無不和且治矣噬嗑者治天下之大用也噬嗑卦傳天地有間則氣不通而生化莫遂人倫有間則情不通而恩義日睽頤中有物曰噬嗑噬而合之所以去間也有治天下之大用焉大畜之六五曰豶豕之牙吉伊川易傳曰物有總攝事有機㑹聖人操得其要則視億兆之心猶一心道之斯行止之則戢故不勞而治其用若豶豕之牙也得其要㑹則視繁猶簡令行而禁止矣豕剛躁之物若强制其牙則用力勞而不能止若豶去其勢則牙雖存而剛躁自止君子法豶豕之義知天下之惡不可以力制也則察其機持其要塞絶其本原故不假刑法嚴峻而惡自止也且如止盜民有欲心見利則動苟不知教而迫於飢寒雖刑殺日施其能勝億兆利欲之心乎聖人則知所以止之之道不尚威刑而修政教使之有農桑之業知廉恥之道雖賞之不竊矣聖人所以制强暴者蓋亦察其機要而治其本原則人自服矣如所謂止盜之法是也非若後世權謀之術執其要害以御人之謂也解利西南無所往其來復吉有攸往夙吉伊川易傳曰西南坤方坤之體廣大平易當天下之難方解人始離艱苦不可復以煩苛嚴急治之當濟以寬大簡易乃其宜也文王八卦方位坤居西南維故西南為坤大難初解與民休息之意既解其難而安平無事矣是無所往也則當修復治道正紀綱明法度進復先代明王之治是來復也謂反正理也自古聖王救難定亂其始未暇遽為也既安定則為可久可繼之治自漢以下亂既除則不復有為姑隨時維持而已故不能成善治蓋不知來復之義也大難既解雖已安平而無所事然興廢舉墜修復治道以為久安長治之計者不容苟且而遂已也有攸往夙吉謂尚有當解之事則早為之乃吉也當解而未盡者不早去則將復盛事之復生者不早為則將漸大故夙則吉也張柬之等不殺武三思及其勢復成乃欲除之則亦晚矣夫有物必有則父止於慈子止於孝君止於仁臣止於敬萬物庶事莫不各有其所得其所則安失其所則悖聖人所以能使天下順治非能為物作則也唯止之各於其所而已艮卦彖傳事物各有天然之則聖人非能為物作則但處之各當其則而已兌說而能貞是以上順天理下應人心說道之至正至善者也兌卦彖曰說以利貞是以順乎天而應乎人若夫違道以干百姓之譽者苟說之道違道不順天干譽非應人苟取一時之說耳非君子之正道君子之道其說於民如天地之施感之於心而說服無斁道出於天違道則非順天矣譽出於人干譽則非應人矣天下之事不進則退無一定之理濟之終不進而止矣無常止也衰亂至矣蓋其道已窮極也聖人至此奈何曰惟聖人為能通其變於未窮不使至於極堯舜是也故有終而無亂既濟彖曰終止則亂其道窮也盛止必衰者天下之常勢有盛無衰者聖人之常道常人苟安於既濟乃衰亂之所由生聖人通變於未窮故有終而無亂易大傳曰堯舜氏作通其變使民不倦是也為民立君所以養之也養民之道在愛其力民力足則生養遂生養遂則教化行而風俗美故為政以民力為重也春秋凡用民力必書其所興作不時害義固為罪也雖時且義必書見勞民為重事也後之人君知此義則知愼重於民力矣春秋書不時者如隱公七年夏城中丘之類書時者如桓十六年冬城向之類書不義者如莊二十三年丹桓宫楹之類書義者如莊元年築王姬之館之類然有用民力之大而不書者為教之意深矣僖公修泮宫復閟宫非不用民力也然而不書二者復古興廢之大事為國之先務如是而用民力乃所當用也人君知此義知為政之先後輕重矣經說下同泮半也諸侯之學鄉射之宫其東西南方有水形如半璧以其半於天子之辟雍故曰泮宫也閟閉也幽陰之義宫廟也毛氏曰先妣姜嫄之廟孟仲子曰是禖宫也泮宫者所以教育賢材閟宫者所以尊事祖先二者皆為國之先務以是而用民力故無議焉治身齊家以至平天下者治之道也建立治綱分正百職順天時以制事至於創制立度盡天下之事者治之法也聖人治天下之道唯此二端而已道者治之本法者治之具不可偏廢然亦必本之立而後其具可舉也明道先生曰先王之世以道治天下後世只是以法把持天下遺書下同先王治天下以仁義為主法固在其中後世把持法令以控制天下而法亦非先王之法矣為政須要有紀綱文章先有司鄉官讀法平價謹權量皆不可闕也大曰綱小曰紀文章謂文法章程也有司衆職也必先正有司而後考其成㑹其要鄉官如黨正族師閭胥比長之屬讀法如州長於正月之吉及歲時祭祀各屬其州之民而讀法以考其德行道藝而勸之以糾其過惡而戒之是也平價如賈師各掌其次之貨賄之治辨其物而均平之展其成而奠其價之類是也權五銖兩斤鈞石也量五籥合升斗斛也人各親其親然後能不獨親其親使人各親其親則親親之道公於天下仲弓曰焉知賢才而舉之子曰舉爾所知爾所不知人其舍諸便見仲弓與聖人用心之大小推此義則一心可以喪邦一心可以興邦只在公私之間耳仲弓欲以一人之知舉天下之賢故疑其不足夫子則因天下之賢舉天下之賢惟見其有餘用心之公私小大如此推其極致則一可以喪邦一可以興邦治道亦有從本而言亦有從事而言從本而言惟是格君心之非正心以正朝廷正朝廷以正百官若從事而言不救則已若須救之必須變大變則大益小變則小益論治本則正君而國定矣就事而言則必有大更革然後能救積弊然要以格君心為本唐有天下雖號治平然亦非盡善之道三綱不正無君臣父子夫婦其原始於太宗也故其後世子弟皆不可使君不君臣不臣故藩鎮不賓權臣跋扈陵夷有五代之亂太宗以智力劫持取天下其於君臣父子之義有虧閨門之間又有慙德三綱皆已不正是以後世子孫氣習相傳綱常陵夷而不可止𤣥宗使肅宗至靈武則自立稱帝使永王璘使江南則反君臣之道不正遂使藩鎮割據於外閹豎擅專於內馴致五季之極亂也漢之治過於唐漢大綱正唐萬目舉本朝大綱正萬目亦未盡舉大綱謂綱常唐之治目若世業若府兵若租庸調若省府其區畫法制略仿先王之遺意故亦足以維持天下教人者養其善心而惡自消治民者導之敬讓而爭自息外書下同道之以德齊之以禮明道先生曰必有關睢麟趾之意然後可以行周官之法度關雎詠文王妃姒氏有幽閒貞靜之德麟趾詠文王子孫宗族有仁愛忠厚之性朱子曰自閨門衽席之微積纍至薰蒸洋溢天下無一民一物不被其化然後可以行周官之法度不然則為王莽矣君仁莫不仁君義莫不義天下之治亂繫乎人君仁不仁耳離是而非則生於其心必害於其政豈待乎作之於外哉一國以一人為本一人以一心為本使人君有一念私邪必將害於其政奚待作於外而後可知昔者孟子三見齊王而不言事門人疑之孟子曰我先攻其邪心心既正然後天下之事可從而理也夫政事之失用人之非知者能更之直者能諫之然非心存焉則一事之失救而正之後之失者將不勝救矣格其非心使無不正非大人其孰能之孟子見齊王首言仁術曰是心足以王至將求其所大欲則曰緣木求魚後必有災王欲行之盍反其本凡皆以格其非心而興其善意至於一政事之得失固未暇論橫渠先生曰道千乘之國不及禮樂刑政而云節用而愛人使民以時言能如是則法行不能如是則法不徒行禮樂刑政亦制數而已耳正蒙下同說見論語道治也千乘諸侯之國其賦可出兵車千乘者治國以人心為本必節己裕民德意孚洽民安其生然後禮樂刑政有所措法立而能守則德可久業可大鄭聲佞人能使為邦者喪其所守故放逺之鄭聲者鄭國之俗淫邪其作之詩著於樂者聲皆淫靡佞人者口給面諛之人也夫子既告顔子以四代之禮樂而必欲放鄭聲逺佞人蓋二者蕩心之原敗法亂紀之要也橫渠先生答范巽之書曰朝廷以道學政術為二事此正自古之可憂者巽之謂孔孟可作將推其所得而施諸天下邪將以其所不為而强施之於天下歟道學政術分為兩途則學與政皆非矣使孔孟復生必將推其所得之道措之天下必不以政術非吾所事而姑以是强施之天下也大都君相以父母天下為王道不能推父母之心於百姓謂之王道可乎所謂父母之心非徒見於言必須視四海之民如己之子設使四海之內皆為己之子則講治之術必不為秦漢之少恩必不為五霸之假名視民猶子則所以撫摩涵育教誨輔翼之者何所不盡秦漢慘刻少恩五霸假義圖利皆無誠愛之心者也巽之為朝廷言人不足與適政不足與間能使吾君愛天下之人如赤子則治德必日新人之進者必良士帝王之道不必改途而成學與政不殊心而得矣文集也適過間非也用人之非不足過謫行政之失不足非間唯能愛民如赤子懇惻切至則治德將日新何憂為政之失所任皆良士何憂用人之非帝王之道即今日之政事非有兩途今日之政術即平日之學問非有二心也近思録卷八
