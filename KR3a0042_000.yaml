body:
  text: 近思錄儒家類提要臣等謹案近思錄十四卷宋朱子與吕祖謙所共輯蓋周張二程之書宏深奥衍承學之士莫由得其涯涘朱子慮其不知所擇因與祖謙分類緝纂以成是書獨取太極圖説易通西銘正蒙經學理窟二程遺書易傳而於邵子之書則從姑舍蓋其慎也書以近思名蓋取切問近思之義俾學者致力於日用之實而不使騖於髙逺論者謂為五經之階梯信不誣歟宋明諸儒若何氏基薛氏瑄羅氏欽順莫不服膺是書其後因有續而廣之者亦堪輔翼而權輿之精無過是編云乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:492039c1af08dadf36b8eb7c5836501445c4dea155ba1b56871f4119307036cf
